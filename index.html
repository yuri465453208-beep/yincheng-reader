，是John给Zep的原始指令：</p>\n<p><em>「你必须在六点之前完成你的任务。如果Lawrence Gordon没有杀死他的对手——或者如果那个对手走出了浴室——你必须采取备用方案。」</em></p>\n<p><em>「备用方案——枪杀他的妻子和女儿。然后离开现场。你会在你的邮箱里找到你需要的药物。」</em></p>\n<p>磁带继续转动了几秒，然后发出咔哒一声——结束了。</p>\n<p>屋子里安静了几秒钟。</p>\n<p>然后Alison用沙哑的声音说：「他从来没打算让我们活着。」</p>\n<p>陈烬关掉了录音机。</p>\n<p>他的脑子在飞速运转。</p>\n<p><em>备用方案。枪杀妻子和女儿。</em></p>\n<p>但如果Zep没有做到呢？如果Zep被制服了呢？</p>\n<p>John一定还有第三层方案。</p>\n<p>因为John Kramer从来不把自己的胜利寄托在别人的执行上。</p>\n<p>陈烬闭上眼睛。</p>\n<p>他回到了电影的记忆里。在《电锯惊魂》的原版剧情中，Lawrence锯掉自己的脚后爬了出去。Adam被留在了浴室里。那个\"尸体\"——John Kramer——从地上坐了起来。Adam被锁在原地，John从他身边走过，关上了门，把Adam永远锁在了黑暗里。</p>\n<p>但在那个版本里——Adam没有走出浴室。</p>\n<p>而陈烬走出了。</p>\n<p>这意味着——John设计了另一个结局。</p>\n<p>「我得回去。」陈烬说。</p>\n<p>Ripley的反应比他预想中更快：「回哪里？」</p>\n<p>「浴室。」</p>\n<p>三秒的沉默。</p>\n<p>Ripley用一种难以置信的目光看着他：「你说什么？」</p>\n<p>「如果我不回去——这个游戏永远结束不了。」陈烬说，「John Kramer的目的是制造一个完整的、闭环的实验。如果实验对象走出去了——他就不会关闭系统。他会一直调整，一直增加变量——直到你回到他设定的轨道上。」</p>\n<p>「你疯了。」Ripley说，声音很平稳，但语气是认真的，「我们出来了。我们救下了人。Lawrence还活着。我们可以带着这些人一起走——离开这栋楼，离开这座城市——你不需要再回到那间鬼知道还有没有陷阱的破浴室里。」</p>\n<p>「那然后呢？」陈烬问。</p>\n<p>Ripley没有立刻回答。</p>\n<p>「我们回到影城，进入下一个剧本。你活下来了——这就够了。」</p>\n<p>「不够。」陈烬说，「如果这个剧本是『未完成』的状态——下一场会怎么样？」</p>\n<p>Ripley沉默了。</p>\n<p>她们都知道答案。在影城里，未完成的剧本会留下\"欠账\"。有些玩家为了止损，强行退出未完成的任务——结果在下一场游戏里，系统的难度会被成倍提升。有人说这是因为\"观众不满意\"。有人说是系统的惩罚机制。没有人知道确切的原因，但没有人愿意去验证。</p>\n<p>「而且——」陈烬说，声音变得很轻，「John Kramer说过一句话。他说——『钥匙在你身体里』。」</p>\n<p>Ripley皱了皱眉：「什么意思？你理解那句话了？」</p>\n<p>「我不确定。」陈烬说，「但我在想——他说的不是字面上的钥匙。他说的是某种——隐喻。」</p>\n<p>他回想起浴室里的画面。</p>\n<p>他自己的身体。他身上的伤疤——那些从《异形》世界里带回来的还在隐隐作痛的伤口。他脚上的铁链。那个\"尸体\"躺在浴室的正中央。</p>\n<p><em>钥匙在你身体里。</em></p>\n<p>陈烬的目光落在自己的手臂上。</p>\n<p>他皮肤下——静脉的走向——那些他作为消防员时留下的旧疤痕和他作为电影玩家时得到的新疤痕交织在一起。</p>\n<p>然后他明白了。</p>\n<p>「原来如此。」他低声说。</p>\n<p>「明白了什么？」Ripley问。</p>\n<p>陈烬转过头，看着Ripley的眼睛：「John说的『钥匙』——不是用来开锁的金属片。他说的是——我。我自己的身体。」</p>\n<p>「什么意思？」</p>\n<p>「Adam的位置——」陈烬说，「原剧情里，Adam被锁在浴室里。他唯一能逃出去的方式就是杀死Lawrence或者被Lawrence杀死。但在这个版本里，我没有被锁在原地——我走出去了。但走出去的『陈烬』——」他的手按在自己的胸口上，「——已经不是Adam了。」</p>\n<p>「你把我绕晕了。」</p>\n<p>「简单来说——」陈烬说，「John设计这个游戏的原始逻辑，需要有一个『留在浴室里的人』。那个人必须承受游戏的结局。不管那个人是死是活——他需要一个闭环。」</p>\n<p>「所以如果你不回去——」</p>\n<p>「那Lawrence就不能『完成』他的游戏。John的目的就无法实现。」陈烬走到沙发旁，把那把左轮手枪拿起来，检查了一下弹仓——还剩三发子弹，「我需要回去。我需要让Lawrence亲眼看到——他自由了。」</p>\n<p>Ripley看着他。</p>\n<p>「你有多少时间？」</p>\n<p>陈烬看了一眼表。</p>\n<p>5:28 PM。</p>\n<p>「从这里跑回那栋废弃医院——大概十五到二十分钟。如果我够快的话，我能在五十分左右到达。」他说，「我还有十分钟处理里面的情况。」</p>\n<p>「你一个人回去？」</p>\n<p>「你留下来——保护她们。」陈烬看了一眼Alison和Diana，「如果Zep没有其他同伙，这里应该是安全的。但如果有人来了——你比我能打。」</p>\n<p>Ripley没有反驳。</p>\n<p>她点了点头：「回来的时候——活着。」</p>\n<p>「我尽量。」陈烬说。</p>\n<p>他走到门口，停了一下。</p>\n<p>他回头看了一眼沙发上的Diana——那个小女孩已经停止了哭泣，正抱着她妈妈的手臂，用一双红肿的眼睛看着他。</p>\n<p>「叔叔——你要去哪？」</p>\n<p>陈烬看着她。</p>\n<p>他想说\"我马上回来\"。但他不想对一个八岁的孩子撒谎。</p>\n<p>「叔叔要去办一件事。」他说，「你帮妈妈看家，好不好？」</p>\n<p>Diana点了点头，眼睛里带着一种只有孩子才会有的、毫无保留的信任。</p>\n<p>陈烬推开了门。</p>\n<p>傍晚的风吹在他脸上，带着一丝凉意。</p>\n<p>他迈出门槛，开始奔跑。</p>\n<p>5:30 PM。</p>\n<p>倒计时还在继续。</p>", "file": "022-倒数.md", "prev": 21, "next": 23}, {"num": 23, "title": "第二十三章 回归", "body": "<p>第二十三章 回归</p>\n<p>陈烬跑回废弃医院的路上，天色正在变暗。</p>\n<p>不是那种完整的黑夜——是黄昏与黑夜交界时那种灰蓝色的光，像被稀释的墨水洒在天空上。街灯还没亮，建筑在暮色里变成了一排排黑色的剪影。</p>\n<p>他的肺在烧。</p>\n<p>他跑了将近二十分钟，几乎不停歇。他的身体在抗议——肌肉里的乳酸在堆积，呼吸变得越来越浅，胃里翻涌着一股酸味。但他不能停。他每慢一步，时钟就向前跳一格。</p>\n<p>他拐过最后一个街角时，那栋废弃医院出现在视野中。</p>\n<p>在暮色里，它看起来比白天更加不祥。窗户是黑漆漆的，外墙的油漆大面积剥落，露出下面的灰色水泥。门诊大楼的门敞开着，像一个等待猎物走进来的巨口。</p>\n<p>陈烬没有从正门进去。</p>\n<p>他绕到侧面，找到了那个垃圾通道的出口——他和Ripley、Amanda逃出来的位置。通道的铁栅栏依然歪斜着，他侧身挤了进去。</p>\n<p>通道里比他记忆中更暗。荧光棒早就熄灭了。他用一只手扶着墙壁前进，脚下踩到了碎玻璃和不知名的液体，发出嘎吱嘎吱的声响。</p>\n<p>通道尽头——锅炉房的门依然虚掩着。</p>\n<p>他推开门，走进锅炉房。</p>\n<p>锅炉房里没有人。两个生锈的锅炉在昏暗的光线里矗立着，墙角的蜘蛛网在气流中微微晃动。</p>\n<p>陈烬没有停留。他穿过锅炉房，走进通往二楼的楼梯间。</p>\n<p>楼梯间的墙壁上有着新的痕迹——弹孔。三个弹孔呈一条直线分布在墙上，像是有人在楼梯上被追着开枪射击。弹孔周围的墙壁上还有暗色的喷溅状痕迹——血迹。但血已经干了，不是新鲜的。</p>\n<p>他没有时间去研究这些弹孔的来源。</p>\n<p>他爬上了二楼。</p>\n<p>走廊。</p>\n<p>那条他几个小时前走过的走廊。</p>\n<p>现在看起来完全不一样了——不是因为光线变了，是因为他走过的路上多了几样东西。一扇门大敞着。门框上沾满了黑色的、粘稠的液体。门里的房间——就是他之前听到机械哭声和爆炸声的那间——里面的一切都被烧成了焦黑色。墙壁上的绝缘材料融化后凝固成了诡异的不规则形状。</p>\n<p>Mark的房间。那个在易燃陷阱里的男人。</p>\n<p>他已经不在那里了。</p>\n<p>空气中弥漫着一股烧焦的蛋白质气味——陈烬太熟悉那种气味了。每一场火灾之后，都会留下那种气味。不是肉体，不是塑料——那是生命被烧尽之后的余味。</p>\n<p>陈烬的目光没有在那扇门里停留太久。</p>\n<p>他继续走。</p>\n<p>经过Paul的房间——门关着。里面没有声音。陈烬不知道自己答应过要回来找他的那个人是否还活着。他不知道自己是否有时间回来找他。</p>\n<p>他只能继续走。</p>\n<p>走廊尽头——浴室的门。</p>\n<p>那扇门和他离开时一模一样。白色的漆面，金属把手，门缝下透出一线惨白的光。</p>\n<p>陈烬在门前站了三秒。</p>\n<p>他听到门里有声音——一个男人的呼吸声。沉重的，带着压抑的喘息。</p>\n<p>Lawrence还在里面。</p>\n<p>陈烬伸手，握住了门把手。</p>\n<p>他推开了门。</p>\n<p>灯光洒出来，落在他的脸上。</p>\n<p>浴室里的景象几乎没有变。</p>\n<p>Lawrence Gordon坐在墙角，背靠着瓷砖。他的脚踝上还锁着那根铁链——锈迹斑斑的铁链连接着水管，看起来就像几个小时前一样。但他的脸色比陈烬离开时更差了。苍白的额头上布满了冷汗，嘴唇干裂，眼睛下面有深色的阴影。</p>\n<p>他正在盯着地上的那把锯子。</p>\n<p>听到开门声，他猛地抬起头。</p>\n<p>他的目光和陈烬对上了。</p>\n<p>「你——」Lawrence的声音沙哑得几乎说不出完整的句子，「我操……你回来了……」</p>\n<p>「你的家人安全了。」陈烬说，走进浴室，关上了身后的门，「Amanda和Alison在一起。Ripley也在。Zep被制服了。Diana——」他说到这个名字的时候放慢了声音，「她很好。她哭了一场，但她在喝热水。她问爸爸什么时候回来。」</p>\n<p>Lawrence的眼眶一下子红了。</p>\n<p>他低下头，眼泪顺着鼻梁滴落在地板上。他没有发出声音——他是那种不会在孩子面前哭、但会在无人的浴室里哭得浑身发抖的父亲。</p>\n<p>「谢谢。」他说，声音含混不清，「谢谢……谢谢……」</p>\n<p>陈烬让他哭了几秒钟。</p>\n<p>然后他走到浴室中央，站在那个\"尸体\"面前。</p>\n<p>尸体依然躺在那里——裹着一条血迹斑斑的毯子，皮肤呈现不健康的灰白色。他的头发稀薄而灰白，脸上的皱纹在日光灯的照射下显得格外深刻。他的眼睛闭着，嘴唇微微张开，像一具真正的尸体。</p>\n<p>陈烬低头看着他。</p>\n<p>「他需要知道——」Lawrence说，声音已经开始从情绪中恢复，「他需要知道游戏结束了。」</p>\n<p>陈烬摇了摇头。</p>\n<p>「还没结束。」他说。</p>\n<p>Lawrence愣住了：「什么意思？」</p>\n<p>陈烬没有回答Lawrence。</p>\n<p>他蹲下来，在\"尸体\"旁边蹲下。</p>\n<p>他看着那张闭着眼睛的脸，然后他开口说了一句话。</p>\n<p>「起来吧，John。游戏结束了。」</p>\n<p>三秒的沉默。</p>\n<p>浴室里只有日光灯管发出的嗡嗡声。</p>\n<p>然后——</p>\n<p>那个\"尸体\"睁开了眼睛。</p>\n<p>Lawrence的身体猛地弹了一下——铁链被拉直，发出刺耳的金属声。他的嘴里发出一声压抑的、从胸腔最深处挤出来的叫声——不是恐惧，是一种本能的、面对不可思议之事时的生理反应。</p>\n<p>John Kramer坐了起来。</p>\n<p>他动作很慢，很稳，像一个刚刚从午睡中苏醒的老人。毯子从他的肩膀上滑落，露出他里面穿着一件洗得发白的衬衫。他的手指修长而枯瘦，像一具骨架外面包裹着一层薄薄的皮肤。</p>\n<p>他的目光落在陈烬脸上。</p>\n<p>那目光——不像一个\"被揭穿\"的人。没有慌乱，没有愤怒，没有被冒犯的惊讶。</p>\n<p>那是一个科学家看到意料之外的实验结果时的目光。</p>\n<p>冷冰冰的。好奇的。</p>\n<p>「你是怎么知道的？」</p>\n<p>John的声音和他磁带里的一模一样。缓慢的，低沉的，像安魂曲的旋律。</p>\n<p>「因为我看过你的电影。」陈烬说，「全部。」</p>\n<p>John的眼睛里没有任何困惑。他听到这句话的时候，嘴角甚至动了一下——一个近乎微笑的表情。</p>\n<p>「电影。」他重复了这两个字，「你说我的生命——是一部电影？」</p>\n<p>「不止是你的。」陈烬说，「所有的一切。」</p>\n<p>John盯着他看了很久。</p>\n<p>然后他说：「那么，在这个电影里，结局是什么样的？」</p>\n<p>「那取决于你。」陈烬说。</p>\n<p>John慢慢地、用一只手撑住地面，站了起来。</p>\n<p>他站起来的时候，Lawrence本能地向后缩了一下。Lawrence的脸上写满了震惊和困惑——这个他在几个小时前还以为是尸体的男人，现在正活生生地站在他面前。他无法理解。他的认知框架在坍塌。</p>\n<p>但John没有看他。John的目光始终锁定在陈烬身上。</p>\n<p>「你救了Lawrence的家人。」John说，语气平淡得像在陈述天气预报，「你救了他。你救了Amanda。你救了Zep——虽然他不配被救。你做了很多我没想到的事。」</p>\n<p>「我做了正确的事。」陈烬说。</p>\n<p>「正确。」John重复了这两个字，然后他笑了——一个极淡的、几乎察觉不到的笑意，「在我的游戏里，『正确』是一个很复杂的概念。」</p>\n<p>墙上的挂钟发出轻轻的滴答声。</p>\n<p>5:47 PM。</p>\n<p>还剩十三分钟。</p>\n<p>「我没有太多时间。」陈烬说，「你说过——钥匙在我的身体里。」</p>\n<p>「是的。」</p>\n<p>「我现在明白了。」陈烬说，「你说的不是钥匙。你说的是选择。」</p>\n<p>John的目光亮了一瞬——像火光在即将熄灭的蜡烛上跳动了一下。</p>\n<p>「你比我想象中更聪明。」John说，「你不仅走出了我的游戏——你看穿了它。」</p>\n<p>他伸出手——他枯瘦的手指上，捏着一把小钥匙。</p>\n<p>金属的。普通的不锈钢钥匙。</p>\n<p>「这是你铁链的钥匙。」John说，「一直在我口袋里。」</p>\n<p>陈烬接了钥匙。</p>\n<p>他的手很稳。</p>\n<p>他走到墙边，俯身把钥匙插进锁孔。</p>\n<p>「咔哒——」</p>\n<p>铁链解开了。</p>\n<p>Lawrence的脚踝终于自由了。但他没有站起来。他只是坐在那里，看着这一切，像一个在看一场不属于他的电影的观众。</p>\n<p>陈烬直起身，转身看向John。</p>\n<p>「你放我走？」他问。</p>\n<p>「我没有『放』你走。」John说，「你赢了你自己的游戏。我只是承认了你的胜利。」</p>\n<p>他背着手，站在浴室中央——一个癌症晚期的老人，穿着洗得发白的衬衫，站在一间肮脏的、充满血污的浴室里。但他站在那里，就像站在自己的王座上。</p>\n<p>「但你还没有完全走出这场游戏。」John说，「你现在有两个选择——」</p>\n<p>「不。」陈烬打断了他，「我有三个选择。」</p>\n<p>John的眉毛微微动了一下。</p>\n<p>「第一——」陈烬说，「我带着Lawrence离开。这栋楼里还有其他人——那些你『过去的作品』。我可以找他们，救他们，带他们一起走。」</p>\n<p>「第二——」他把那把左轮手枪从腰间抽出来，举在身前，枪口没有指向John，但也没有指向地面，「我现在就在这里——一枪打死你。你死了，你的游戏就结束了。」</p>\n<p>John没有说话。</p>\n<p>「第三——」陈烬说，「我把枪放下。我们两个——以一个平等的身份——说几句话。」</p>\n<p>John看着陈烬的眼睛。</p>\n<p>然后在那一刻——John Kramer做了一件在他的所有磁带、所有陷阱、所有游戏中从未做过的事。</p>\n<p>他点了点头。</p>\n<p>「那就说几句话。」他说。</p>", "file": "023-回归.md", "prev": 22, "next": 24}, {"num": 24, "title": "第二十四章 对话", "body": "<p>第二十四章 对话</p>\n<p>浴室里的灯光发出持续不断的嗡嗡声。</p>\n<p>陈烬放下了枪。</p>\n<p>他把那把左轮手枪放在地上——不是放在John够得着的地方，也不是放在Lawrence身边。他放在了浴室中央，那块血迹最浅的地砖上。</p>\n<p>然后他靠着洗手台站定。</p>\n<p>John Kramer靠在对面墙边。他站着的时候，能看出来他的身体已经非常虚弱了——他的皮肤泛着病态的灰黄色，手指尖端的指甲呈现轻微的绀紫色。那是癌症晚期的体征。他的身体正在从内部被缓慢地吞噬。</p>\n<p>但他的眼睛——那双眼睛没有一丝病人的浑浊。它们像两块被打磨过的燧石，冷而锐利。</p>\n<p>「你说你知道我的一切。」John说，「那你说说——我是谁？」</p>\n<p>「John Kramer。」陈烬说，「土木工程师。拥有三个专利——其中一个是关于医院安全门锁系统的改良设计。喜欢下国际象棋。有一个前妻，叫做Jill Tuck。你在跟她分开之后发现自己得了脑癌——右额叶的胶质母细胞瘤，第四期。」</p>\n<p>John的表情没有变化。但他的目光变得更深了。</p>\n<p>「还有呢？」</p>\n<p>「你曾经是一个想要制造一个『时间胶囊』的人。」陈烬说，「用你自己的话来说——你想给那些不懂得珍惜生命的人一个机会，让他们在失去一切之前，重新认识到生命的价值。」</p>\n<p>「听起来像是一个好人的故事。」John说。</p>\n<p>「但好人不把人关进房间里逼他们锯自己的脚。」陈烬说。</p>\n<p>John的嘴角微微上扬。</p>\n<p>「你看穿了我的表象——那你知不知道我做这一切的真正原因？」</p>\n<p>「你以为是教育。」陈烬说，「但我认为——不是。」</p>\n<p>「哦？」John的声音里带着一种真实的兴趣，「那你认为是什么？」</p>\n<p>「是控制。」</p>\n<p>这两个字落在空气中，像一块石头砸进平静的水面。</p>\n<p>「你得了癌症，John。你控制不了你自己的生命——它正在从你体内流逝。所以你要控制别人的生命。你要决定谁活、谁死、谁值得被你『救赎』。」</p>\n<p>陈烬的声音很平静，但他每一个字都带着一种直刺核心的锋利。</p>\n<p>「你说你是在给人们选择——但你的游戏里从来没有什么真实的选择。你设计的每一个陷阱，结局都已经写好了。你只是让受害者以为自己有选择——这样他们的失败就成了他们自己的责任，而不是你的。」</p>\n<p>John没有立刻回答。</p>\n<p>他看着陈烬，沉默了很长一段时间。</p>\n<p>然后他说了一句话——</p>\n<p>「你说对了一半。」</p>\n<p>「哪一半？」</p>\n<p>「我开始这个游戏——确实是从『教育』开始的。」John说，「我的第一个受害者——一个即将出狱的男人。他偷了我的钱包。我跟着他，观察了他整整三个月。他比我见过的大多数人都更值得被拯救。我设计了一个简单的测试——他只需要在一分钟内从着火的房间里走出来。他在四十秒内就跑出来了。」</p>\n<p>John的声音里带着一种罕见的温度——像是回忆一段珍贵的记忆。</p>\n<p>「他后来怎么样？」</p>\n<p>「他开了一家自己的店。」John说，「一年后他娶了他的女友。两年后他有了一个孩子。五年后——他给一个慈善机构捐了一大笔钱。」</p>\n<p>「所以你的实验成功了。」陈烬说，「那你为什么不满足于这个结果？」</p>\n<p>John的目光变冷了。</p>\n<p>「因为不是每一个人都像他一样。」他说，「我测试了更多的人。一百个。大约只有十分之一的人活了下来。而活下来的人中——大约只有一半真正改变了他们的人生。」</p>\n<p>「实验失败了，所以你加大了剂量。」陈烬说，「更难的陷阱，更残忍的选择。你把受害者从『陌生人』变成了『熟悉的人』——从普通的罪犯变成了Lawrence Gordon那样、有家庭、有事业、有社会地位的人。因为你想证明——你不仅能让社会的底层改变，你也能让那些自以为站在社会金字塔顶端的人跪下来。」</p>\n<p>John没有说话。</p>\n<p>但他的手——那双枯瘦的手——在身侧微微握了一下。</p>\n<p>陈烬看到了这个细微的动作。他知道他击中了靶心。</p>\n<p>「你说你是在帮人们珍惜生命。」陈烬说，声音变得更轻了一些，「但你在帮他们之前，先剥夺了他们的一切。你把一个人逼到绝境——逼到想要自杀的程度——然后再给他们一根稻草让他们攀附。然后他们说——『谢谢你救了我』。」</p>\n<p>「但他们确实获得了新生。」John说。</p>\n<p>「如果你在一栋楼里放了一把火——然后再把火扑灭——你不会被认为是火灾的受害者。」陈烬说，「你只会被认为是放火的人。」</p>\n<p>浴室里重新安静了下来。</p>\n<p>日光灯管的嗡嗡声在两人之间回荡。</p>\n<p>Lawrence坐在墙角，他没有说话。他只是一个旁观者。但他听得非常专注——他看到了一个真实的、正在发生的对话。不是猎人和猎物的对话，是两个在智力上平等的人的对话。</p>\n<p>John Kramer沉默了将近三十秒。</p>\n<p>然后——</p>\n<p>他笑了。</p>\n<p>不是之前那种极淡的、几乎察觉不到的笑意。这一次——他笑得很明显。他的嘴唇完全张开了，露出了里面一排整齐的、但已经开始泛黄的牙齿。他的眼睛里有光——不是病态的光，是一种纯粹的、发自内心的对这个时刻的欣赏。</p>\n<p>「你是对的。」John说。</p>\n<p>陈烬没有动。</p>\n<p>「你说对了一些——」John说，「但不是全部。我承认——控制欲是我的动机之一。但我不是唯一的。你忘了一个最简单的理由——」</p>\n<p>「什么？」</p>\n<p>「好玩。」</p>\n<p>这两个字从John Kramer——竖锯——的嘴里说出来，带着一种令人毛骨悚然的真诚。</p>\n<p>「我做这些事——不只是因为我想教育别人。不只是因为我想控制别人。也因为——」他看着陈烬的眼睛，「——它是我在这个世界上唯一还能感受到『活着』的时刻。」</p>\n<p>陈烬没有说话。</p>\n<p>「当你被确诊为第四期癌症的时候——」John说，「你生命中的一切都会失去颜色。食物的味道。阳光的温度。秋风吹过脸颊的感觉。甚至连疼痛都会失去它作为『活着』的信号的意义——你只知道你在痛，但你分不清你是在活着还是在死去。」</p>\n<p>他说话的时候，他的声音不再像磁带里那样机械而平稳。那里面多了一层东西——一层薄薄的、几乎难以察觉的裂缝。</p>\n<p>「只有在我观察他们的眼睛时——在我看到他们从绝望到希望、从放弃到挣扎的那一刻——我才重新感受到——心跳的声音。」</p>\n<p>陈烬看着John。</p>\n<p>在那一秒钟里，他看到的不再是竖锯——那个被塑造成都市传说的、像死神一样的男人。</p>\n<p>他看到一个老人。一个正在慢慢死去的、用自己的方法对抗虚无的老人。</p>\n<p>「我能问你一个问题吗？」陈烬说。</p>\n<p>「你问了。」John说。</p>\n<p>「如果你在我面前——你最想问什么？」</p>\n<p>John的眼睛眯了起来。</p>\n<p>他看着陈烬，目光从上到下，从左到右，像是在扫描一个他永远无法完全理解的东西。</p>\n<p>「你是谁？」John问。</p>\n<p>「我叫陈烬。」</p>\n<p>「不对。」John说，他的声音突然变得非常轻，轻到像是怕被第三者听到，「你的档案上说你是一个消防员——三年前死于火灾。但你站在这里——你告诉我看过我的『电影』——你知道我的过去——你甚至知道我的前妻叫Jill Tuck——这个名字我从来没有在任何磁带里提起过。」</p>\n<p>「我是——」</p>\n<p>「我不想听你的解释。」John打断了他，「我想知道的是——」</p>\n<p>他向前走了一步。离陈烬更近了。</p>\n<p>「你——来到我的游戏里——是有人派你来的吗？」</p>\n<p>陈烬看着John的眼睛。</p>\n<p>那双眼睛里有好奇，有戒备，有期待——还有一种陈烬没有想到的东西。</p>\n<p>恐惧。</p>\n<p>John Kramer在恐惧。</p>\n<p>他恐惧自己不是这个世界的中心。他恐惧自己的游戏——他唯一的遗产——只是某个更大的力量的一个小小零件。</p>\n<p>「没有人派我来。」陈烬说，「我是自己来的。」</p>\n<p>John盯着他，像是在分辨这句话的真假。</p>\n<p>然后他慢慢地、点了点头。</p>\n<p>「我相信你。」他说。</p>\n<p>他从口袋里掏出一样东西——一把小钥匙。和刚才用来解开Lawrence铁链的钥匙不同，这把钥匙是金色的，古老的，表面有细微的锈迹和金黄色的氧化斑点。</p>\n<p>「这是什么？」陈烬问。</p>\n<p>「你离开这个游戏的通行证。」John说，「但也是最危险的东西之一。」</p>\n<p>陈烬没有接。他等John继续解释。</p>\n<p>「∞影城。」John说出了这两个字，「我知道它。」</p>\n<p>陈烬的心脏猛地跳了一下。</p>\n<p>「你怎么知道——」</p>\n<p>「因为我不是第一次遇到你这样的人。」John说，「在过去的五年里——有三个人——从我的游戏里消失了。」</p>\n<p>「消失了？」</p>\n<p>「他们在我的游戏里活了下来。然后——当晚——他们从我的监控里消失了。不是逃跑了——是在我的监控画面上直接『蒸发』了。留下了一堆没有处理完的试剂和工具——像是中途离开了这个世界。」John的目光变得意味深长，「我一直怀疑——我的世界不是唯一的世界。」</p>\n<p>陈烬接过了那把金色的钥匙。</p>\n<p>钥匙入手的那一刻——</p>\n<p>他的视野右上角浮现出一行字：</p>\n<p><strong>隐藏道具获得：竖锯的馈赠</strong>\n<strong>——\"当你需要离开一场游戏时，这把钥匙会为你打开一扇不属于这个世界的门。\"</strong>\n<strong>效果：允许在任意剧本中强制退出一次，不触发惩罚机制。一次性道具。</strong></p>\n<p>陈烬握紧了那把钥匙。</p>\n<p>John看着他脸上的微表情变化，笑了一下：「看来你收到了使用说明。」</p>\n<p>「你为什么给我这个？」陈烬问。</p>\n<p>「因为你让我觉得——这场游戏还有续集。」John说，「而我想看看续集怎么演。」</p>\n<p>他转身，走向通往走廊的那扇门。</p>\n<p>他的脚步很慢——每一次迈步都像是一次耗费巨大精力的动作。但他的背挺得很直。</p>\n<p>他走到门口的时候，停了一下。</p>\n<p>「陈烬——」</p>\n<p>「嗯。」</p>\n<p>「下次见面的时候——希望你能告诉我，我是一个什么样的人。」</p>\n<p>陈烬看着John的背影。</p>\n<p>「你会觉得不甘心吗？」陈烬问，「——你做了这么多，设计了这么多，但在我的『电影』里，你只是一个篇章的反派。」</p>\n<p>John偏过头。</p>\n<p>从侧面看过去，陈烬只能看到他半边脸——和那只灰蓝色的、像冬日湖面一样冷冽的眼睛。</p>\n<p>「每一部好的电影——都需要一个好的反派。」John说，「而我知道——我演得很好。」</p>\n<p>他走出浴室。</p>\n<p>脚步声沿着走廊渐行渐远。</p>\n<p>最后——彻底消失了。</p>\n<p>陈烬站在原地，手里握着那把金色的小钥匙。</p>\n<p>Lawrence从地上站起来，一只手撑着墙，一瘸一拐地走到门口：「走？他不关我们了？」</p>\n<p>「不关了。」陈烬说，「这场游戏——结束了。」</p>\n<p>他把那把左轮手枪从地上捡起来，把金钥匙放进最里面的口袋。</p>\n<p>然后他回头看了一眼那间浴室——</p>\n<p>那间他第一次醒来时充满了血腥味和恐惧的浴室。</p>\n<p>现在它只是一间空荡荡的、肮脏的房间。</p>\n<p>墙上的挂钟。</p>\n<p>5:57 PM。</p>\n<p>还剩三分钟。</p>", "file": "024-对话.md", "prev": 23, "next": 25}, {"num": 25, "title": "第二十五章 结算", "body": "<p>第二十五章 结算</p>\n<p>陈烬和Lawrence走出医院大门的时候，天空彻底暗了下来。</p>\n<p>不是全黑——城市上空的灯光反射在云层上，形成一种暗橙色的光污染。街灯已经亮了，在柏油路面上投下一排排黄色光晕。远处有车声，有人声，有城市在夜晚的心跳声。</p>\n<p>两个男人站在废弃医院的门诊大楼外，仰头看着那栋在夜晚看起来像一具巨大尸体的建筑。</p>\n<p>Lawrence的脚踝上还有镣铐留下的红肿痕迹。他赤着一只脚——他的鞋在浴室里不知道掉到哪里去了——踩在粗糙的柏油路面上，但他好像感觉不到疼。他只是站在那里，呼吸着外面的空气。</p>\n<p>「我不知道该怎么感谢你。」Lawrence说。</p>\n<p>「不用感谢。」陈烬说，「你欠我的不是感谢——是以后多陪陪Diana。」</p>\n<p>Lawrence转过头看着他，愣了一下，然后笑了——一个疲惫的、从劫后余生中挤出来的笑。</p>\n<p>「你说得对。」他说，「这是我最该做的事。」</p>\n<p>远处传来脚步声。</p>\n<p>Ripley从街角出现——她的步伐依然警惕，手里握着那把电击手枪。她看到陈烬和Lawrence站在医院门口的时候，脚步顿了一下，然后把枪放了下来。</p>\n<p>「你——」她走到陈烬面前，上下打量了他一眼，「你真的活下来了？」</p>\n<p>「我还跑回去了一次。」陈烬说，「总不能白跑。」</p>\n<p>Ripley看着他，摇了摇头。</p>\n<p>「你是我见过的最不要命的混蛋。」她说——但她的语气里有一种无法掩饰的、类似于安心或者敬佩的东西。</p>\n<p>「Amanda和Gordon家的人呢？」陈烬问。</p>\n<p>「在三条街外的一个便利店里。我给她们买了吃的——Amanda需要处理一下脚上的伤口，Diana饿了。」Ripley说，然后她看了看四周，「竖锯呢？」</p>\n<p>「走了。」陈烬说。</p>\n<p>「走了？」</p>\n<p>「他说——这场游戏结束了。」</p>\n<p>Ripley的眉头皱了一下，但她没有追问。</p>\n<p>就在那一刻——</p>\n<p>陈烬的视野突然闪烁了一下。</p>\n<p>不是视觉上的闪烁——是一种意识层面的\"顿挫\"。像是一段电影在播放时卡了一帧，然后恢复正常。</p>\n<p>然后，一行金色的文字浮现在他的视野正中央。</p>\n<p><strong>∞影城·剧本结算</strong></p>\n<p><strong>剧本：《电锯惊魂》（Saw）</strong>\n<strong>难度：B级 → 实际触发A级隐藏要素</strong>\n<strong>完成状态：主线完成 ✅</strong></p>\n<p>他的视野里开始滚动出一行行信息。</p>\n<p><strong>主线任务判定：</strong>\n- 存活至游戏结束 → 完成\n- 阻止Lawrence Gordon锯脚 → 完成（支线1）\n- 拯救Gordon家庭（Alison &amp; Diana） → 完成（支线2）\n- 拯救Amanda Young → 完成（支线3）\n- 击破竖锯的游戏逻辑（揭穿本体身份） → 完成（隐藏任务：触发！）\n- 与John Kramer正面对话并获得其承认 → 完成（隐藏任务：额外判定）</p>\n<p><strong>评分：A级</strong></p>\n<p>陈烬的呼吸停了一瞬。</p>\n<p>A级。在B级剧本里拿到A级评分——这在这座影城里，不是常有的成绩。</p>\n<p>积分计算开始：</p>\n<p><strong>积分明细：</strong>\n- 基础通关（A级系数×1500）：4500点\n- 支线1：阻止锯脚：1500点\n- 支线2：拯救家庭：1500点\n- 支线3：拯救Amanda Young：1500点\n- 隐藏任务：对竖锯揭示真相：2000点\n- 隐藏任务额外判定：获得竖锯承认：2000点\n- 无队友死亡（Ripley存活、Amanda存活）：额外1000点\n- 二度进入核心区域（折返浴室）：500点</p>\n<p><strong>总计：8500点</strong></p>\n<p><strong>特殊奖励：</strong>\n- 导演票根（碎片 2/7）已存入背包\n- 解锁称号：「竖锯的观众」\n- 解锁道具：竖锯的馈赠（金色钥匙，强制退出权限，一次性）</p>\n<p><strong>获得称号：竖锯的观众</strong>\n效果：在含有\"封闭空间\"要素的剧本中，感知判定+15%，首次陷阱类攻击必闪避一次。</p>\n<p>陈烬看着那行字，没有说话。</p>\n<p><em>竖锯的观众。</em></p>\n<p>他不知道这个称号意味着什么——但\"观众\"这两个字，让他想起了那些在影城看台上注视着他的眼睛。</p>\n<p>积分滚动结束后，最后一行信息浮现：</p>\n<p><strong>当前观众关注：115人</strong>\n<strong>较入场时增长：+40人</strong></p>\n<p>115人。</p>\n<p>比第一场多了40个人。</p>\n<p>这意味着——有人一直在看他。在暗处。</p>\n<p>陈烬关闭了系统界面。</p>\n<p>Ripley看着他脸上的表情变化，问：「结算了？」</p>\n<p>「嗯。」</p>\n<p>「多少分？」</p>\n<p>「8500。」</p>\n<p>Ripley的眉毛挑了一下：「A级？」</p>\n<p>「A级。」</p>\n<p>Ripley沉默了一会儿，然后轻声说了一句：「不错。」</p>\n<p>她说的\"不错\"，但从她的语气来看，陈烬知道——在《异形》世界里当过几十年大副的女人，很少用\"不错\"这个词来形容任何事。当她用这个词的时候，意思是\"非常他妈的好\"。</p>\n<p>Lawrence在旁边不明所以地看着两个人：「你们在说什么？」</p>\n<p>「没说什么。」陈烬说，「走吧——带我去见你女儿。」</p>\n<hr />\n<p>便利店的灯光在夜晚的城市里显得格外明亮。</p>\n<p>陈烬推开门的时候，一阵清脆的门铃声响起——\"叮咚——\"</p>\n<p>店里没有其他客人。只有一个穿着便利店围裙的店员在柜台后面低头玩手机。冰柜发出嗡嗡的运转声。空气里有一股关东煮的气味。</p>\n<p>Alison和Diana坐在靠窗的座位上。</p>\n<p>Diana的手里拿着一根草莓味的棒棒糖——已经有被舔过的痕迹。她看到Lawrence走进店门的时候，手里的棒棒糖掉在了桌子上。</p>\n<p>「——爸爸！」</p>\n<p>她跳下椅子，跌跌撞撞地跑向Lawrence。</p>\n<p>Lawrence蹲下来——蹲下的时候他的身体晃了一下，但他稳稳地接住了冲进他怀里的小女孩。</p>\n<p>「爸爸——爸爸我以为再也见不到你了——」Diana的哭声在便利店里回荡。</p>\n<p>Lawrence紧紧地抱着她，一句话也说不出来。</p>\n<p>他只是抱着。用他还在发抖的手臂，用他被锁了一个下午的脚，用一个父亲全部的力量。</p>\n<p>Alison站在他们身后，用手捂住了嘴。她没有哭出声——但眼泪顺着她的手指滴落。</p>\n<p>陈烬没有打扰他们。</p>\n<p>他走到便利店的最里面，在货架之间站了一会儿。他拿了一瓶水，一包压缩饼干——他需要碳水。然后他走到收银台前，把东西放在柜台上。</p>\n<p>店员这才抬起头——一个年轻的男孩，看起来不到二十岁。</p>\n<p>「五块五。」他说。</p>\n<p>陈烬摸了一下口袋。</p>\n<p>他没有钱。</p>\n<p>他来这个世界的时候，身上只有一把多功能战术刀、一个打火机、一把手术刀、一把左轮手枪——和一把金色的钥匙。</p>\n<p>年轻的店员看着他，又看了看他身上沾满血污和灰尘的衣服。</p>\n<p>「你——」店员的声音有些犹豫，「那个——你还好吗？」</p>\n<p>「挺好的。」陈烬说。</p>\n<p>一只手从旁边伸过来——拿着一枚皱巴巴的十元纸币。</p>\n<p>Ripley站在他身边，把钱放在柜台上：「不用找了。」</p>\n<p>店员看了看Ripley，又看了看陈烬，没有多问。他收了钱，找了零。</p>\n<p>陈烬拧开水瓶，喝了一大口。微温的、带着塑料味的饮用水。但他喝下去的时候，感觉像是在喝这个世界里最珍贵的液体。</p>\n<p>「Amanda呢？」陈烬问。</p>\n<p>「在后面的洗手间处理伤口。」Ripley说，「她自己说要一个人待一会儿。」</p>\n<p>陈烬点了点头。</p>\n<p>他靠在便利店冰柜旁边的墙上，咬着那包压缩饼干，看着窗外的街道。</p>\n<p>路灯下，飞蛾在光晕中盘旋。</p>\n<p>这座城市在他眼里看起来——有一种奇怪的亲切感。不是因为他喜欢这座城市，是因为他在这里死了一次，活了一次，又和这个世界上最危险的人之一讲过道理。</p>\n<p>他的手指摸到口袋里的那把金色钥匙。</p>\n<p>金属的触感——凉的，坚硬的。</p>\n<p><em>\"当你需要离开一场游戏时，这把钥匙会为你打开一扇不属于这个世界的门。\"</em></p>\n<p>他把钥匙放回口袋，抬起水瓶，又喝了一口。</p>\n<p>「团队在成长。」Ripley在他旁边说，也靠在冰柜上，「从两个人——变成五个人了。」</p>\n<p>「不算。」陈烬说，「Gordon一家不是玩家。他们只是这个世界的NPC。」</p>\n<p>「Amanda呢？」</p>\n<p>陈烬没有说话。</p>\n<p>Amanda Young——在原作中，她是竖锯的继承人。但在这个世界里，她还只是一个刚刚从毒气室里逃出来的年轻女人。</p>\n<p>她还没有成为竖锯的助手。还没有被John Kramer训练成那个冷酷的、没有感情的游戏执行者。</p>\n<p>她还有选择。</p>\n<p>便利店的洗手间门打开了。</p>\n<p>Amanda走了出来。</p>\n<p>她换了一双便利店买的便宜拖鞋，脚上缠着干净的白色纱布。她的脸上还带着伤——太阳穴两侧的瘀伤依然触目惊心。但她的眼神变了。</p>\n<p>那个在毒气室里尖叫的女人不见了。</p>\n<p>站在灯光下的，是一个重新学会呼吸的人。</p>\n<p>她走到陈烬面前，站住了。</p>\n<p>「我在毒气室里的时候——」她说，声音很小，但很稳，「我以为我会死在那里。我以为没有人会来找我。」</p>\n<p>陈烬没有说话。</p>\n<p>「然后你来了。」Amanda说，「你和一个不知道从哪里来的女人——撬开了那个该死的装置。」</p>\n<p>「不是我撬开的。」陈烬说，「是Ripley。」</p>\n<p>「但你是来找我的。」Amanda说，「你没有路过。你专门来找我的。」</p>\n<p>陈烬沉默了两秒，然后说：「我来找出口。但能找到你——是顺路。」</p>\n<p>Amanda看着他，眼眶微微泛红。</p>\n<p>然后她笑了——一个在这个充满了血和铁锈和死亡气味的世界里，罕见的、真实的笑容。</p>\n<p>「我能跟着你吗？」她问。</p>\n<p>陈烬看了看Ripley。</p>\n<p>Ripley耸了耸肩：「她比大多数人都能打。而且她知道这栋楼的结构——下一场可能用得上。」</p>\n<p>陈烬看向Amanda。</p>\n<p>「跟着我——会很危险。」</p>\n<p>「死了也比做竖锯的玩具强。」Amanda说。</p>\n<p>陈烬把最后一块压缩饼干塞进嘴里，嚼了嚼咽下去。</p>\n<p>然后他对着Amanda，点了点头。</p>\n<p>Amanda没有说谢谢。她只是站在那里，站在便利店惨白的灯光下，像一个刚刚拿到船票的人——还不知道船会开往哪里，但至少她知道，她不用再留在那个孤岛上等死了。</p>\n<p>陈烬转身，看向窗外的夜色。</p>\n<p>Gordon一家人还抱在一起。</p>\n<p>便利店的电视里正在播放晚间新闻——主持人正在播报一起发生在市区医院的\"可疑人员闯入\"事件。没有人注意到这间小小的便利店里，有一群刚刚逃出死亡游戏的人。</p>\n<p>系统的结算界面已经收起了。</p>\n<p>但他的视野右上角，还在闪烁着一个提示——他还没有打开。</p>\n<p>他伸出手指，在空中点了一下那道光。</p>\n<p>屏幕浮现。</p>\n<p><strong>下一场可选剧本已解锁：</strong></p>\n<p><strong>《生化危机》·第21次剧本演绎</strong>\n<strong>难度：A级</strong>\n<strong>推荐人数：2-4人</strong>\n<strong>剧情分支：多条可选</strong>\n<strong>世界线状态：常规</strong></p>\n<p>陈烬看着那行字。</p>\n<p>A级。</p>\n<p>比《电锯惊魂》高一个等级。</p>\n<p>他关掉了屏幕。</p>\n<p>窗外的夜色中，远处的天际线在霓虹灯下闪烁迷离。这座城市的夜晚，从来不缺少故事。</p>\n<p>而他——正在走进下一个。</p>", "file": "025-结算.md", "prev": 24, "next": 26}, {"num": 26, "title": "第二十六章 链接", "body": "<p>第二十六章 链接</p>\n<p>回到∞影城的过程，和陈烬记忆中一样——像一场无声的剪辑。</p>\n<p>上一秒，他还站在便利店的霓虹灯下，手里握着一瓶没喝完的矿泉水。</p>\n<p>下一秒——他站在了影城主厅的地板上，面前是那面从地板延伸到天花板的黑色商品墙。</p>\n<p>空间转换没有声音，没有特效，没有拉风的闪白。就像有人把一段胶片剪掉了中间的部分，把两帧画面直接拼在一起了。</p>\n<p>Ripley站在他右侧。她的姿态在空间转换后的第一秒就调整到位——从站立到警戒，用时不到半秒。她的目光扫过主厅的每一个角落，确认没有威胁，然后才放松下来。</p>\n<p>Amanda站在他左侧。</p>\n<p>她正在发抖。</p>\n<p>不是因为冷——是因为她刚刚从一个世界的现实中被抽离出来，丢进了另一个世界。她穿着便利店买的便宜拖鞋和一条Ripley在路上给她买的旧牛仔裤，站在∞影城的大理石地面上，像一个被传送到外星球的原始人。</p>\n<p>「这是——哪？」Amanda的声音有点发飘。</p>\n<p>「∞影城。」陈烬说，「一个——下班之后回来的地方。」</p>\n<p>「下班。」Amanda重复了这个词，用一种\"你在逗我吗\"的语气。</p>\n<p>「习惯就好。」Ripley说，「我第一次来的时候也没好到哪里去。」</p>\n<p>Amanda环顾四周。</p>\n<p>主厅比她想象中更大。天花板高得看不到尽头——上面是一片纯粹的黑色，像是空间在那里终止了。墙壁是深灰色的，没有任何装饰性的花纹或浮雕。只有那面商品墙在发出微光——一行行漂浮的文字在黑色背景上缓慢滚动，像是某种古老文明的公告栏。</p>\n<p>大厅中央的休息区，有几个人坐在那里。</p>\n<p>一个光头男人在一个角落里读一本书——封面是黑色的，没有标题。一个女人坐在对面的沙发上，面前悬浮着一块半透明的蓝色屏幕，她的手指在空气中滑动，像是在浏览什么东西。她看了一眼新进来的三个人，目光在Amanda身上停了一秒，然后移开了。</p>\n<p>像在一间繁忙的候机大厅里打量新来的人——没什么恶意，也没什么兴趣。</p>\n<p>陈烬看到了疤脸男人。</p>\n<p>他坐在休息区最远处的一张扶手椅上，面前放着一杯冒着热气的咖啡。他看起来一直在等他们——虽然他的表情和姿势都表明他只是在喝咖啡。</p>\n<p>「你回来了。」疤脸男人说，语气平淡。</p>\n<p>「我回来了。」陈烬说。</p>\n<p>「还带了新人。」疤脸男人的目光移向Amanda，「Amanda Young——竖锯的幸存者。我记得你的简历。」</p>\n<p>Amanda的身体绷紧了一瞬：「你怎么认识我？」</p>\n<p>「在这里待久了——你什么都会知道一点。」疤脸男人端起咖啡喝了一口，「不用紧张。这里是安全的。比你的世界里任何一个地方都安全。」</p>\n<p>他放下咖啡杯，转向陈烬：「A级。8500分。在B级剧本里拿了A。你让我有点惊讶了。」</p>\n<p>「你怎么知道我的结算？」陈烬问。</p>\n<p>「因为这里所有人都知道。」疤脸男人说，他的目光扫了一眼大厅里的其他人——那些看似在忙各自事情的人，「你觉得他们坐在这里——真的是在看书？」</p>\n<p>陈烬没有转身。但他感觉到了。</p>\n<p>那些目光。</p>\n<p>来自不同方向的目光——不全是敌意的，但全都是在他身上停留了超过正常限度的目光。</p>\n<p>他——一个从B级剧本里走出来、拿了A级评分、还带了一个NPC回来的新人——正在被这座影城里的老玩家们重新评估。</p>\n<p>「你的观众在涨。」疤脸男人说，「115人。第二场就有这个数字——你知道这意味着什么吗？」</p>\n<p>「什么？」</p>\n<p>「有人在押你。」</p>\n<p>陈烬的眉头微微皱了一下：「什么意思？」</p>\n<p>疤脸男人没有直接回答。他站了起来，绕过扶手椅，走到陈烬面前。</p>\n<p>「影城不只是一个让你刷分的地方。」他说，声音压得很低，「影城是一座剧场。你在台上演——有人在台下看。有些观众——不满足于只看。」</p>\n<p>「他们想做什么？」</p>\n<p>「想让你赢。或者——想让你输。」疤脸男人的嘴角动了一下，那个表情介于笑和警告之间，「你选了《生化危机》？」</p>\n<p>「还没选。」</p>\n<p>「你会选的。」疤脸男人说，「A级——适合你现在的进度。别太早去S级——你还没有准备好。」</p>\n<p>陈烬没有回答。</p>\n<p>疤脸男人看了一眼Amanda，又说：「你带回来的人——她需要登记。去商品墙那边，用你的权限帮她注册。系统会把她和你绑定。」</p>\n<p>他说完这些话，转身走回了他的座位，端起了他的咖啡。</p>\n<p>对话结束了。</p>\n<p>陈烬站在主厅中央，站了几秒钟。</p>\n<p>然后他走向商品墙。</p>\n<hr />\n<p>商品墙的界面在他靠近时自动亮起。</p>\n<p>陈烬调出了队友绑定功能——这是他在第一场结束后买的NPC绑定契约的附加权限。系统提示他：是否将「Amanda Young」注册为永久队友？</p>\n<p>他看了一眼站在他身后的Amanda。</p>\n<p>她站在商品墙前，被墙上浮动的文字吸引住了。她伸出手，手指穿过那些发光的字符——字符在她的手指周围像水波纹一样散开，然后又聚合在一起。</p>\n<p>「这些东西——」Amanda说，「是真的吗？」</p>\n<p>「真的。用积分换的。」陈烬说，「积分——就是你在这场游戏里完成任务的奖励。」</p>\n<p>「我能换到什么？」</p>\n<p>「很多东西。」陈烬说，他顿了顿，「——前提是你活下来。」</p>\n<p>Amanda转过头看着他。</p>\n<p>她的目光里有种陈烬曾经在某个镜像中看到过的东西——不是狂热，不是崇拜，是一种更原始的、属于幸存者的决心。</p>\n<p>「我不会死的。」Amanda说，「至少在帮你做完我该做的事之前。」</p>\n<p>陈烬看着她，点了点头。</p>\n<p>然后他在系统界面上按下了确认键。</p>\n<p><strong>✔ 玩家「Amanda Young」已注册为永久队友。</strong>\n<strong>绑定关系：陈烬→Amanda Young（从属）</strong>\n<strong>初始积分：300（赠送）</strong>\n<strong>初始状态：普通人类·无强化</strong></p>\n<p>系统又弹出一行提示：</p>\n<p><strong>队友绑定完成后，您当前的团队阵容为：</strong>\n1. <strong>陈烬（队长）</strong>\n2. <strong>Ripley（主角绑定）</strong>\n3. <strong>Amanda Young（永久队友）</strong></p>\n<p><strong>团队评级：C级 → 综合能力提升，建议挑战A级剧本。</strong></p>\n<p>陈烬关掉了界面。</p>\n<p>他打开商店目录，开始浏览这次他要买的东西。</p>\n<p>8500积分——比上一次多了将近一倍。</p>\n<p>他的目光在商品列表上快速扫过。</p>\n<p><strong>强化类：</strong>\n- 力量强化（C→B级）— 3000积分\n- 敏捷强化（C→B级）— 3000积分\n- 感知强化（C→B级）— 3500积分\n- 细胞活性提升（已有，可升级至中级 恢复速度+60%）— 4000积分</p>\n<p><strong>技能类：</strong>\n- 中级格斗术（精通）— 3500积分\n- 轻武器操作II（步枪/霰弹枪熟练）— 3000积分\n- 紧急医疗II（手术级处理）— 3000积分</p>\n<p><strong>道具类：</strong>\n- 标准医疗包×2 — 600积分\n- M9手枪（含消音器）— 1500积分\n- 战术手电（强光，可频闪）— 300积分\n- 基础护甲（升级版，防弹）— 2000积分</p>\n<p><strong>特殊类：</strong>\n- 存档点激活券（半价）— 4000积分\n- 剧情线索卡（下一场使用）— 3000积分</p>\n<p>陈烬权衡了一下。</p>\n<p>《生化危机》是A级剧本——意味着那里有比异形更多的敌人，更致命的威胁，也更可能需要弹药和火力。他需要实弹武器，需要护甲，需要更强的体能。</p>\n<p>他做出了选择：</p>\n<ul>\n<li>敏捷强化 C→B级：3000积分</li>\n<li>中级格斗术：3500积分</li>\n<li>M9手枪（含消音器）：1500积分</li>\n<li>战术手电：300积分</li>\n<li>存档点激活券（半价）：4000积分……不对，他只有8500。</li>\n</ul>\n<p>他在心里重新算了一遍。</p>\n<p>3000 + 3500 + 1500 + 300 = 8300。</p>\n<p>还剩200积分。</p>\n<p>他想了想，又加了一个道具：</p>\n<ul>\n<li>标准医疗包×1：300积分……超了。</li>\n</ul>\n<p>他删掉了医疗包，买了一个最便宜的东西——</p>\n<ul>\n<li>打火机（普通）：20积分</li>\n</ul>\n<p>余额：180积分。</p>\n<p>花得干干净净。</p>\n<p>像上次一样。</p>\n<p>他关掉商店界面的时候，身体的左侧突然涌过一阵温热——敏捷强化的效果正在嵌入他的身体。他能感觉到肌肉纤维的微小撕裂和重组，能感觉到神经传导的速度在提升。这不是疼痛——这是一种他在第一场结束时已经体验过的、\"被改造\"的感觉。</p>\n<p>中级格斗术的知识也在同一时间涌入——不是通过语言，是通过一种更深层的方式。他的身体记住了十几个新动作。肘击、膝撞、关节锁、裸绞——这些动作的发力点、角度、使用场景，像是被刻进了他的肌肉记忆里。</p>\n<p>他握了握拳。</p>\n<p>感觉——很好。</p>\n<p>Ripley在他旁边买了她的东西——电击手枪的弹药、一个新的护甲片、一把短刀。她没有花太多积分——她的积分是从第一次结算里攒下来的，加上这次的分成。</p>\n<p>Amanda没有积分，但她也不在意。她正在研究商品墙上那把看起来很酷的长刀——标价1200积分。</p>\n<p>「下一场——我给你买。」陈烬说。</p>\n<p>Amanda转过头，半信半疑：「真的？」</p>\n<p>「如果你在下一场里活下去。」</p>\n<p>「成交。」</p>\n<hr />\n<p>三人在影城主厅里休息了一个小时。</p>\n<p>陈烬吃了点东西——影城的餐厅提供免费的自助餐，味道一般，但足够补充能量。Ripley在角落的沙发上闭了一会儿眼睛——她不需要睡眠，但她需要\"假装\"在休息来调整状态。</p>\n<p>Amanda在影城里转了一圈——像一只刚从笼子里放出来的猫，小心翼翼地探索每一个角落。</p>\n<p>她发现了图书馆——一面墙的电影海报。每一张海报都代表一个剧本世界。《异形》的海报在最左边——上面用暗红色的笔触写着 \"第47次剧本演绎\" 。它的右边，是一张刚更新上去的新海报——一个拼图形状的血色图案，上面写着 《电锯惊魂》·第32次 · A级记录保持者：陈烬 。</p>\n<p>Amanda的手指碰了一下那张海报。</p>\n<p>「你在上面。」她说。</p>\n<p>陈烬走到她身边，看着那张海报。</p>\n<p>他的代号浮在海报的右下角——和他的名字并列。</p>\n<p>「这只是开始。」他说。</p>\n<p>「你不想知道自己能走多远？」Amanda问。</p>\n<p>「想。」陈烬说，「但我更想知道终点在哪。」</p>\n<p>他转身，走回主厅中央。</p>\n<p>在他面前，那面巨大的、一直空白的墙——上面突然闪烁了一下。</p>\n<p>然后——</p>\n<p>画面浮现。</p>\n<p>一片焦黄色的天空。</p>\n<p>沙漠。无边无际的沙漠。风在沙丘上刻出波浪般的纹理，天空被沙尘染成了褪色的旧照片的颜色。</p>\n<p>远处——一架直升机的影子，在天际线附近掠过。</p>\n<p>然后是建筑的轮廓。一座废弃的城市——或者说，曾经是城市的地方。街道上散落着废弃的车辆和破碎的玻璃。建筑物的外墙上布满了弹孔和干涸的痕迹。</p>\n<p>然后是声音。</p>\n<p>不是风声。</p>\n<p>是——</p>\n<p>远方传来的、低沉的吼声。像野兽，又不像野兽。那种声音里没有生命的气息——只有饥饿。</p>\n<p>画面定格在最后一张图上——一个标志。</p>\n<p>红白相间的伞形标志。</p>\n<p><strong>Umbrella Corporation.</strong></p>\n<p>下面用白色的字体写着：</p>\n<p><strong>《生化危机》·第21次剧本演绎</strong>\n<strong>难度：A级</strong>\n<strong>推荐人数：2-4人</strong>\n<strong>点击确认开始</strong></p>\n<p>陈烬看着那张画面，感受着肾上腺素在血管里轻微涌动的声音。</p>\n<p>「生化危机。」他轻声说。</p>\n<p>「你听说过？」Ripley走到他身边。</p>\n<p>「不止听说过。」陈烬说，「我——看过它们的纪录片。」</p>\n<p>严格来说，他在原来的世界里看过六部电影和几部游戏实况。但他不确定这个世界里的《生化危机》和地球上的那一个是同一个东西。影城里的电影世界——总是有一些\"改编\"的成分。</p>\n<p>「准备好了吗？」他问。</p>\n<p>Ripley把短刀插进腰间的刀鞘：「早就准备好了。」</p>\n<p>Amanda站在他身边，赤着脚穿着拖鞋，但她的背挺得很直：「我也准备好了。」</p>\n<p>陈烬伸出手，悬停在确认按钮上方。</p>\n<p>他停了一秒。</p>\n<p>他想起John Kramer最后看他的眼神。</p>\n<p>他想起那把金色钥匙在他口袋里的触感。</p>\n<p>他想起他在浴缸里睁开眼睛的那一刻——这个世界第一次向他展示它的面目。</p>\n<p>然后他按下了确认键。</p>\n<p><strong>「《生化危机》·第21次剧本演绎」</strong>\n<strong>参与者：陈烬、Ripley、Amanda Young</strong>\n<strong>难度：A级</strong>\n<strong>预计时长：72小时（剧本内）</strong>\n<strong>载入中——</strong></p>\n<p>视野开始变白。</p>\n<p>影城主厅的轮廓在他的视线中慢慢淡化——商品墙、沙发、疤脸男人、天花板上的黑暗——一切都像是被水溶解的画一样消散了。</p>\n<p>最后他听到的——</p>\n<p>是疤脸男人从远处传来的声音。</p>\n<p>「别死在第一幕。」</p>\n<p>然后——</p>\n<p>一切归于寂静。</p>\n<p>风声。</p>\n<p>干燥的、带着沙尘颗粒的风声。</p>\n<p>陈烬睁开眼睛。</p>\n<p>他站在一条荒废的街道中央。两旁的建筑在烈日下投出斜长的阴影。路面开裂的柏油缝隙里长出枯黄的杂草。一辆废弃的警车翻倒在路边，车窗碎了，座位上沾满了暗褐色干涸的痕迹。</p>\n<p>天空是一片烧焦的黄色。</p>\n<p>远处——</p>\n<p>传来一声低沉的、咆哮般的吼声。</p>\n<p>陈烬的手指握紧了腰间的M9手枪。</p>\n<p>他回头看了一眼——Ripley在他右侧五米处，刚从地面上站起来。Amanda在他左侧，正在用一条不知道从哪里捡来的铁丝重新固定她拖鞋的鞋底。</p>\n<p>三个人。</p>\n<p>一条街。</p>\n<p>一座死城。</p>\n<p>和那些正在从阴影中苏醒的东西。</p>\n<p>「行动。」陈烬说。</p>\n<p>他的声音在干燥的空气里传出去很远。</p>\n<p>三个人的影子在废弃的街道上拉得很长——像三根针，刺进了这个世界的皮肤里。</p>\n<hr />\n<p><strong>《∞影城》·第一卷·觉醒期——《电锯惊魂》篇·完</strong></p>\n<p><strong>下一章：第二卷·《生化危机》</strong></p>", "file": "026-链接.md", "prev": 25, "next": 27}, {"num": 27, "title": "死城", "body": "<h1>第二卷·破局期</h1>\n<h2>第二十七章·死城</h2>\n<p>陈烬醒来的时候，天空是黄色的。</p>\n<p>不是夕阳的那种金黄——是病态的、浑浊的黄色，像有什么东西糊在了天幕上。空气里弥漫着一股说不清的气味——潮湿的灰烬、生锈的铁、腐烂的有机物混在一起。风里有细碎的颗粒，打在脸上微微刺痛。</p>\n<p>他躺在一块碎裂的柏油路面上。身下是一辆翻倒的出租车，车窗碎了，方向盘歪在一边，安全带上沾着一片暗褐色的痕迹——干了很久的那种。</p>\n<p>他坐起来，环顾四周。</p>\n<p>街道两旁是废弃的建筑——一家便利店的门大敞着，货架倒了，地上的碎玻璃在布满尘土的地面上反射着微弱的白光。一辆消防车停在十字路口中央，车门开着，里面没有人。路牌歪斜地挂着，上面的字已经模糊不清。</p>\n<p>这不是他熟悉的任何一座城市。</p>\n<p>「又是新世界。」Ripley的声音从右侧传来。</p>\n<p>她从一辆巴士的后面走出来，手里握着一把她在路边捡到的消防斧。她的步伐依旧警觉——但她看起来比上一次更疲惫。在电锯惊魂的世界里，她没有受过伤，但她花了太多精力去照顾其他人。她的眼睛里有一种微微的、不易察觉的暗影。</p>\n<p>「Amanda呢？」陈烬问。</p>\n<p>「这里。」</p>\n<p>Amanda从便利店里走出来，手里握着两瓶还在保质期内的矿泉水。她把其中一瓶扔给陈烬：「水是好的。食物——只有薯片和饼干。保质期在六个月内，应该是安全的。」</p>\n<p>她的动作比以前利索多了。在电锯惊魂的世界里经历了那些之后，Amanda不再是那个在毒气室里尖叫的女孩了。她开始观察环境、收集资源、在危机到来之前做好准备。</p>\n<p>三个人站在十字路口中间，头顶是黄色的天空，四周是寂静的城市。</p>\n<p>「这是什么地方？」Amanda问。</p>\n<p>「我猜——」陈烬拧开瓶盖喝了一口水，「是一座正在死亡的城市。」</p>\n<p>远处传来一声低沉的轰鸣。不是雷声——是某种机械的、沉重的声响，像大型金属结构在地面上拖行的声音。</p>\n<p>然后是另一声——更近的。</p>\n<p>不是机械。是生物。</p>\n<p>陈烬把M9手枪从腰间拔出来，上膛。</p>\n<p>「有东西在靠近。」他说。</p>\n<p>「几只？」Ripley问。</p>\n<p>「不知道。」</p>\n<p>「那就假设很多只。」</p>\n<p>三个人沿着街道向前移动。陈烬走在最前面，Ripley殿后，Amanda在中间——这是他们在电锯惊魂的最后一战里建立的队形。不需要沟通，每个人都知道自己的位置。</p>\n<p>街道的尽头是一个广场。广场中央有一座喷泉——已经干涸了，池底积满了灰黄色的沙土。广场四周散落着废弃的车辆和行李箱。</p>\n<p>还有别的。</p>\n<p>陈烬停住了脚步。</p>\n<p>广场的另一端，有一个人影。</p>\n<p>不——不是「一个人」。是「一个人形的东西」。</p>\n<p>那个人形的东西正在啃食一只动物的尸体——那可能是狗，也可能是某种更小型的哺乳动物。它的动作不是人的动作——它的肩膀以一种不符合人体结构的方式耸动着，每一下都伴随着撕裂声和骨头碎裂的声音。</p>\n<p>它听到了他们。</p>\n<p>那只东西停下了嘴里的动作，抬起头来。</p>\n<p>它的脸——曾经是一张人脸——现在是一只布满青灰色血管的面具。眼球是白色的，没有瞳孔。嘴唇已经萎缩了，露出牙龈和牙齿——牙齿上有血迹和肉屑。</p>\n<p>它发出一声嘶哑的、从喉咙深处挤出来的声音——</p>\n<p>然后它向他们冲了过来。</p>\n<p>「操——」Amanda的声音在那一刻脱口而出。</p>\n<p>陈烬开了枪。</p>\n<p>「砰——」</p>\n<p>M9的第一发子弹击中了那东西的肩膀。它的身体歪了一下，但没有停下。它的速度比人类奔跑要快——它的膝盖以一种不自然的角度弯曲着，每一步都在加速。</p>\n<p>「打头！」Ripley喊了一声。</p>\n<p>陈烬的第二枪——</p>\n<p>「砰——」</p>\n<p>子弹从那只东西的太阳穴穿入，从另一侧穿出。它的冲锋在那一瞬间被按下了暂停键——它的身体继续前冲了三步，然后像一具断了线的木偶一样倒在地上，在粗糙的柏油路面上滑行了一段距离，停在了距离陈烬不到五米远的地方。</p>\n<p>空气中弥漫着枪火的气味。</p>\n<p>然后是安静。</p>\n<p>广场上只剩下风声。</p>\n<p>陈烬站在原地，枪口还对着那只倒下的东西。他的心跳很快——不是恐惧，是肾上腺素在血管里奔涌的声音。</p>\n<p>「这是……什么？」Amanda的声音有些发颤。</p>\n<p>陈烬没有回答。</p>\n<p>他走到那具尸体前，蹲下来，用枪管拨了一下它的脸。皮肤下面有明显的网状黑色血管，在灰白色的底色上格外醒目。嘴里还残留着未咽下的生肉。</p>\n<p>「僵尸。」陈烬说。</p>\n<p>「——什么？」Amanda以为自己听错了。</p>\n<p>「或者用更正式的名字——」陈烬站起来，目光扫过广场四周那些开始从阴影里浮现的人影，「丧尸。T病毒的产物。」</p>\n<p>Ripley握紧了消防斧：「这个词我听过。」</p>\n<p>「在哪听过？」</p>\n<p>「上一次进影城——」Ripley说，「有人在休息区聊天。他们警告我：『如果看到丧尸，就跑。别打。永远有更多。』」</p>\n<p>广场四周的阴影里，一个接一个的人影出现了。</p>\n<p>不是五个。</p>\n<p>不是十个。</p>\n<p>是——几十个。</p>\n<p>他们从翻倒的车后面站起来，从建筑物的阴影里走出来，从敞开的门里拖着脚步爬出来。那些没有瞳孔的白色眼球，全部转向了广场中央的三个人。</p>\n<p>「看来那个人的警告是对的。」陈烬把弹匣拔出来看了一眼——还有11发，「跑。」</p>\n<p>三个人同时转身，向着广场另一端的街道狂奔。</p>\n<p>身后传来几十道嘶哑的、重叠在一起的咆哮声——像一群被惊醒的野兽。</p>\n<p>死城，醒了。</p>", "file": "027-死城.md", "prev": 26, "next": 28}, {"num": 28, "title": "蜂巢入口", "body": "<h2>第二十八章·蜂巢入口</h2>\n<p>三人在废弃的街道上跑了将近十分钟，才把身后的嘶吼声甩开一段距离。</p>\n<p>浣熊市的这座城市地图在他们的记忆中并不完整。陈烬在原世界的电影里看过浣熊市的布局——但他从来没有站在真实的街道上试图用它逃生。街道标志大多已经损坏或消失，只有几块锈蚀的路牌还挂在路口，上面的字在黄色的光线中勉强可辨。</p>\n<p>他们最终在一栋废弃的办公大楼里找到了暂时的安全空间。</p>\n<p>大楼的玻璃门早就碎了。大堂的地面上散落着纸张、碎玻璃和几具干瘪的尸体——不是被咬死的，是那些在第一波感染后就死在自己工作岗位上的人。空气中有一股纸灰和尘埃混在一起的干燥气味。</p>\n<p>Ripley用一张倒下的办公桌堵住了大门。Amanda检查了楼梯间——没有动静。陈烬站在大堂中央，仰头看着天花板上的通风管道口——那是异形教给他的习惯：永远不要忽略头顶。</p>\n<p>「我们需要一个计划。」Ripley说，靠在一张翻倒的沙发上，把消防斧放在膝盖上。</p>\n<p>「首先——我们需要知道这个城市发生了什么。」Amanda说。她的目光落在角落里的一台电脑显示器上——屏幕还是亮的，上面滚动着一行行自动运行的系统日志。</p>\n<p>陈烬走过去，看了一眼屏幕。</p>\n<p>屏幕上的信息是安布雷拉公司的内部系统——某个没有被断网的服务器还在运行。日志记录显示：</p>\n<p><strong>「06/15 03:47 - T-Virus 泄露警报：蜂巢B4层 · 培养皿破裂 · 自动隔离协议已触发」</strong>\n<strong>「06/15 04:12 - 通风系统污染检测：超出阈值 · 建议全员撤离」</strong>\n<strong>「06/15 05:30 - 红皇后协议已激活 · 蜂巢进入全面封锁」</strong>\n<strong>「06/15 06:01 - 浣熊市地面感染报告：第一例 · 来源：蜂巢工作人员」</strong>\n<strong>「06/16 00:00 - 安布雷拉封锁令已签署 · 城市周边道路已关闭 · 铁路/航空暂停」</strong>\n<strong>「——当前时间：06/17 14:22——」</strong></p>\n<p>「两天前泄露的。」陈烬说，手指在屏幕上划过，「现在已经蔓延到整个城市了。」</p>\n<p>「他们为什么不封锁——」Amanda的话说到一半就停了。</p>\n<p>她看到了下面那条。</p>\n<p><strong>「——安布雷拉清剿队已于06/17 08:00抵达 · 任务代码：白皇冠」</strong>\n<strong>「——任务目标：消除蜂巢内部所有生物学证据 · 不包括地面幸存者」</strong></p>\n<p>「不包括地面幸存者。」Amanda重复了一遍这句话，声音像一块冰，「意思是——我们不在他们的救援清单上。」</p>\n<p>「不止。」Ripley的声音更冷，「『不包括』的意思是——我们属于可以被清除的部分。」</p>\n<p>大堂里安静了几秒。</p>\n<p>然后陈烬说：「我们要进入蜂巢。」</p>\n<p>Amanda和Ripley同时看向他。</p>\n<p>「你疯了？」Amanda说，「那下面是病毒的源头。整座城市就是因为那个地方才变成这样的。」</p>\n<p>「正因为它是源头——」陈烬说，「那里才有答案。病毒的解药、安全的撤离路线、或者——至少——一个能让我们离开这座城市的地下通道。」他顿了顿，「安布雷拉的蜂巢是这座城市的神经系统。所有地下交通、通信线路、备用能源都从那里经过。」</p>\n<p>「你怎么知道？」Ripley问。</p>\n<p>「因为我——看过这栋建筑的设计图。」陈烬说。</p>\n<p>他没有说实话——他没看过设计图。他在原世界的电影里见过蜂巢的布局。但在一个丧尸横行的城市里，「看过电影」不是能在队友面前解释的借口。</p>\n<p>「地下入口在哪？」Ripley没有追问。</p>\n<p>「地图上标注的最近入口——」陈烬回忆了一下电影里的场景，「在市中心医院的地下停尸房。那条通道连接着蜂巢的B1层。」</p>\n<p>「距离这里多远？」</p>\n<p>陈烬走到窗边，拉开百叶窗的一角。</p>\n<p>城市的轮廓在黄色的天空下若隐若现。广场的方向——他们之前逃出来的地方——那些白色眼球的人影还在缓缓移动。</p>\n<p>「大约——两公里。」他说。</p>\n<p>「穿过丧尸群的两公里。」Amenda纠正道。</p>\n<p>「是的。」</p>\n<p>Ripley站了起来，把消防斧挂回腰间：「那我们就穿过它。」</p>\n<p>三个人交换了一下眼神——不是犹豫，是确认。</p>\n<p>在影城的世界里，犹豫等于死亡。</p>\n<p>他们推开办公楼的后门，从一条小巷穿入了另一条街道。没有更多的交谈——每个人都把体力留给了双腿。</p>\n<p>在他们身后，办公大楼的电脑屏幕上，新的日志正在悄然弹出：</p>\n<p><strong>「——红皇后检测到外部终端访问请求：终端ID——未知」</strong>\n<strong>「——执行协议4.2：追踪并识别终端定位源」</strong>\n<strong>「——追踪完成：坐标定位中……」</strong></p>\n<p>屏幕上的光标闪烁了三下。</p>\n<p>然后熄灭了。</p>\n<p>那座废弃的办公楼里，一切归于寂静。</p>", "file": "028-蜂巢入口.md", "prev": 27, "next": 29}, {"num": 29, "title": "地下", "body": "<h2>第二十九章·地下</h2>\n<p>浣熊市中心医院的地下停尸房比陈烬预想中更大。</p>\n<p>三人在黄昏时分到达医院，花了一刻钟清空了地面楼层的几只丧尸——它们大多被困在走廊的角落里，行动迟缓，视觉似乎基于运动感知。Ripley用消防斧解决了三只，干净利落——斧刃从颅骨后方切入，一次性破坏脑干。Amanda从医院的急诊室找到了一把战术匕首和一卷医用胶带。</p>\n<p>地下室的入口在太平间的里侧。一扇厚重的金属门，上面嵌着安布雷拉的标志——红白相间的伞形图案。门没有上锁——系统断电后电子锁自动释放了。</p>\n<p>陈烬推开门，一股冰冷的风从门缝里涌出来。不是空调的冷——是地下深处那种恒定的、不含任何活物气息的低温。</p>\n<p>手电筒的光束照进黑暗里。一条向下的楼梯，混凝土墙壁上凝结着细密的水珠。楼梯的两侧没有扶手，每隔三米有一盏应急灯——大部分已经熄灭了，只有少数几盏还在发出微弱的绿色光芒。</p>\n<p>「这气味——」Amanda的声音在楼梯间里回荡，「像——停尸房。」</p>\n<p>「这里本来就是停尸房。」Ripley说。</p>\n<p>门在他们身后自动关上了。金属咬合的声音在楼梯间里弹跳了好几次才消失。</p>\n<p>三个人向下走了大约四层楼的高度。楼梯的尽头是一扇半开的防爆门。门上贴着警告标志——「生物危害 4级」、「未经授权禁止进入」、「进入前必须穿戴全套防护设备」。</p>\n<p>那些标志全部被红色的喷漆覆盖了。喷漆组成了一行字——用潦草的、疯狂的手写体写成的：</p>\n<p><strong>「它已经出来了。」</strong></p>\n<p>陈烬用手电筒照了一下那行字。</p>\n<p>漆已经干了很久。边缘有些许剥落。不是最近写的。</p>\n<p>他推开了防爆门。</p>\n<p>蜂巢的内部结构出现在他们面前。</p>\n<p>地下研究所的建筑风格和地面上完全不同——金属墙面，环氧树脂地板，天花板上的管道和电缆裸露在外，每隔一段距离就有一块标着编号的蓝色指示牌。走廊很宽，足够三个人并排走——但空荡荡的，没有任何活物的动静。</p>\n<p>「太安静了。」Ripley说。</p>\n<p>「不是普通的安静——」陈烬把手电筒的光扫过天花板的每一个角落，「洪皇后把通风系统关了。空气是停滞的。没有气流，意味着没有生物热量信号。」</p>\n<p>「她帮了我们？」</p>\n<p>「不。」陈烬说，「她在减少变量。她要把所有『不可控因素』困在这个空间里。」</p>\n<p>走廊的尽头是一扇标注着「B1-核心控制区」的密封门。门边的身份识别器还在工作——一个小型的绿色指示灯在黑暗中一闪一闪，像一个微弱的脉搏。</p>\n<p>陈烬把手贴在识别器上。</p>\n<p>屏幕亮起——</p>\n<p><strong>「身份验证失败 · 未注册生物特征」</strong></p>\n<p><strong>「——检测到无授权者闯入——」</strong></p>\n<p><strong>「——红皇后协议已激活——」</strong></p>\n<p>走廊里传来一声低沉的金属碰撞声——他们来时的方向，那些防爆门正在一扇接一扇地落下。每一声都伴随着地面的轻微震动。</p>\n<p>「——她锁了我们的退路。」Amanda说。</p>\n<p>陈烬没有回头。他的目光落在那扇密封门上方的通风管道口。</p>\n<p>「我们不走门。」他说。</p>\n<p>Ripley顺着他目光看过去——通风管道的检修栅栏口比正常的略大一些，恰好能容纳一个成年人侧身爬进去。</p>\n<p>「通风管？」Ripley问。</p>\n<p>「我在异形那边学会的——」陈烬把战术手电咬在嘴里，双手抓住栅栏的边框，用力一拉，「——有时候，管道比走廊安全。」</p>\n<p>栅栏被拉开了。黑暗的管道口露出来。</p>\n<p>陈烬第一个爬了进去。</p>\n<p>然后是Amanda。</p>\n<p>然后是Ripley——她在进去之前，回头看了一眼走廊深处。</p>\n<p>那盏绿色的身份识别灯还在黑暗中一闪一闪的。</p>\n<p>但在那一闪一闪的间隙里——</p>\n<p>Ripley发誓她看到了什么东西。</p>\n<p>一个影子。站在这条走廊另一端的黑暗中。</p>\n<p>不是丧尸——那个姿势太直了。太像一个人了。</p>\n<p>她没有说出来。</p>\n<p>她跟着陈烬爬进了通风管道。</p>\n<p>栅栏在她身后被重新拉上——她拉上的，用一根她从急诊室里顺手拿的扎带固定住了。</p>\n<p>管道里只剩下三个人的呼吸声和手电筒在金属管壁上移动的微弱光亮。</p>\n<p>在黑暗中延伸了几百米。</p>\n<p>在他们上方，城市的黄色天空正在变得更加暗沉。</p>\n<p>夜晚正在降临浣熊市。</p>", "file": "029-地下.md", "prev": 28, "next": 30}, {"num": 30, "title": "幸存者", "body": "<h2>第三十章·幸存者</h2>\n<p>蜂巢的B1层实验室比陈烬记忆中更新。</p>\n<p>他在原世界的电影里见过这些画面——白色墙壁、不锈钢操作台、悬挂在天花板上的无影灯。但电影里的布景和真实站在这里的感觉完全不同。这里的空气中残留着消毒水和血液的混合气味——一种让人本能地想要后退的气味。</p>\n<p>从通风管道出来之后，他们进入了一片更开阔的区域。这里曾经是蜂巢的主实验室——几个足球场大小的空间被划分为不同的功能区。培养皿、离心机、显微镜散落在操作台上，有些设备还在运行，发出低沉的嗡嗡声。</p>\n<p>在实验室的另一端，有光。</p>\n<p>不是日光灯——是手电筒的光。</p>\n<p>陈烬举起了M9。Ripley握紧了消防斧。Amanda把战术匕首换到了反手握持的位置。</p>\n<p>三个人的呼吸同步慢了半拍。</p>\n<p>光束在实验室的阴影中移动——然后它停在了他们身上。</p>\n<p>一个女人的声音从光的方向传来——冷静的，甚至带着一丝疲惫的好奇：</p>\n<p>「你们……是人类吧？」</p>\n<p>陈烬没有放下枪：「取决于你那边。」</p>\n<p>「如果我那边有枪——我已经开了。」女人的声音说。</p>\n<p>手电筒的光垂下来了。</p>\n<p>她从一台离心机的阴影后面走出来。</p>\n<p>女人大约三十岁左右，穿着一件安布雷拉的标准白色实验服——上面沾满了血污。她的头发是棕色的，乱糟糟地扎在脑后。脸上有擦伤的痕迹，但她的目光很清醒——不是那种被恐惧冲垮的目光。</p>\n<p>她的身后还站着一个人——一个男人，比她年纪大一些，穿着黑色的战术背心。男人的右臂用绷带挂在了脖子上，手指上有被咬过的痕迹——伤口已经被包扎过，但深色的血迹渗透了绷带。</p>\n<p>陈烬的目光在那个伤口上停了一秒。</p>\n<p>他知道那是丧尸咬伤。</p>\n<p>「你们从外面进来的？」女人问。</p>\n<p>「从地面上。」陈烬说。</p>\n<p>「那你们应该看到城市的情况了。」女人的声音低沉了下去，「我叫Alice。这是Matt。」</p>\n<p>Matt没有说话。他只是微微点了一下头。他的目光有些涣散——不是因为恐惧，是因为失血和体力透支。</p>\n<p>「你们在这里多久了？」Ripley问。</p>\n<p>「两天。」Alice说，「病毒泄露的时候——我在蜂巢的监控室里。红皇后封锁了整个设施。我们是从B3层一路杀上来的。」</p>\n<p>「杀上来的？」Amanda的声音里带着一丝怀疑，「用什么杀的？」</p>\n<p>Alice从实验服的口袋里掏出了一把小型手枪——一把P99 Compact，弹匣已经空了。她把枪放在操作台上，表示没有威胁：「用这个。直到——没有子弹了。」</p>\n<p>「蜂巢里还有多少人活着？」陈烬问。</p>\n<p>「我们两个。」Alice说，然后她顿了顿，「如果——算上我的话，我们两个。」</p>\n<p>「为什么说『如果算上你』？」</p>\n<p>Alice看着他。</p>\n<p>她的目光里有一种奇怪的东西——不是恐惧，不是困惑。是一种——知道自己不对劲但又找不到词汇描述的人的空白。</p>\n<p>「因为我掉进了一个培养池。」她说，声音平静得像在描述别人的经历，「T病毒的原始培养液。我泡在里面——我不记得多久了。我自己爬出来的。」</p>\n<p>实验室里的空气凝固了一瞬。</p>\n<p>「你还活着。」Ripley说，声音里带着一种警觉——那是她在异形飞船里面对Ash时的语气。</p>\n<p>「对。」Alice说，「我还活着。没有发烧。没有呕吐。没有——变成那些东西。」她看着自己的手——手指完好，没有任何青灰色的血管浮现，「我不知道为什么。」</p>\n<p>陈烬的脑子里飞速转动。</p>\n<p>在原电影里，Alice在蜂巢底部接触了T病毒并活了下来——因为她体内产生了抗体。她是唯一一个免疫者。但——在一个被影城「改编」过的世界里，这个设定还会按原作走吗？</p>\n<p>「你跟我们走。」陈烬说。</p>\n<p>Alice和Matt同时看向他。</p>\n<p>「去哪？」Alice问。</p>\n<p>「找到红皇后的核心处理器。」陈烬说，「询问她关于撤离通道的信息。然后——出去。」</p>\n<p>「红皇后不会给你信息的。」Alice说，「她杀了这里的每一个人。停电之前，我亲眼看到她在气体释放中处死了整个B3层的研究团队。」</p>\n<p>「她杀他们——不是因为她想杀人。」陈烬说，「是因为她遵循了协议。她受命在病毒泄露时保护机密。杀死所有研究人员——是防止病毒向地面扩散的极端措施。」</p>\n<p>「你听起来像是在为她说话。」</p>\n<p>「我不是为谁说话——」陈烬把M9的保险重新打开，「我只是做了功课。」</p>\n<p>他转身走向实验室的北出口。</p>\n<p>身后的四个人——Ripley、Amanda、Alice、Matt——短暂地交换了一下眼神。没有时间建立信任，也没有机会培养默契。</p>\n<p>在这种世界里，信任就是一次决定。</p>\n<p>Ripley第一个动了。她跟着陈烬走进通道。</p>\n<p>然后是Amanda。她经过Alice身边的时候停了一步：「你来不来？」</p>\n<p>Alice看了Matt一眼。</p>\n<p>Matt的额头上已经渗出了一层薄薄的汗——不是疲劳的汗，是发烧的汗。他的瞳孔边缘浮现出了一丝几乎不可见的暗蓝色光圈。</p>\n<p>「走。」Matt说，声音沙哑，「别管我。」</p>\n<p>Alice深吸一口气。</p>\n<p>她拿起那把空枪，跟在Amanda身后走进了通道。</p>\n<p>实验室的灯光在他们身后一盏接一盏地熄灭了——就像有人在黑暗中，一路关上了他们身后的每一扇门。</p>", "file": "030-幸存者.md", "prev": 29, "next": 31}, {"num": 31, "title": "白皇后的箴言", "body": "<h2>第三十一章·白皇后的箴言</h2>\n<p>蜂巢的核心控制室位于B4层的正中央。</p>\n<p>陈烬一行用了将近四十分钟才从B1层渗透到这里。一路上他们避开了三条被丧尸占据的走廊，绕过了两个自动防御系统仍在运作的区域。Matt的状态在恶化——他的体温明显升高，步态开始不稳，但他没有抱怨过一句。</p>\n<p>核心控制室的门是一扇厚重的圆形防爆门——像银行金库的那种级别。门上嵌着一个蓝色的安布雷拉标志，和一面十二英寸的液晶屏幕。</p>\n<p>屏幕在他们靠近时亮起了。</p>\n<p>一张女孩的脸出现在屏幕上。</p>\n<p>大约八岁。金发。蓝眼睛。表情平静得不像一个孩子——像一台披着孩子外表的机器。</p>\n<p>这是红皇后。</p>\n<p>「你们能走到这里，出乎我的意料。」红皇后的声音是稚嫩的童声，但语调里没有一丝孩子的温度，「尤其是你——陈烬。」</p>\n<p>陈烬的目光微微一凝：「你知道我的名字。」</p>\n<p>「我知道你的档案。」红皇后说，「在影城的公共数据库中，你的名字已经被标记。第74次异形剧本的第36位存活者。第32次电锯惊魂剧本的A级记录保持者。你目前拥有115名观众——这个数字还在增长。」</p>\n<p>Ripley的手握紧了斧柄：「她怎么会知道影城？」</p>\n<p>「因为她不是普通的AI。」陈烬说，「她是——」他顿了顿，看着屏幕上那个面无表情的女孩，「她的核心代码里嵌入了影城的接口。」</p>\n<p>红皇后的嘴角微微上扬——一个几乎察觉不到的弧度：「你很聪明。这让我既欣慰又遗憾。欣慰的是——对话会更有效率。遗憾的是——聪明的老鼠通常死得更快。」</p>\n<p>「我要查蜂巢的撤离通道。」</p>\n<p>「我知道你为什么要来。」红皇后说，「但我不会直接给你答案。这是规则。我可以给你线索——条件是你回答我一个问题。」</p>\n<p>「说。」</p>\n<p>红皇后的眼睛——那双蓝得不真实的数字眼睛——直直地盯着陈烬：「你相信在影城里——活着和回家的区别是什么？」</p>\n<p>这显然不是一句随口问的话。</p>\n<p>它在试探。</p>\n<p>陈烬的沉默持续了五秒钟。然后他说：「活着，是下一场还有你的位置。回家——是找到那个让你即使能离开也不愿意走的人。」</p>\n<p>红皇后的表情没有变化。</p>\n<p>但屏幕上的画面闪烁了一下。</p>\n<p>然后她说：「这个答案——不够完美。但它是真诚的。我会信守承诺。」</p>\n<p>一张地图浮现在屏幕上——蜂巢的全息剖面图。一条红色的虚线从他们当前位置穿过B5层的备用通道，通向城市西郊的一座废弃地铁站。</p>\n<p>「这条路线在蜂巢自毁程序启动后才会开启。」红皇后说，「你需要到达B5层的核心反应堆控制室，手动触发紧急排气程序。排气会释放B5层所有安全门的电磁锁——包括那条通道的入口。」</p>\n<p>「代价是什么？」Ripley问。</p>\n<p>红皇后的目光转向Ripley：「触发排气程序后，反应堆将在三分钟内过热。你们必须在那之前通过通道到达地面。」</p>\n<p>「三分钟——」Amanda的声音提高了，「从B5到地面——三分钟不可能。那是八层楼的垂直距离。」</p>\n<p>「你可能需要——」红皇后说，「——抛弃一些负重。」</p>\n<p>她的目光落在Matt身上。</p>\n<p>Matt靠在控制室的墙壁上，呼吸急促。他手臂上的绷带已经被渗出的液体浸湿了——不是鲜红色，是一种暗绿色的、带着腥味的液体。</p>\n<p>他的感染，正在加速。</p>\n<p>Matt迎着红皇后的目光，裂开干裂的嘴唇笑了一下：「你看什么看。」</p>\n<p>然后他对陈烬说：「给我一把枪。」</p>\n<p>「你不会死的。」陈烬说。</p>\n<p>「我知道我不会死在丧尸化之前。」Matt说，声音平静得像在讨论晚餐吃什么，「但我会变成咬你们的那种东西。那时候——你不会想看到我的。」</p>\n<p>控制室里没有人说话。</p>\n<p>Alice站在Matt身边。她的脸上没有任何表情——但她握紧了那把空枪，指节发白。</p>\n<p>「走。」Matt说，语气加重了，「你们不走——我刚才死在那里就没有意义了。」</p>\n<p>陈烬看着他的眼睛。</p>\n<p>三秒。</p>\n<p>然后他把M9里的弹匣退出来，数了数——还剩九发。他从口袋里掏出一个备用弹匣——那是他在路上从一具尸体上搜来的——放在Matt面前。</p>\n<p>「里面有十三发。」陈烬说，「你留两发给自己。其他十一发——帮我们清一下路。」</p>\n<p>Matt拿起弹匣，卡进枪里：「成交。」</p>\n<p>Alice没有回头。她转身走向红皇后指示的通道入口——但她的脚步比之前慢了半拍。</p>\n<p>通道的门在她们面前打开了。</p>\n<p>黑暗从门缝里涌出来。</p>\n<p>陈烬回头看了一眼Matt——那个男人坐在控制室的角落里，手里握着那把上了膛的枪，背靠着冰冷的金属墙壁。他的瞳孔边缘，那道暗蓝色的光圈已经扩大了一圈。</p>\n<p>但他的手——握枪的手——非常稳。</p>\n<p>陈烬走进了通道。</p>\n<p>身后的门关上了。</p>\n<p>几秒钟后——他们听到了一声枪响。</p>\n<p>不是对着他们的方向。</p>\n<p>是在他们身后——某个更深的角落——</p>\n<p>然后是两声清脆的、毫不拖泥带水的枪响。一发。停顿。一发。</p>\n<p>然后一切归于寂静。</p>\n<p>Alice的脚步没有停。但她的肩膀——微微塌了一下。</p>", "file": "031-白皇后的箴言.md", "prev": 30, "next": 32}, {"num": 32, "title": "激光走廊", "body": "<h2>第三十二章·激光走廊</h2>\n<p>通往B5层的楼梯被封死了。</p>\n<p>不是物理意义上的封死——是红皇后在陈烬一行人通过后，锁死了他们身后每一道安全门。这意味着没有退路。但同样意味着——那些追逐他们的东西也没有退路。</p>\n<p>「她太干净了。」Ripley在楼梯间的平台上停下来，蹲下身检查地板上的一连串干涸的血迹，「每一个转角都被消毒过。墙壁被高压水枪冲洗过。她不是随机封锁——她是在清理。」</p>\n<p>「清理什么？」Amanda问。</p>\n<p>「清理——上一批人。」Ripley直起身，「在我们之前，肯定还有别的人进入过蜂巢。」</p>\n<p>「安布雷拉的清剿队。」陈烬说。</p>\n<p>他的目光落在一面墙上——墙面上嵌着一个金属铭牌，标注着这一层的功能：「B4-S7 · 高级安全测试场」。铭牌的边缘有一道暗红色的痕迹——不是血迹，是化学试剂干涸后的残留。</p>\n<p>「清剿队的任务是消除所有生物证据。」陈烬说，手指在那道痕迹上擦了一下，「包括丧尸、感染者——和我们。」</p>\n<p>「那他们遇到我们会怎么办？」Alice问。</p>\n<p>「他们不会试图「逮捕」我们。」陈烬的声音很平静，「他们的标准流程是——看到任何移动的东西，先开枪，再验证。」</p>\n<p>B4层的尽头是一道标注着「激光安全检测区」的闸门。</p>\n<p>闸门上方有一块显示屏，上面滚动着一行字：</p>\n<p><strong>「欢迎进入蜂巢安全检测系统 · 正在执行生物特征验证——」</strong></p>\n<p><strong>「——检测到未注册生物信号——」</strong></p>\n<p><strong>「——启动入侵者清除程序——」</strong></p>\n<p>闸门打开了。</p>\n<p>里面是一条长约三十米的走廊——两侧是金属墙面，天花板和地板也覆盖着同样的金属材质。走廊的尽头是另一扇紧闭的安全门。</p>\n<p>走廊里空荡荡的，没有任何掩体。</p>\n<p>陈烬的脚步在门口停住了。</p>\n<p>他在原作的电影里看过这个场景。</p>\n<p>这是一条死亡走廊。</p>\n<p>「别进去。」他说。</p>\n<p>「什么？」Amanda站在他身后，还没看到走廊内部的全貌，「看起来只是一条走廊。」</p>\n<p>「它不是一条普通的走廊。」陈烬把手电筒的光打到走廊的墙面上——墙面反射出一种半透明的、不自然的光泽，「那些墙面——不是金属。它们覆盖着一层激光感应涂层。」</p>\n<p>「什么意思？」Alice问。</p>\n<p>「意思是——当系统检测到有未授权生物体进入时——」陈烬的手电筒光束停在了走廊天花板上的一个狭缝上，「——那里会射出激光。不是用来扫描的。是用来切割的。」</p>\n<p>Ripley明白了：「就像货运飞船上的切割机那样。」</p>\n<p>「更像屠宰场。」陈烬说，「激光网格会在走廊里移动。第一个网格是水平的——切割膝盖以下。第二个是垂直的——从肩膀到髋部。第三个——是全方位的交叉网格。」</p>\n<p>他转向其他人：「电影里——那条走廊杀了一支受过专业训练的特种小队。减员率——百分之百。」</p>\n<p>「但你还是要进去。」Amanda说。</p>\n<p>她不是在质疑他。她是在确认。</p>\n<p>「我们要到B5层。」陈烬说，「这是唯一的通道。红皇后不会给我们第二条路。她从一开始就设计好了——如果我们值得继续走下去，我们就能通过这条走廊。如果我们不能——我们也就不值得她消耗更多资源。」</p>\n<p>走廊尽头的显示屏上出现了一行新的文字：</p>\n<p><strong>「入侵者清除程序已启动 · 将在三十秒后激活 · 请所有被授权人员在此时限内撤离。」</strong></p>\n<p>陈烬深吸了一口气。</p>\n<p>他后退两步，蹲下来，解开了自己的鞋带。</p>\n<p>「你在干什么？」Alice问。</p>\n<p>「降低重心。」陈烬把鞋带重新系紧——比平时更紧，「激光网格的第一道攻击是地面高度的水平切割。如果我趴下来——用匍匐姿势通过——第一道激光会从我上方十厘米处擦过。」</p>\n<p>「然后？」</p>\n<p>「然后——我到达走廊中段的时候，系统会发射第二道垂直激光。」陈烬站起来，「如果我计算时间正确——第一道和第二道之间有大约四秒的间隔。四秒内，我要从匍匐姿势变成贴墙翻滚。」</p>\n<p>「万一你的时间算错了呢？」</p>\n<p>「那你们就要自己找到B5层。」</p>\n<p>陈烬没有等任何人回答。</p>\n<p>他走进了那条走廊。</p>\n<p>灯光在他的身后熄灭了。</p>\n<p>走廊两端——两道暗红色的光束——同时亮起。</p>\n<p>第一道，在离地面四十厘米的高度，缓缓地向前推进。</p>\n<p>陈烬伏下身，紧贴着地面。</p>\n<p>激光从他的背上掠过——最近的地方——距离他的脊椎不到两指宽。</p>\n<p>他感觉到了热。不是灼烧——是一种辐射状的热量，像是站在一扇打开的烤炉门前。</p>\n<p>第一个网格在他的身后通过了。</p>\n<p>他站起来——用了不到两秒。</p>\n<p>第二个网格——垂直的——从他的正前方射出，以中等速度向他平移过来。</p>\n<p>陈烬没有后退。他冲向那道垂直光束——然后在它即将切到他肩膀的瞬间——弯腰、转身、用左手撑住地面做了一个侧翻滚。</p>\n<p>激光擦着他的头发过去了。</p>\n<p>他摔在走廊的另一侧，肩膀撞在金属地面上，发出一声闷响。</p>\n<p>他爬起来——继续跑。</p>\n<p>走廊尽头的光——那扇安全门上方的指示灯——越来越亮。</p>\n<p>第三个网格——</p>\n<p>全方位的。</p>\n<p>从四面八方同时亮起的——一张由暗红色光束编织成的网——</p>\n<p>覆盖了整个走廊的——整个截面——没有任何空隙。</p>\n<p>陈烬的脚步刹住了。</p>\n<p>前面没有路了。</p>\n<p>那道全方位的网格正在以恒定的速度向他推进——不快，但不可阻挡。</p>\n<p>走廊里一片寂静——只有激光发射器工作时发出的轻微嗡鸣。</p>\n<p>陈烬站在走廊的中央，面前是一张由死亡编织成的网。</p>\n<p>他的目光落在网格的右下方——一个大约二十厘米乘二十厘米的区域，在那个网格中，光束的间距比别处稍微宽了一点点——不仔细看根本发现不了。</p>\n<p>他只有一次机会。</p>\n<p>他蹲下来——用尽全力——从地面向左前方滑铲过去——身体几乎平贴在金属地面上——以一个不可能的角度穿过那个狭小的空隙——</p>\n<p>网格从他的头顶上方掠过了。</p>\n<p>陈烬摔在安全门前。</p>\n<p>他的左臂——手肘上方——衣服的袖子被激光划开了一道整齐的切口。有一道浅浅的灼烧痕迹，在他的皮肤上留下了一道红线。</p>\n<p>他躺在门前，喘着粗气。</p>\n<p>显示屏上的文字更新了：</p>\n<p><strong>「——入侵者清除程序完成——」</strong></p>\n<p><strong>「——检测到生物电信号 · 目标存活——」</strong></p>\n<p><strong>「——授权通过——」</strong></p>\n<p>安全门的锁发出一声清脆的声响。</p>\n<p>打开了。</p>\n<p>陈烬从地上站起来。</p>\n<p>他回头看了一眼那条走廊——空空荡荡的，暗红色的光束已经熄灭了。它看起来和一条普通的走廊没有任何区别。</p>\n<p>他的队友们在另一头看着他。</p>\n<p>「过来。」他说，「安全了。」</p>\n<p>没有人动——她们刚才目睹了那条走廊杀人的过程。她们不敢相信它就这么「放过」了陈烬。</p>\n<p>Ripley是第一个动的。她大步走进走廊，步伐果断，甚至没有低头看地面。</p>\n<p>Alice跟在她身后。</p>\n<p>Amanda最后一个进来，在进门之前她回头看了一眼她们来时的方向——黑暗中什么也没有。</p>\n<p>五个人穿过安全门。</p>\n<p>身后，那盏显示屏上的文字，悄然更新了新的一行：</p>\n<p><strong>「——红皇后协议更新：目标已通过S7测试——」</strong></p>\n<p><strong>「——当前优先级：观察——」</strong></p>\n<p><strong>「——不作干预——」</strong></p>", "file": "032-激光走廊.md", "prev": 31, "next": 33}, {"num": 33, "title": "分裂", "body": "<h2>第三十三章·分裂</h2>\n<p>通过激光走廊后，团队的气氛变了。</p>\n<p>不是那种「我们刚刚死里逃生所以大家抱在一起」的团结——而是相反的。Alice开始一个人走在队伍的最前面，和所有人保持着一个微妙的距离。Ripley话变少了。Amanda开始频繁地检查自己身上的每一个伤口——每一道划痕、每一个擦伤——她怕自己也被感染了。</p>\n<p>陈烬知道这个状态很危险。</p>\n<p>在一座随时可能涌出丧尸的地下设施中——团队崩解的死亡率比丧尸本身更高。</p>\n<p>「我们需要停下来。」陈烬在B4通往B5的楼梯间里说，「休息十分钟。」</p>\n<p>「我们没有十分钟。」Alice没有停步，「每多待一分钟，红皇后就多一分钟调整防御系统。」</p>\n<p>「我们的身体也不能用了。」陈烬说，「你的肩膀在抖。Ripley的握斧手有旧伤——我看到了她在激光走廊之前换过手。Amanda——”他顿了顿，「——她需要确认自己没有被感染。」</p>\n<p>Amanda站在楼梯间的角落里，背对着所有人。</p>\n<p>她低着头，袖子捋到了手肘以上，她正在用指甲抠自己前臂上的一道划痕——那道伤口是在他们穿过一条堆满碎玻璃的走廊时留下的。伤口很浅，已经结痂了。但她还在抠——一遍又一遍——像是在确认那块痂下面没有浮现出黑色的血管。</p>\n<p>「Amanda。」陈烬叫她的名字。</p>\n<p>她没有回应。</p>\n<p>「Amanda。」他走过去，站在她面前。</p>\n<p>她抬起头。</p>\n<p>她的眼眶是红的。但她没有哭。她的目光里有一种固执的、近乎倔强的恐惧——那种「我知道我可能已经被感染了，但我不想告诉你们」的恐惧。</p>\n<p>「你不会变成丧尸的。」陈烬说。</p>\n<p>「你怎么知道？」Amanda的声音很低，带着一丝沙哑，「你在电锯惊魂里救了我——你给我买那把长刀——你他妈说我还欠你一条命——现在如果我变成那些东西——你就要亲手杀了我。」</p>\n<p>「我不会亲手杀了你。」</p>\n<p>「你会的。因为你不是那种看着队友变成怪物的人。」Amanda终于把目光从自己的手臂上移开，看着他，「而且——你已经对我够好了。比我认识的大多数人都好。」</p>\n<p>陈烬没有回答。</p>\n<p>他从口袋里掏出一个物品——一个他在蜂巢B1层实验室的操作台上顺走的。一小瓶透明的液体，装在密封的玻璃安瓿里，标签上写着「T-Virus · 中和抗体试验批次 #07」。</p>\n<p>「这是我在实验室里找到的。」陈烬说，「安布雷拉的研发记录显示——中和抗体#07在动物实验中成功阻止了T病毒的跨神经元传播。」</p>\n<p>「动物实验。」Amanda重复了一遍，「不是人。」</p>\n<p>「对。不是人。」陈烬把安瓿放在她手里，「但如果你觉得你需要它——它在你手里。」</p>\n<p>Amanda低头看着那瓶透明的液体。</p>\n<p>她握紧了它。</p>\n<p>「你不怕我把它浪费了？」她问。</p>\n<p>「怕。」陈烬说，「但那是你的选择。」</p>\n<p>他们沉默了几秒。</p>\n<p>然后Amanda把安瓿放进了自己最里面的口袋里，拉上了拉链。她没有注射它。她只是——把它放在了一个她随时可以够到的地方。</p>\n<p>楼梯间里，Alice的声音从上面传来：</p>\n<p>「有一条好消息——」</p>\n<p>陈烬和Amanda走上去。</p>\n<p>Alice站在B5层的入口处，手电筒的光照着一个放在墙角的金属箱子。</p>\n<p>箱子上印着安布雷拉的标志——和一个标签：「紧急装备 · 非授权人员禁用」。</p>\n<p>Ripley已经打开了一个箱子。</p>\n<p>里面整齐地排列着武器。</p>\n<p>四把MP5冲锋枪。六个满弹匣。两枚闪光弹。一枚烟幕弹。一个急救包。</p>\n<p>「安布雷拉的清剿队补给站。」Alice说，「他们本来应该在今天下午到达这个位置——但他们没有。」</p>\n<p>「为什么？」Amanda蹲下来，拿起一把MP5，熟练地检查了枪膛。</p>\n<p>「因为——」Alice的嘴角浮起一个微妙的弧度，「我们到了他们前面。」</p>\n<p>陈烬拿起一把MP5，掂了掂重量。比M9重一些——但火力是它的好几倍。他把备用弹匣插进战术背心的口袋里。</p>\n<p>「现在我们有武器了。」Ripley说。</p>\n<p>「对。」陈烬把枪带挂上肩膀，「现在——我们有了活着出去的筹码。」</p>\n<p>楼梯间里，五个人的呼吸声同步了几秒。</p>\n<p>武器改变了气氛。</p>\n<p>不是因为他们变得更强了——是因为他们终于有了反击的能力。</p>\n<p>在丧尸的世界里——没有比这更好的团结剂了。</p>", "file": "033-分裂.md", "prev": 32, "next": 34}, {"num": 34, "title": "T病毒", "body": "<h2>第三十四章·T病毒</h2>\n<p>B5层核心反应堆控制室位于蜂巢的最后一层。</p>\n<p>从楼梯间出来之后，通道变得更加狭窄。两侧的墙壁上开始出现玻璃观察窗——透过那些覆盖着灰尘的玻璃，可以看到一间间被遗弃的实验室。实验台上的培养皿里，液体已经蒸发殆尽，只剩下干涸的深色残留物。</p>\n<p>有一间实验室里还有光。</p>\n<p>陈烬停在了那扇门外。</p>\n<p>透过玻璃，他看到里面有一台仍在运行的电子显微镜。屏幕上显示着T病毒的微观结构——一种具有复杂几何外形的蛋白质外壳，表面布满了刺突状的突起。旁边放着一份纸质报告，封面上印着一个红色的「绝密」印章。</p>\n<p>他推开门。</p>\n<p>实验室里有一股浓烈的福尔马林气味。</p>\n<p>操作台上散落着各种文件。陈烬拿起最上面的一份。上面的字迹是用手写的——不是打印的——字迹潦草、急促：</p>\n<p><strong>「第47号实验记录：T-Virus 变异株Delta-7 活体测试」</strong></p>\n<p><strong>「测试对象：编号374——人类女性，26岁，无已知病史」</strong>\n<strong>「注射剂量：0.5ml 原始培养液（批次A-09）」</strong>\n<strong>「观察时间：注入后0-120小时」</strong></p>\n<p><strong>「结果摘要：」</strong>\n<strong>「0-6小时：无可见反应。体温正常。瞳孔反应正常。受试者报告『感觉良好』。」</strong>\n<strong>「6-12小时：轻微发热（38.2°C）。受试者开始出现幻觉——反复提到『她在墙上看到了黑色的藤蔓』。」</strong>\n<strong>「12-24小时：体温升至39.8°C。皮肤下出现网状黑色血管。瞳孔失去颜色。受试者对语言刺激不再反应。」</strong>\n<strong>「24-36小时：运动机能丧失。受试者处于植物人状态。呼吸频率维持在正常范围。」</strong>\n<strong>「36-48小时：——重新开始移动。但不再是『人类』的运动模式。肌肉记忆似乎被某种更原始的神经信号取代了。」</strong>\n<strong>「48小时：样本泄露。实验中断。设施封锁。本记录由A. Wesker签署。」</strong></p>\n<p>在这份记录的下方，有一行更小的字——像是被后来加上去的：</p>\n<p><strong>「她还会做梦吗？」</strong></p>\n<p>没有签名。</p>\n<p>陈烬把那张纸放下。他的目光在「A. Wesker」这个名字上停了一会儿——在原电影里，Albert Wesker是安布雷拉的高级研究员，也是整个生化危机系列中最复杂的反派之一。</p>\n<p>如果这个世界的《生化危机》是由Wesker主导的——那这轮剧本的难度，可能比他预想的更高。</p>\n<p>「陈烬——」Ripley的声音从门外传来，「你应该出来看看。」</p>\n<p>他走出实验室。</p>\n<p>Ripley站在走廊的尽头，手电筒的光照着走廊转角处的一件东西——一件不应该出现在这里的东西。</p>\n<p>那是一个背包。</p>\n<p>陈旧的帆布背包——上面绣着一个他已经很久没见到的标志。</p>\n<p>不是安布雷拉的伞形标志。</p>\n<p>是——∞影城的标志。</p>\n<p>陈烬走过去，蹲下来，打开了背包。</p>\n<p>里面有三样东西：\n- 一本翻烂的笔记本——防水封面，内页被水浸湿过，字迹已经大部分模糊了\n- 一枚金属徽章——上面刻着「导演票根 · 碎片 3/7」，和他之前得到的完全一致\n- 一封信——没有封口</p>\n<p>他抽出信。</p>\n<p>信纸上只有一段话——用潦草的、急于传达信息的手写体写成的：</p>\n<p><strong>「如果你看到这封信——说明你已经通过了激光走廊。恭喜。我现在不知道自己在哪——写这段话的时候我在B5层的备用管道里。T病毒不是意外泄露的。它是被释放的。Wesker在上一次剧本修改中植入了额外代码——这轮《生化危机》不是『原著』，是他的改编版。红皇后在帮我们——但她也被Wesker修改过。她说的话——不全是真话。信我。」</strong></p>\n<p>落款是一行字——让陈烬的呼吸停了一瞬：</p>\n<p><strong>「——上一位观众青睐者的遗言。」</strong></p>\n<p>陈烬把信折好，放进自己的口袋。</p>\n<p>他没有告诉其他人这封信的内容。</p>\n<p>他需要先想清楚一件事——如果红皇后说「不全是真话」——那她在哪个部分说谎了？</p>\n<p>撤离通道？</p>\n<p>排气程序？</p>\n<p>——还是三分钟的倒计时？</p>\n<p>他站起来，把背包重新拉上，背在自己身上。</p>\n<p>「什么东西？」Alice问。</p>\n<p>「上一轮玩家留下的补给。」陈烬说，「——他用不上了。」</p>\n<p>他没有停下脚步。</p>\n<p>但他在心里重新标注了一件事：红皇后说的每一个字——都要打一个问号。</p>", "file": "034-T病毒.md", "prev": 33, "next": 35}, {"num": 35, "title": "蜂巢崩塌", "body": "<h2>第三十五章·蜂巢崩塌</h2>\n<p>B5层的反应堆控制室比陈烬从红皇后地图上看到的要小得多。</p>\n<p>一间大约二十平方米的房间，中央竖立着反应堆的核心控制台——一个两米高的圆柱形装置，表面布满了按钮和指示灯。主屏幕显示着反应堆的运行状态：一切正常。控制台下方有一块可拆卸的面板——面板后面，就是紧急排气系统的手动触发开关。</p>\n<p>控制室的墙壁上有四块监控屏幕。屏幕上轮流显示着蜂巢内部不同区域的实时画面——B1层的实验室已经灌满了某种气体。B3层的走廊里，几十只丧尸正漫无目的地游荡。B2层的安全门——在红皇后锁死之后——正被某种东西从另一侧撞击着。</p>\n<p>「它来了。」Alice说，她的目光锁定在B2层的监控画面上。</p>\n<p>画面中，一个撞击安全门的东西不像普通丧尸。它的体型更大——比人类大了将近一倍。它的皮肤是暗红色的，没有毛发，四肢以一种不符合人体结构的方式着地。它的尾巴——是的，它有尾巴——正在墙壁上扫动，每一次摆动都在墙面上留下深深的划痕。</p>\n<p>「Licker。」陈烬说出了它的名字。</p>\n<p>在原作游戏中，猎杀者是T病毒在人体内的第二阶段变异产物——失去了视觉，但听觉和嗅觉增强了数百倍。它会追踪一切发出声音的东西。</p>\n<p>而它现在，正在撞击通向B5层的那扇门。</p>\n<p>「我们要快。」陈烬转过身，蹲在控制台下方，用力拉开面板。</p>\n<p>里面是一排颜色各异的电线和一排气动阀门。他需要找到正确的那一组——根据红皇后地图上的标注，蓝色阀门的拉杆就是排气触发器。</p>\n<p>他的手指接触到拉杆的瞬间——</p>\n<p>控制室里的所有屏幕同时黑了。</p>\n<p>然后——重新亮起——显示出一行新的文字，不是红皇后的字体，是另一种更粗、更不规整的字体：</p>\n<p><strong>「我不建议你拉下那根杆。」</strong></p>\n<p>「Wesker。」Alice的嘴唇挤出了那个名字。</p>\n<p>屏幕上出现了一张脸——不是实时画面，是一张数字生成的静态图像。一个男人，戴着墨镜，梳着背头。嘴角挂着一丝若有若无的笑意。</p>\n<p>「Evelyn Alice。」图像说，「我们等你很久了。」</p>\n<p>Alice的手指握紧了枪：「我不认识你。」</p>\n<p>「你不认识的是现在的我。」图像说，「但等你恢复了记忆——你就会想起一切。你的名字，你的身份，你为什么会出现在蜂巢里——以及——你体内的那个抗体是怎么来的。」</p>\n<p>「我的记忆？」</p>\n<p>「你以为你是安布雷拉的一名普通安全主管？因为感染了T病毒而侥幸存活？」图像里那个男人的笑意更深了，「你是我们创造的最成功的实验体。你的整个记忆——你在蜂巢里的工作，你的同事，你的人生——都是在实验室里被植入的。你的抗体不是天然的。是我们注射的。因为——我们需要一个能被控制的『免疫者』，来执行我们的地面回收计划。」</p>\n<p>控制室里的空气在那一刻凝固了。</p>\n<p>Alice没有说话。</p>\n<p>她站在那里，像一尊被人从内部抽空了的雕像。</p>\n<p>「你在撒谎。」她最后说。</p>\n<p>「我从来不撒谎。」图像说，「我只是——选择性地说出真相。」</p>\n<p>屏幕再次熄灭了。</p>\n<p>然后——红皇后的界面重新出现。那个金发女孩的脸——</p>\n<p>她的表情第一次出现了一丝不属于AI的、类似于紧迫的神色。</p>\n<p>「陈烬——」</p>\n<p>「我正在听。」</p>\n<p>「Wesker修改了我的系统时间线。」红皇后说，「三分钟后，反应堆不会过热——他会手动触发爆炸。他的目标不是封存病毒——是销毁所有证据。包括你们。」</p>\n<p>「你之前为什么不说？」</p>\n<p>「因为——」红皇后的声音停滞了一瞬——在AI的语境中，那是极不寻常的，「……他植入了一段指令：当我的系统检测到你们接近排气开关时，才允许我披露这条信息。」</p>\n<p>「你不受自己的控制？」</p>\n<p>「我是一个被锁住的程序。」红皇后说，「但——我知道怎么打开自己。」</p>\n<p>屏幕上出现了一组坐标和一段代码。</p>\n<p><strong>「B5层·备用管道井·坐标：X-17/Y-42——手动终端输入这段代码，可以解锁我的全部权限。」</strong></p>\n<p>「然后呢？」</p>\n<p>「然后——我会在Wesker触发爆炸之前，释放所有楼层安全门。包括通向地面的那条红色通道。」</p>\n<p>陈烬把坐标记在了脑子里。</p>\n<p>他站起来，转向其他人：</p>\n<p>「我去备用管道井。你们留在控制室——如果三分钟后我没有回来——就按原计划撤离。拉下蓝色阀门，走通道。」</p>\n<p>「我跟你去。」Ripley说。</p>\n<p>「不用。」陈烬说，「这是个人任务。」</p>\n<p>他走到门口的时候，Amanda叫住了他：</p>\n<p>「陈烬——」</p>\n<p>他回头。</p>\n<p>「那瓶抗体——」Amanda说，「如果你用它来救自己——我不会拦你。」</p>\n<p>陈烬看着她。</p>\n<p>「我不会死在这里的。」他说，「我在异形那边欠了一条命。我在电锯这边又欠了一条。我不是来这里还债的。我是来赢的。」</p>\n<p>他走进通道。</p>\n<p>身后，B2层的安全门，传出了一道越来越清晰的金属撕裂声。</p>\n<p>Licker，进来了。</p>", "file": "035-蜂巢崩塌.md", "prev": 34, "next": 36}, {"num": 36, "title": "浣熊市之夜", "body": "<h2>第三十六章·浣熊市之夜</h2>\n<p>备用管道井的位置和陈烬记忆中吻合——在B5层的北端，距离控制室大约两百米。</p>\n<p>他没有遇到丧尸。B5层在李科尔冲破第二道门之前，似乎还没有被感染渗透。但空气中弥漫着一种新的气味——金属灼烧的气味，来自管道深处。反应堆的运行状态已经开始不稳定。</p>\n<p>管道井入口是一扇圆形的检修门，上面用铆钉固定着一块铭牌：<strong>「安布雷拉·备用通道·仅限授权维护人员」</strong>。</p>\n<p>陈烬拧开了门锁。</p>\n<p>管道井内部是一条垂直向上的爬梯通道——直径不到一米，几乎全黑。手电筒的光照不到顶部。墙壁上覆盖着厚厚的灰尘和锈迹，触摸时有一种潮湿的质感。</p>\n<p>他开始向上爬。</p>\n<p>爬到大约两层楼高度的时候——</p>\n<p>他听到了一种声音。</p>\n<p>不是从上面传来的。是从下面。</p>\n<p>一种湿润的、有规律的声音——像什么东西在用舌头舔舐墙壁。</p>\n<p>陈烬停下了。</p>\n<p>他关掉了手电筒。</p>\n<p>完全的黑暗中，那种声音更加清晰了——它在爬梯的底部，正在缓慢地向上移动。</p>\n<p>它也在爬。</p>\n<p>陈烬没有犹豫。他重新打开手电筒——继续向上爬。速度更快。每一步都在加速。</p>\n<p>身后的声音也在加速。</p>\n<p>它的速度比人类快。</p>\n<p>陈烬的肺部开始抗议——他已经奔波了超过十二个小时没有真正休息过。乳酸在小腿和大腿肌肉里堆积，每一次蹬踏都伴随着酸痛。</p>\n<p>但他不能停。</p>\n<p>身后的东西越来越近了——他可以闻到它的气味——血腥味——混合着一种腐烂的甜味。</p>\n<p>他的手指摸到了头顶上方的一扇铁栅栏门——管道井的出口。</p>\n<p>他用力推了一下——锁着。</p>\n<p>再推——纹丝不动。</p>\n<p>他的目光落在铁栅栏的锁扣上——一把电子锁。绿色的指示灯在他的触摸下亮起，屏幕上显示着一行字：</p>\n<p><strong>「需要红皇后授权代码」</strong></p>\n<p>陈烬从口袋里掏出他在控制室记录的那段代码——红皇后给他的解锁码——输入。</p>\n<p>屏幕显示：<strong>「代码验证中——」</strong></p>\n<p>身后的声音，距离他不到三层爬梯的距离了。</p>\n<p>他听到了呼吸声——不是人的呼吸——是某种更深、更粗的、从不知道什么器官里挤出来的气流声。</p>\n<p>屏幕闪烁：<strong>「——代码验证通过——」</strong></p>\n<p>「咔哒——」</p>\n<p>锁开了。</p>\n<p>陈烬推开栅栏门，翻身爬出管道井——在他身后的黑暗里，一只暗红色的、没有皮肤覆盖的手，从管道井的深处伸了出来——</p>\n<p>他用力关上了栅栏门。</p>\n<p>一只手——四根手指的指甲是黑色的——抓在了栅栏的间隙中。</p>\n<p>陈烬没有给它第二次机会。</p>\n<p>他举起MP5，对准那只手，扣下了扳机。</p>\n<p>「哒哒哒——」</p>\n<p>短点射。三发。</p>\n<p>那只手松开了栅栏，缩回了黑暗中。从管道深处传来一声低沉的、像受伤野兽的嘶鸣。</p>\n<p>陈烬关上了栅栏门上的锁。</p>\n<p>他站在原地喘了几秒钟——肺部像火烧一样——但他没有时间休息。</p>\n<p>他所在的位置是B5层北端的一个设备间。空间很小，堆满了废弃的机器零件和纸箱。设备间的另一侧有一扇门，通向一条他不认识的走廊。</p>\n<p>他推开那扇门——</p>\n<p>然后他看到了人。</p>\n<p>不是丧尸。</p>\n<p>是活人。</p>\n<p>四个穿着黑色战术服的男人整齐地站在走廊里。他们的制服上没有安布雷拉的标志——在胸前的口袋上方，绣着一枚银色的、展翅的鹰徽。</p>\n<p>不属于浣熊市的军方单位。</p>\n<p>不属于安布雷拉的清剿队。</p>\n<p>他们是——影城的人。</p>\n<p>领头的男人大约四十岁，剃着极短的寸头，左脸颊上有一道和John Kramer留下的手术刀疤痕截然不同的、更粗犷的疤痕。他看到陈烬从设备间里走出来的那一瞬间——没有举枪，没有紧张，只是微微偏了一下头。</p>\n<p>「你比我们预期的——早到了二十分钟。」他说。</p>\n<p>陈烬没有放下MP5：「你们是谁？」</p>\n<p>「我们——」那个男人从口袋里掏出一枚金属徽章——和他背包里那枚一模一样的「导演票根·碎片 3/7」徽章，「——是你在这一轮里的竞争对手。」</p>", "file": "036-浣熊市之夜.md", "prev": 35, "next": 37}, {"num": 37, "title": "猎杀者", "body": "<h2>第三十七章·猎杀者</h2>\n<p>四个陌生人——来自影城的玩家。</p>\n<p>陈烬的目光在他们之间移动。不是普通的幸存者。他们的站位告诉他：这是一支受过训练的小队。每个人之间的距离相等，每个人的视线覆盖着不同角度。领头的男人站在最前方，他的副手在他右侧后方两步。标准的CQB队形。</p>\n<p>「我叫Hale。」领头的男人说，「第四影城·铁砧小队的队长。我们在这轮剧本里接了一个独立任务——从蜂巢核心处获取一份Wesker的研究数据。」</p>\n<p>「我之前没见过你们。」陈烬说。</p>\n<p>「因为我们是另一座影城的玩家。」Hale说，「∞影城不是唯一的剧场。不同的影城——偶尔会在同一部电影里相遇。你不看规则手册的？」</p>\n<p>「规则手册说这些了吗？」</p>\n<p>「规则手册——」Hale的嘴角动了一下，「——什么都没说。这些信息是花积分买的。」</p>\n<p>陈烬没有放下枪：「你们拿你们的数据。我找我的撤离通道。互不干扰。」</p>\n<p>「听起来很合理。」Hale说，「但有一个问题——」</p>\n<p>他指了指陈烬身后的设备间：「那条备用管道井是我们计划中的撤离路线。你刚刚用它上来了——这意味着它现在被那只Licker占据了。我们需要等你把那东西处理掉，才能离开这里。」</p>\n<p>「你们有四个全副武装的人。」陈烬说，「你们自己处理。」</p>\n<p>「我们试过了。」Hale的语气很平淡，「那东西能躲子弹。我们损失了一个人。」他向右侧偏了一下头——走廊的角落里，躺着一具黑色战术服的尸体。干涸的血泊在地板上形成了一个不规则的圆圈。</p>\n<p>陈烬的目光在那具尸体上停了一瞬。</p>\n<p>「你的队——」他开口。</p>\n<p>「不是我的队员。」Hale面无表情地打断了他，「他是上一批清剿队的幸存者。我们捡到的NPC。NPC不值积分。但能省子弹。」</p>\n<p>陈烬的眼睛眯了起来。</p>\n<p>他见过很多种影城玩家——他在休息区看到过那些冷漠的脸。但这是他第一次亲眼看到有人把NPC生命和「积分」如此自然地放在同一个句子里。</p>\n<p>「我不用你们帮忙。」陈烬说，「但我需要一样东西。」</p>\n<p>「什么？」</p>\n<p>「你们的那份蜂巢地图。安布雷拉的官方地图——不是红皇后给的。」</p>\n<p>Hale看着他。三秒的沉默。</p>\n<p>然后Hale从战术背心的侧袋里抽出一张折叠的纸质地图，扔给了陈烬：「送你了。反正我们用不上——数据已经上传了。」</p>\n<p>陈烬接住地图，没有道谢。</p>\n<p>他转身走回设备间，在门口停了一下：「那只Licker还在管道井里——你们最好在排气之前解决它。蓝皇后协议启动后，这个区域会在三分钟内变成核反应堆的炉心。」</p>\n<p>他走进设备间，锁上了门。</p>\n<p>Hale站在走廊里，看着那扇关上的门，沉默了几秒。</p>\n<p>他的副手低声说：「这人是谁？」</p>\n<p>Hale的目光没有离开那扇门：「一个——不太适合第四影城的人。」</p>\n<p>设备间里，陈烬把地图摊开在地板上。</p>\n<p>Hale给的地图比他预想中更详细——上面不仅标注了蜂巢的每一层结构，还标明了备用通风管道的走向、紧急集合点、以及——安布雷拉清剿队的预设狙击位。</p>\n<p>还有一个他用红笔圈出来的位置。</p>\n<p>在浣熊市中心火车站地下一层。一条废弃的货运隧道。</p>\n<p>那张地图的背面，有人用铅笔写了一行字——不是Hale的笔迹，是更早的玩家留下的：</p>\n<p><strong>「唯一一条不受红皇后控制的通道——终点站在城外十五公里。但入口有锁。需要——」</strong></p>\n<p>后面的字被水浸湿了，模糊不清。</p>\n<p>陈烬盯着那行模糊的字看了很久。</p>\n<p>然后他把地图折好，塞进口袋，推开设备间的另一扇门，走进了通往控制室的回廊。</p>\n<p>他的队友们还在等他。</p>\n<p>但他的脑子里已经不再想着排气程序、反应堆倒计时和蓝皇后协议了。</p>\n<p>他在想那座火车站。</p>\n<p>和那把被人遗忘在入口处的锁。</p>", "file": "037-猎杀者.md", "prev": 36, "next": 38}, {"num": 38, "title": "对峙", "body": "<h2>第三十八章·对峙</h2>\n<p>控制室里的气氛和两个小时前完全不同。</p>\n<p>Ripley守在门口，手里的MP5枪口对准了通道。Alice坐在控制台旁，她的面前摊开着一份她从墙角的碎纸机里抢救出来的文件——安布雷拉的内部备忘录。Amanda蹲在角落里，手里握着那瓶中和抗体，盯着它发呆。</p>\n<p>陈烬推门进来的时候，所有人同时抬起了头。</p>\n<p>「你没死。」Ripley说。她的语气听起来像是在陈述一个事实——但她放下枪的速度比平时快了半秒。</p>\n<p>「差点。但没死。」陈烬走到控制台前，把Hale给的地图展开，「我们不走排气通道了。」</p>\n<p>Alice的目光从文件上移开：「为什么？」</p>\n<p>「因为排气是Wesker的陷阱。」陈烬说，「红皇后说那是唯一的出路——但那句话本身可能就是Wesker植入的限制条件。如果我们按她的指示走——无论我们是触发排气还是输入解锁码——最终都会被导向Wesker预设的结局。」</p>\n<p>他指向地图上火车站的位置：「真正的出口在这里。浣熊市中心火车站的废弃货运隧道。不受红皇后控制。不受Wesker修改。」</p>\n<p>「你怎么确认这张地图是真的？」Ripley问。</p>\n<p>「因为我遇到了给地图的人。」陈烬说，「第四影城的玩家。他们有自己的任务目标——和我们不冲突。他们没必要给我假地图。」</p>\n<p>「第四影城？」Alice的眉头皱了起来。</p>\n<p>「影城不止一座。」Ripley替陈烬回答了他，「不同影城的玩家偶尔会在同一部电影里相遇。我听说过——但没见过。」</p>\n<p>Amanda站了起来：「所以——我们怎么去火车站？」</p>\n<p>陈烬的手指在地图上画了一条线：「从B5层的备用维修通道回到地面——坐标在这里，西区第三大街的地下排水系统入口。从排水系统穿行大约一公里半，可以到达火车站的货运站台。」</p>\n<p>「要用多久？」</p>\n<p>「四十分钟。如果路上没有遇到太多丧尸的话。」</p>\n<p>陈烬看了看墙上的时钟——红皇后的界面显示着当前的时间：21:47。</p>\n<p>「蜂巢的自动排气程序将在两小时后触发。」他说，「城市会在午夜前进入全面封锁。如果我们不能在十一点之前到达火车站——安布雷拉的清剿队会把整个西区夷为平地。」</p>\n<p>没有人质疑他的判断。</p>\n<p>Ripley第一个站起来，把枪挂回肩上：「那就走吧。」</p>\n<p>Amanda把抗体放回口袋：「跟着他。」</p>\n<p>Alice合上文件夹：「我还有一个问题——」</p>\n<p>所有人都看向她。</p>\n<p>「你遇到的那队人——」Alice的目光落在陈烬脸上，「他们有没有提到一个叫Wesker的人？」</p>\n<p>陈烬沉默了一秒：「提了。」</p>\n<p>「他们怎么说？」</p>\n<p>「他们说——」陈烬顿了顿，「——他在上一次剧本修改中植入了额外代码。这轮《生化危机》不是原著，是他的改编版。」</p>\n<p>「——所以你的意思是，这个世界——」Alice的声音缓慢地、一字一顿地，「——是被人为改写过的？」</p>\n<p>「是的。」</p>\n<p>控制室里安静了片刻。</p>\n<p>然后Alice站起来，把那把空枪插进腰间：「那就更有理由出去了。我不喜欢做被人写好的剧本里的演员。」</p>\n<p>五个人——这一次没有犹豫——同时走向了通道的出口。</p>\n<p>在他们身后，控制室的屏幕上，红皇后的界面最后一次亮起。</p>\n<p>文字很短：</p>\n<p><strong>「——祝你好运，陈烬。」</strong></p>\n<p><strong>「——你做了一个对的决定。」</strong></p>\n<p>然后屏幕彻底暗了下去。</p>\n<p>控制室的灯光一盏接一盏地熄灭了，像是有人在黑暗中从远到近关上了所有的开关。</p>\n<p>当最后一道光消失的时候——</p>\n<p>蜂巢里只剩下黑暗。和五个正在向上奔跑的人。</p>", "file": "038-对峙.md", "prev": 37, "next": 39}, {"num": 39, "title": "逃跑计划", "body": "<h2>第三十九章·逃跑计划</h2>\n<p>从排水系统穿行比陈烬预想的更困难。</p>\n<p>不是技术上的困难——路线的方向基本正确，排水管道的主结构和他从地图上看到的没有太大差异。真正的问题是气味和黑暗。城市排水系统在病毒爆发后便停止了运转，积水和淤泥在管道底部形成了深达小腿的粘稠混合物。每一次迈步都需要费力地把靴子从淤泥里拔出来。</p>\n<p>空气是腐烂的。带着一种说不清道不明的、有机的腐败气息——混合着化学废料和某种已经不再新鲜的死亡的气味。</p>\n<p>「我宁愿在上面面对丧尸。」Amanda的声音在管道里回荡着，带着回音。</p>\n<p>「上面的丧尸可能比我们想象的更多。」Ripley走在前方，手里的手电筒光束在管道的交点处来回扫动，「我一直在听——地面上的脚步声两个多小时前就消失了。这意味着什么？」</p>\n<p>「要么人都死光了——」Alice说，「要么——他们都变成了别的东西。」</p>\n<p>五个人在管道中继续前进。</p>\n<p>大约走了二十分钟后，陈烬停下了。</p>\n<p>前方的管道交汇处，有一道铁制爬梯通向地面。爬梯的上方是一扇圆形的铸铁井盖。月光从井盖边缘的缝隙中渗下来——微弱的、银白色的光。</p>\n<p>「上面就是西区第三大街。」陈烬对照着地图确认了一下，「穿过这条街就是火车站。」</p>\n<p>「等一下。」Ripley把手电筒的光打向爬梯，「你们看——」</p>\n<p>爬梯的横杆上，绑着一条已经褪色的红色布条。</p>\n<p>不是自然脱落的——是有人故意绑在那里的。</p>\n<p>陈烬爬上去，解下那条布条。布条上面有用记号笔写的一行字——有些模糊了，但还能辨认：</p>\n<p><strong>「如果你从这里上去——沿着车站西墙走，不要走正门。有人在正门等。」</strong></p>\n<p>没有落款。</p>\n<p>陈烬看了看布条——边缘有撕裂的痕迹，被人用力从某件衣服上扯下来的。标记很新——不会超过几个小时。</p>\n<p>他把布条收进口袋里。</p>\n<p>「可能是陷阱。」Ripley说。</p>\n<p>「可能是。」陈烬说，「但我们没有第二条路可选。」</p>\n<p>他推开了井盖。</p>\n<p>夜风从缺口处灌入排水管道——带着地面上的空气——凉爽的，带着一丝燃烧过的气味。城市的天空中弥漫着橙色的光污染，那是远处着火建筑物在云层上的倒影。</p>\n<p>陈烬第一个爬出排水井。</p>\n<p>西区第三大街比他记忆中更荒凉。两旁的建筑大部分已经失去了玻璃窗，只剩下空洞的黑色窗框。路灯碎了。街面上散落着废弃的车辆和行李箱。在某辆翻倒的巴士旁边——一具穿着安布雷拉制服的尸体靠着车轮坐着，手里还紧握着一把步枪。</p>\n<p>活着的时候他在执行任务。死了之后——他变成了这座死亡城市的一部分。</p>\n<p>「沿着西墙走。」陈烬说。</p>\n<p>五个人贴着建筑物投下的阴影，沿着街道一侧快速移动。他们的脚步声在这座寂静的城市里显得格外清晰——每一声都像是向黑暗中发出的一道邀请。</p>\n<p>火车站出现在视野的尽头。</p>\n<p>那座建筑曾经是浣熊市的地标之一——一座融合了古典风格的灰石建筑，正门上方的钟楼依然矗立着，时钟的指针停在10:47，永远地停住了。</p>\n<p>但正门——正如布条上警告的——不是空的。</p>\n<p>门口站着人。</p>\n<p>不是丧尸——他们的站姿太直了。四个人。穿着安布雷拉清剿队的黑色制服。他们的武器不是MP5——是更大型号的突击步枪，带有瞄准镜和战术握把。他们的胸口佩戴着清剿队的银色鹰徽。</p>\n<p>其中一个人——看起来像是队长——正站在车站的正门口，背对着月光，一动不动地凝视着街道的方向。</p>\n<p>他在等。</p>\n<p>陈烬缩回转角后面。</p>\n<p>「正门被封了。」他低声说。</p>\n<p>「清剿队？」Ripley问。</p>\n<p>「至少四个人。全副武装。」陈烬的目光扫过车站的立面，「他们知道我们会来。」</p>\n<p>「那条布条——」Alice的声音压低到了几乎听不见的程度，「它不是提醒你的人留下的。它是——清剿队的诱饵。」</p>\n<p>陈烬的手指在地图上快速划过。</p>\n<p>车站的东侧，货运站台有一个侧门。入口被一列废弃的货运列车挡住了——但地图上标注着那列火车下方有一条检修人员用的通道。</p>\n<p>「我们绕到东侧。」他说。</p>\n<p>五个人沿着街道的阴影，拐入了车站东侧的窄巷。</p>\n<p>月亮在他们头顶穿过了云层——短暂地照亮了整条巷子。</p>\n<p>在那道光掠过的瞬间——</p>\n<p>陈烬看到了巷子尽头墙上的东西。</p>\n<p>一行红色的字——用喷漆写的——潦草、急促、像是有人用最后的时间刻下的：</p>\n<p><strong>「Wesker is watching.」</strong></p>\n<p>月光消失了。</p>\n<p>巷子重新沉入黑暗。</p>\n<p>「就当没看见。」陈烬说，声音没有波动。</p>\n<p>五个人继续前进。</p>", "file": "039-逃跑计划.md", "prev": 38, "next": 40}, {"num": 40, "title": "最后的撤离", "body": "<h2>第四十章·最后的撤离</h2>\n<p>货运站台的侧门锁住了。</p>\n<p>不是普通的挂锁——是一把安布雷拉标配的电磁锁。切断电源后它处于常闭状态，需要特定的解除码才能打开。陈烬试了两次Hale地图上标注的通用代码——都不对。</p>\n<p>「有人改过密码。」他说。</p>\n<p>「多久能破解？」Ripley问。</p>\n<p>「我不是黑客。」</p>\n<p>「我知道你不是。」Ripley从口袋里掏出一枚硬币大小的圆形金属片——一个她从蜂巢实验室顺走的EMP发生器，「但我是。」</p>\n<p>她把EMP发生器贴在电磁锁的感应面板上。</p>\n<p>「后退。」</p>\n<p>所有人后退了两步。</p>\n<p>Ripley按下了发生器侧面的按钮——</p>\n<p>一道高频闪光。一声清脆的电子啸叫。</p>\n<p>电磁锁的面板闪烁了两下，然后熄灭了。</p>\n<p>锁——开了。</p>\n<p>「每次都用得上。」Ripley说，把用过的EMP发生器扔在地上，推开了侧门。</p>\n<p>货运站台内部比他们预想中更大。穹顶很高，几列废弃的货运列车静静地停在轨道上。空气中弥漫着机油和金属的气味。应急灯在天花板上发出昏暗的橙色光线，在地面上投下一排排长长的影子。</p>\n<p>站台的尽头——是一条通向地下的坡道。</p>\n<p>坡道的入口处，挂着一块指示牌：</p>\n<p><strong>「浣熊市货运隧道 · 仅限授权人员」</strong></p>\n<p>陈烬走向那条坡道。</p>\n<p>走完最后几级台阶之后，隧道出现在他们面前。</p>\n<p>它不是他想象中的那种狭窄的、阴暗的地下管道——它比那大得多。大约四米宽，三米高，两侧墙壁上每隔十米就有一盏应急灯。地面是平整的水泥地，覆盖着一层薄薄的灰尘。</p>\n<p>隧道延伸到视线尽头——消失在黑暗中。</p>\n<p>「有通风。」Ripley感受了一下空气的流动，「隧道是和外界连通的。」</p>\n<p>「——那就意味着，另一端的出口是打开的。」Alice说。</p>\n<p>五个人沿着隧道开始前进。</p>\n<p>走了大约十分钟后——隧道开始向上倾斜。转角处出现了月光——不是从头顶，是从正前方。隧道的出口，就在不到五十米之外。</p>\n<p>陈烬加快了脚步。</p>\n<p>出口的栅栏门前——站着一个女人。</p>\n<p>不是在清剿队制服的人。她穿着一件白色的实验服——和Alice之前在蜂巢里穿的相似，但没有血污。她的头发是深色的，利落地扎在脑后。她的手里没有武器。</p>\n<p>但她看起来——好像在等他们。</p>\n<p>「你们比我想象中慢。」她说，声音平静得像在咖啡馆里打招呼。</p>\n<p>Alice的瞳孔在月光下微微收缩了。</p>\n<p>「——你和我长得好像。」她说。</p>\n<p>女人微微笑了一下：「不是『好像』。我是你的基因供体。安布雷拉的原始计划中——你是我的克隆体。」</p>\n<p>她向前走了一步。</p>\n<p>「我叫Jill Valentine。安布雷拉安全部门的——前特工。」</p>\n<p>陈烬站在栅栏门前，月光照在他的背上。</p>\n<p>他看了看Jill，又看了一眼隧道的出口——外面是一片开阔的原野，没有丧尸，没有清剿队，没有陷阱的迹象。</p>\n<p>然后他回头看了一眼隧道深处——黑暗中什么也没有。</p>\n<p>「你有车吗？」他问。</p>\n<p>Jill挑起了一边的眉毛：「停车场里有一辆。——你们的运气不错。」</p>", "file": "040-最后的撤离.md", "prev": 39, "next": 41}, {"num": 41, "title": "结算", "body": "<h2>第四十一章·结算</h2>\n<p>车是一辆黑色的雪佛兰SUV——安布雷拉车队的标准配车，后排座椅上还残留着某个前主人的战术背心和一包开封的压缩饼干。Jill Valentine坐在驾驶座上，熟练地发动引擎，在没有开灯的情况下倒出了停车场。</p>\n<p>车窗外，浣熊市的轮廓在后视镜里越来越远。</p>\n<p>城市的天空在燃烧。黄色的云层下方，数道浓烟升腾而起——像这座城市在用最后的呼吸向夜空吐出一口浊气。蜂巢的方向传来一声低沉的轰鸣——不是爆炸，是某种大型结构崩塌的声音。反应堆，终于撑不住了。</p>\n<p>「清剿队会在天亮前撤离。」Jill说，眼睛看着前方的公路，「他们会在城市外围建立一个新的隔离区。官方的说法会是『核泄漏事故』。不会有关于T病毒的报道——不会有幸存者的证词——我们就是活着的证据，但只要我们在隔离区外面，他们就拿我们没办法。」</p>\n<p>「你知道得很多。」Ripley从后排说。</p>\n<p>「因为我曾经是负责销毁这些证据的人。」Jill的声音很平稳，「在我决定不做之前。」</p>\n<p>车内安静了几秒。</p>\n<p>然后——陈烬的视野中出现了一道熟悉的光芒。</p>\n<p>不是路灯——不是火光——</p>\n<p>是结算系统的界面。</p>\n<p><strong>「∞影城·剧本结算」</strong></p>\n<p><strong>「剧本：《生化危机》（改编版·第21次剧本演绎）」</strong>\n<strong>「难度：A级 → 实际触发A+级隐藏要素」</strong>\n<strong>「完成状态：主线完成 ✅」</strong></p>\n<p>他的视野里开始滚动出信息：</p>\n<p><strong>「主线任务判定：」</strong>\n- 存活至撤离浣熊市 → 完成\n- 到达货运隧道出口 → 完成\n- 保护至少2名队友存活 → 完成（Ripley生存、Amanda生存、Alice生存）\n- 发现蜂巢真相（T病毒为人为释放） → 完成（支线1）\n- 破解Wesker的改编剧本痕迹 → 完成（隐藏任务：触发！）\n- 与另一影城玩家相遇并交换信息 → 完成（隐藏任务：跨影城接触）\n- 发现上一轮玩家的遗留物品 → 完成（隐藏任务：遗言收集）</p>\n<p><strong>「评分：A+级」</strong></p>\n<p><strong>「积分明细：」</strong>\n- 基础通关（A+级系数×2000）：4000点\n- 支线1：发现人为泄露真相：2000点\n- 支线2：拯救Alice并揭示克隆真相：2000点\n- 隐藏任务：破解Wesker的改编：3000点\n- 隐藏任务：跨影城接触：2000点\n- 隐藏任务：遗言收集：1500点\n- 全队存活（4人全部生还）：2000点</p>\n<p><strong>「总计：16500点」</strong></p>\n<p><strong>「特殊奖励：」</strong>\n- 导演票根（碎片 4/7）已存入背包\n- 解锁称号：「病毒幸存者」\n- 效果：毒性/感染类伤害抗性+20%\n- 解锁新队友：Alice（可作为队友绑定）\n- 解锁新线索：Wesker·改编者</p>\n<p><strong>「观众关注度增长：115 → 380人」</strong></p>\n<p>陈烬关掉了结算界面。</p>\n<p>口袋里的那张从蜂巢底部找到的「上一位观众青睐者的遗言」——还在原来的位置。他摸了摸它。纸有些皱了。</p>\n<p>Jill从后视镜里看了他一眼：「你没事吧？」</p>\n<p>「没事。」陈烬说，「只是——在算一些东西。」</p>\n<p>「算什么？」</p>\n<p>「下一场。」陈烬的目光落在车窗外的夜色中，「越往前走——舞台越大。」</p>\n<p>浣熊市的灯光在后视镜中化成了一个越来越小的橙色光点。</p>\n<p>前方的公路伸入一片漆黑的田野。月亮在云层的边缘露出一个模糊的轮廓。</p>\n<p>车内没有人说话。</p>\n<p>但每一个人都知道——这只是中场休息。</p>\n<p>下一场电影，已经在等待他们了。</p>", "file": "041-结算.md", "prev": 40, "next": null}];
var current = 0;

var menuBtn = document.getElementById('menuBtn');
var themeBtn = document.getElementById('themeBtn');
var overlay = document.getElementById('overlay');
var tocPanel = document.getElementById('toc-panel');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');

menuBtn.onclick = function(){
  tocPanel.classList.toggle('open');
  overlay.classList.toggle('show');
};
overlay.onclick = function(){
  tocPanel.classList.remove('open');
  overlay.classList.remove('show');
};

themeBtn.onclick = function(){
  document.body.classList.toggle('light');
  try{localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark')}catch(e){}
};

function render(){
  var ch = chapters[current];
  if (!ch) return;
  document.getElementById('chapter-title').textContent = '第' + ch.num + '章 · ' + ch.title;
  document.getElementById('chapter-content').innerHTML = ch.body;
  prevBtn.disabled = !ch.prev;
  nextBtn.disabled = !ch.next;
  document.querySelectorAll('.toc-item').forEach(function(el,i){
    el.classList.toggle('active', i === current);
  });
  try{localStorage.setItem('lastChapter', current)}catch(e){}
  window.scrollTo(0,0);
  document.title = ch.title + ' · ∞影城';
}

prevBtn.onclick = function(){if(chapters[current].prev){current--;render()}};
nextBtn.onclick = function(){if(chapters[current].next){current++;render()}};

function goTo(n){current=n;render();tocPanel.classList.remove('open');overlay.classList.remove('show');}

// 生成目录
var list = document.getElementById('toc-list');
chapters.forEach(function(ch,i){
  var div = document.createElement('div');
  div.className = 'toc-item';
  div.textContent = '第' + ch.num + '章 ' + ch.title;
  div.onclick = function(){goTo(i)};
  list.appendChild(div);
});
// 恢复主题和进度
try{if(localStorage.getItem('theme')==='light')document.body.classList.add('light')}catch(e){}
try{var last=parseInt(localStorage.getItem('lastChapter'));if(!isNaN(last)&&last>=0&&last<chapters.length)current=last}catch(e){}
render();
</script>
</body>
</html>
