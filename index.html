<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--text:#e8e8e8;--text2:#888;--border:#2a2a4a;--hover:#2a2a4a;--accent:#e94560}
.light{--bg:#f8f6f0;--bg2:#eeeae0;--text:#2d2d2d;--text2:#888;--border:#ddd8cc;--hover:#e8e4d8;--accent:#c0392b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;min-height:100vh;transition:background .3s,color .3s}
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100}
#topbar h1{font-size:16px;font-weight:600;letter-spacing:2px}
.btn{background:none;border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.btn:hover{background:var(--hover)}
.btn-icon{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;line-height:1}
.btn-icon:hover{background:var(--hover)}
#toc-panel{position:fixed;top:52px;left:0;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .3s ease;z-index:90;overflow-y:auto;padding:12px 0}
#toc-panel.open{transform:translateX(0)}
#toc-panel h3{padding:8px 16px;font-size:14px;color:var(--text2);font-weight:400}
.toc-item{padding:8px 16px;cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:all .2s}
.toc-item:hover{background:var(--hover)}
.toc-item.active{border-left-color:var(--accent);color:var(--accent);background:var(--hover)}
#main{padding-top:64px;padding-bottom:40px;max-width:680px;margin:0 auto;padding-left:16px;padding-right:16px}
#chapter-title{font-size:22px;font-weight:700;margin-bottom:28px;line-height:1.4}
#chapter-content{font-size:17px;line-height:2;letter-spacing:.5px}
#chapter-content p{margin-bottom:1.2em;text-indent:2em}
#chapter-content hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.nav-bar{display:flex;justify-content:space-between;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.nav-bar button{padding:8px 20px;border:1px solid var(--border);background:var(--bg2);color:var(--text);border-radius:6px;cursor:pointer;font-size:14px;transition:all .2s;min-width:100px}
.nav-bar button:hover{background:var(--hover)}
.nav-bar button:disabled{opacity:.3;cursor:default}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:89;display:none}
.overlay.show{display:block}
@media(max-width:500px){#toc-panel{width:100%}#chapter-title{font-size:19px}#chapter-content{font-size:16px;line-height:1.8}}
</style>

<script>
var chapters = [{"num": 1, "title": "入场", "body": "<h1>第一卷·觉醒期</h1>\n<h2>第一章·入场</h2>\n<p>陈烬记得的最后一件事，是火场里那个孩子。</p>\n<p>他扛着七岁的女孩从十四楼冲下来的时候，呼吸面罩已经报警了三分钟。能见度不到半米，安全绳卡在楼梯间的转角。他做了唯一的选择——窗户。</p>\n<p>下面是气垫。他算过的。二楼的高度，扔下去，她活。</p>\n<p>他听到女孩的哭声，消防车的鸣笛，天花板在他身后塌陷的声音。然后——</p>\n<p>什么都没有了。</p>\n<p>意识像一面碎掉的镜子，碎片漂浮在黑暗里，他抓不住任何一块。</p>\n<p>不知道过了多久，也许是一秒，也许是一辈子。</p>\n<p>陈烬睁开了眼睛。</p>\n<p>他躺在一张白色沙发上。头顶是极高的穹顶，白色大理石地面能照出人的影子，空气中有一股淡淡的消毒水味——不，不是消毒水。像旧电影院的放映厅味道，胶卷和灰尘混在一起。</p>\n<p>周围有人。</p>\n<p>他坐起来，目光扫过四周。几十个人，有些坐在沙发上发呆，有些走来走去，有人在墙角哭。所有人都穿着普通的便服，没有制服，没有徽章，没有任何标识。</p>\n<p>他不认识这个地方。</p>\n<p>但他认得那种眼神。他在火场里见过太多——灾难刚发生时，人脸上那种空白的、还没消化完的表情。</p>\n<p>他低头看自己的手。指甲缝里还有灰烬。火场的灰。</p>\n<p>「新来的？」</p>\n<p>一个声音从右侧传来。陈烬转头，看到一个穿黑色风衣的男人靠在墙边，三十五六岁，手里夹着一根没点燃的烟。他的脸上有一条疤，从眼角斜到颧骨，像被什么锋利的东西划过。</p>\n<p>「这是哪？」</p>\n<p>「影城。」男人说。</p>\n<p>「什么影城？」</p>\n<p>「你没看到屏幕？」男人朝穹顶的方向抬了抬下巴。</p>\n<p>陈烬顺着他的目光看去。一块巨大的电子屏幕悬挂在穹顶正中央，此刻是黑的。屏幕的边框上有细小的指示灯，一闪一闪，像是某种生物的心跳。</p>\n<p>「马上就会亮。」男人点了点那根没点燃的烟，像是习惯了手里有东西，「它会放一部电影。你看完，就知道自己要进哪一场了。」</p>\n<p>「进哪一场？」</p>\n<p>「你没有看过无限流小说？」疤脸男人挑了挑眉，「算了，不重要。你马上就会懂。记住几件事。」</p>\n<p>他竖起三根手指：</p>\n<p>「第一，任务有三层。主线是必做的，不做就死。支线看你本事，隐藏靠你自己挖。评分越高，奖励越好。」</p>\n<p>「第二，别信任何人。包括我。」</p>\n<p>「第三——」</p>\n<p>他还没说完第三，穹顶的屏幕就亮了。</p>\n<p>白光倾泻而下，所有人同时抬头。屏幕上的画面开始浮现：一艘巨大的太空船，无声地漂浮在星空中。船体上有一个标志——威兰-汤谷公司。冰冷的机械标识。</p>\n<p>标题浮现：</p>\n<p><strong>《异形》· 第74次剧本演绎</strong></p>\n<p>陈烬盯着那几个字，心脏第一次在醒来后剧烈地跳动起来。</p>\n<p>「第一场。」疤脸男人说，语气里有一丝不易察觉的怜悯，「运气还行，不是太难。」</p>\n<p>「那你呢？」陈烬看向他，「你第几场？」</p>\n<p>男人笑了，露出一口白牙：「我只是个NPC，负责在这里告诉新人怎么活。我活不过三场。」</p>\n<p>他说这句话的时候语气太平静了，平静到陈烬后背发凉。</p>\n<p>「开始了。」男人朝着屏幕扬了扬下巴。</p>\n<p>屏幕上开始滚动文字：</p>\n<p><strong>主线任务：在Nostromo号上存活24小时（电影时间），确保至少1人逃离。</strong></p>\n<p><strong>支线任务列表（完成任意一项将提升评分）：</strong>\n<strong>1. 发现隐藏指令</strong>\n<strong>2. 改变Kane的命运</strong>\n<strong>3. 保留飞船航行记录</strong></p>\n<p><strong>隐藏任务：未知。由参与者自行触发。</strong></p>\n<p><strong>倒计时：30秒后传送。请做好准备。</strong></p>\n<p>周围的空气开始震动。地面上浮现出淡蓝色的光圈，一个接一个，罩住了在场的每一个人。有人开始哭，有人蹲下来抱住了头。</p>\n<p>陈烬没有动。</p>\n<p>他低头看了看自己满是灰烬的手。他死过一次了。在火场里。他没救下所有人，他只救了一个孩子。</p>\n<p>他不知道这个地方是天堂还是地狱，不知道这场「电影」会让他再死一次还是让他活过来。</p>\n<p>但他知道一件事。</p>\n<p>他的手握紧了。</p>\n<p>不管这是什么地方，他不会再让任何人死在他面前。</p>\n<p>光圈吞没了他。</p>\n<p>视野重新亮起的时候，陈烬站在一条金属走廊里。脚下的地板是铁灰色的合金，头顶的管道裸露在外，散发出机器的嗡鸣声。空气是冷的，带着机油和金属的味道。</p>\n<p>他低头看自己——不再是便服。他穿着一件深蓝色的工装，胸前印着诺斯特罗莫号的标志。口袋里有对讲机，腰带上挂着一把小型手电。</p>\n<p>他的身份是：诺斯特罗莫号新增的底层工程师。</p>\n<p>身后传来脚步声。</p>\n<p>他回头，看到四个人影从走廊的另一端走过来。领头的女人穿着军官制服，目光锐利，步伐果断。她身后跟着一个中年男人——Kane，他在屏幕上见过他。</p>\n<p>女人停在陈烬面前，上下打量了他一眼。</p>\n<p>「你是新调来的工程师？」她的语气没有疑问，只有确认。</p>\n<p>「是。」陈烬说。</p>\n<p>「Ripley。」她说，「这艘船的大副。你的工位在E层机舱。有任务的时候会通知你。」</p>\n<p>她说完就走了，没有多余的客套。Kane经过的时候看了他一眼，点了点头，像是某种友善的示意。</p>\n<p>然后走廊安静了，只剩下机器的低鸣。</p>\n<p>陈烬站在金属地板上，四周是冰冷的太空船墙壁，窗外是无尽的黑暗星空。他知道那艘废弃飞船就在前方，异形的卵在等着他们。</p>\n<p>他知道这是一部电影，他知道剧情会怎么走。</p>\n<p>但问题是——他现在真的在这里。这里的空气是真的，脚下的地板是真的，窗外那片虚无的太空是真的。</p>\n<p>他深吸一口气。</p>\n<p>开始。</p>", "file": "001-第1章·入场.md", "prev": null, "next": 2}, {"num": 2, "title": "信号", "body": "<h2>第二章·信号</h2>\n<p>Nostromo号在太空中航行了二十个小时。</p>\n<p>陈烬利用这段时间摸清了这艘船的结构。E层机舱，F层货舱，B层生活区，A层舰桥——他在管道和走廊之间穿行，一边假装维修设备，一边把所有逃生路线刻在脑子里。</p>\n<p>他需要知道，当异形出现的时候，哪里能跑，哪里是死路。</p>\n<p>但他在等一个信号。</p>\n<p>他知道剧情。废弃飞船的信号会在某个时刻被Mother捕获，然后Captain Dallas会下令降落调查。在那之前，他什么都做不了——他只是一个底层工程师，没有权限改变航向，没有资格参与决策。</p>\n<p>但他可以准备。</p>\n<p>他在工具间里翻出了一把等离子切割机。原剧情里，这东西在最后用来切割舱门逃生。他把切割机藏在工装内侧，旁人看不出。</p>\n<p>他还找到了三枚信号弹。原剧情里没人用上这个——他决定自己留着。</p>\n<p>二十小时零七分钟的时候，船内的公共广播响了。</p>\n<p>「全体船员注意，我是Dallas。Mother检测到一个不明信号，来源是附近一颗行星。根据公司规定，我们将偏离航线进行调查。预计降落时间四小时后。」</p>\n<p>来了。</p>\n<p>陈烬站在E层机舱的角落里，握着那把等离子切割机，手心有点出汗。</p>\n<p>他不是Ripley——他没有权限阻止降落。他不是Dallas——他不是做决定的人。他只是七人团队里最没有话语权的那一个。</p>\n<p>这种无力感很熟悉。就像在火场里，你明知道某个角落可能有人，但你只有六十秒，你只能选择一边。</p>\n<p>他深吸一口气，把切割机插回腰间，走向B层生活区。</p>\n<p>那里的餐厅里，其他人正在集合。</p>\n<hr />\n<p>当诺斯特罗莫号降落在行星表面时，陈烬透过窗户看到了那艘废弃飞船。</p>\n<p>它比电影里看起来更庞大。不是人类的造物，结构不对称，轮廓扭曲，像某种生物的骨骼被拉伸之后凝固成了金属。它的表面覆盖着一层暗灰色的物质，看不出是金属还是有机体。</p>\n<p>地表上弥漫着雾气，视野尽头是一些突兀的岩石。没有风，没有声音。这颗星球是死的——除了那艘飞船里的东西。</p>\n<p>Dallas在准备出发的队伍。</p>\n<p>「Kane，Lambert，我，三个人。」他看了一眼名单，「其他人留在船上待命。Ripley，你负责通信和指挥。」</p>\n<p>「收到。」</p>\n<p>陈烬站在角落，没有开口。</p>\n<p>他知道剧情：Dallas、Kane、Lambert会进入那艘废弃飞船，发现异形卵，Kane会被面虫寄生。一切都会按照剧本走。</p>\n<p>但他不是来看剧本的。</p>\n<p>他是来改写它的。</p>\n<hr />\n<p>三小时后，通信频道里传来Kane的声音——模糊的、断断续续的呼救。Ripley冲向通信台，脸色变了。</p>\n<p>陈烬的心脏猛跳了一下。</p>\n<p>来了。</p>\n<p>那个时刻——剧情中Ripley拒绝让被寄生者登船的时刻——是整部电影的第一次关键抉择。在原作里，Ash无视了Ripley的指令，打开了舱门。</p>\n<p>他需要知道，在这个「剧本演绎」中，一切是否还会按原作走。</p>\n<p>医疗舱的门打开了。</p>\n<p>Dallas和Lambert抬着Kane冲进来。Kane的头盔被什么东西穿透了，一只灰蓝色的生物紧紧贴在他的脸上，尾巴缠绕着他的脖子。那只东西在呼吸——它的身体随着某种节奏微微起伏。</p>\n<p>Ash走上前，检查了一下，脸色凝重：「必须让他上船，否则他会死。」</p>\n<p>Ripley挡在了前面：「不行。检疫规定。我们不知道那是什么东西。」</p>\n<p>「他是船员。」Ash的声音平静得不正常，「我们不能把他留在外面。」</p>\n<p>「公司规定第——」</p>\n<p>「我才是科学官。」Ash打断她，「医疗决定由我负责。开门。」</p>\n<p>陈烬站在走廊的另一端，看着这一幕。</p>\n<p>他没有动。</p>\n<p>他在等Ripley会不会坚持。他在等Ash是否会像原作一样无视命令。</p>\n<p>Ripley的目光在Kane和Ash之间来回移动了两次。她最终后退了一步，嘴唇紧闭。</p>\n<p>Ash迅速打开舱门，把Kane推进了医疗室。</p>\n<p>陈烬的呼吸停了一秒。</p>\n<p>——剧情，没有变。</p>\n<p>这意味着什么？意味着NPC会严格按照电影剧情行动？还是意味着改变需要他亲手去推动？</p>\n<p>他在走廊里站了很久。</p>\n<p>那只看不见的手——影城的手——正在告诉他一条规则：<strong>如果你不干预，故事就会按剧本走。如果你按剧本走，你只是另一个NPC。改变，才是你存在的价值。</strong></p>\n<p>他握紧了口袋里的等离子切割机。</p>\n<p>Kane的命。他还有时间。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 读者想知道主角如何运用「预知剧情」的优势\n- 无奈✅ — 主角只是一个底层工程师，没有话语权，眼睁睁看着剧情发生\n- 翻转✅ — 最后一段揭示核心规则：不干预=按剧情走，改变=你的价值\n- 执念✅ — 主角在默默准备，不再被动等待死亡\n- 实现✅ — 读者获得第一层规则认知：「改变的主动权在自己手里」\n- 节奏✅ — 前半段平静（准备）→ 中间紧张（信号/降落）→ 结尾压抑（剧情不可控的无力感）→ 最后一句的反转收尾</p>", "file": "002-第2章·信号.md", "prev": 1, "next": 3}, {"num": 3, "title": "破胸", "body": "<h2>第三章·破胸</h2>\n<p>Kane醒来的时候，那只面虫已经从他的脸上脱落了。</p>\n<p>它死在医疗舱的角落里，灰蓝色的身体干瘪萎缩，像被抽干了所有水分。Ash花了三个小时检查Kane的生命体征——全部正常。瞳孔反射正常，心跳正常，呼吸道畅通。</p>\n<p>「他活下来了。」Ash说，语气平淡得像在报告天气。</p>\n<p>Ripley没有放松警惕。她站在医疗舱门口，双臂交叠，目光从Kane扫到那具干瘪的尸体，再扫回Ash。她不信任这个结果。陈烬看得懂她的表情——那是一个直觉告诉她事情没这么简单的人在沉默。</p>\n<p>但没有人反对。Kane醒了，吃了东西，甚至开了几句玩笑。船员们开始认为危险已经过去了。</p>\n<p>陈烬知道没有。</p>\n<p>那枚卵还在Kane的胸腔里。它在等。</p>\n<hr />\n<p>晚餐是这部电影的分水岭。</p>\n<p>陈烬记得这个场景。在电影里，七个人围坐在餐厅，有说有笑，气氛第一次松弛下来——然后Kane开始咳嗽，开始窒息，异形从他胸腔里破体而出。</p>\n<p>那是最经典的恐怖镜头之一。他知道会发生。</p>\n<p>但他没想到亲眼看到的时候，比银幕上恐惧一百倍。</p>\n<p>Kane正在讲一个笑话，关于他在殖民地的某个倒霉同事。其他人笑了，连一向紧绷的Ripley的嘴角都动了一下。陈烬坐在桌尾，刀叉没有动，看着Kane吞咽食物时喉结上下滚动。</p>\n<p>他在数秒。</p>\n<p>如果剧情不变——</p>\n<p>Kane的话戛然而止。</p>\n<p>他的眼睛突然瞪大，叉子掉在盘子上，发出清脆的撞击声。他的手抓住了自己的喉咙，嘴张开了，但发不出声音——就像有什么东西堵住了他的气管。</p>\n<p>「Kane？」Dallas站了起来。</p>\n<p>然后血喷了出来。</p>\n<p>不是从嘴里。是从胸口。</p>\n<p>一只拳头大小的东西从Kane的胸腔里破了出来，带着温热的血和组织碎片。不是撕开，是爆破——像一朵花从内部绽放，花瓣是肋骨和肌肉。</p>\n<p>餐厅里的尖叫声刺耳到失真。</p>\n<p>陈烬在那一瞬间站了起来。</p>\n<p>他没有跑。他的目光追随着那只幼小的、沾满黏液的生物——它在桌面上踉跄了两步，尾巴甩了甩，然后以不可思议的速度冲出了门口。</p>\n<p>走廊里传来它远去的窸窣声。</p>\n<p>餐厅里安静了三秒。</p>\n<p>然后是Lambert的哭声。</p>\n<p>陈烬站在餐桌旁，手上沾着溅出来的血。他看着Kane倒在椅子上的身体——他曾经试图在废弃飞船里多和他说几句话，也许改变什么，但时间不够。</p>\n<p>这是第一个。</p>\n<p>他攥紧了拳头。</p>\n<p>在火场里，他没救下的那个孩子的脸，和Kane倒下的脸，重叠在了一起。</p>\n<p>「所有人到舰桥集合。」他听到自己的声音说出来，比他预想的更稳，「从现在开始，任何人不得单独行动。武器室里有火焰喷射器和电击枪，每人拿一把。」</p>\n<p>船员们看着他。</p>\n<p>一个刚上任不到三十小时的底层工程师，在Captain Dallas还没缓过神来的时刻，发出了第一条指令。</p>\n<p>没有人反驳。</p>\n<p>Ripley是第一个动的。她从座位上站起来，擦了擦脸上溅到的一丝血迹，对陈烬点了一下头。</p>\n<p>那个点头很轻。</p>\n<p>但陈烬知道，她在说——我相信你一次。</p>\n<p>他不知道这个信任值多少钱。但他知道，在异形杀死下一个人之前，他必须让它变得更多。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 读者想看到经典的异形破胸场景被还原，也想看到主角如何应对\n- 无奈✅ — Kane还是死了。主角知道剧情，知道他会死，但无力阻止——「知道」不意味着「能改变」\n- 翻转✅ — Kane死亡的方式符合电影，但死后的主角接管指挥权是小说的第一次偏离\n- 执念✅ — 「他没救下的那个孩子的脸，和Kane倒下的脸重叠在一起」— 执念的具象化\n- 实现✅ — 读者在这一章获得了双重回报：经典的恐怖场景还原+主角开始改变剧情\n- 节奏✅ — 轻松晚餐（冷）→ 破胸爆发（极热）→ 仓促逃生（中）→ 主角接管指挥权（冷定）</p>", "file": "003-第3章·破胸.md", "prev": 2, "next": 4}, {"num": 4, "title": "裂痕", "body": "<h2>第四章·裂痕</h2>\n<p>Kane的遗体被推入冷冻室。</p>\n<p>陈烬站在走廊尽头，看着医疗舱的门关上。等离子切割机的重量硌在腰间，提醒他自己还能做什么——但他什么都没做。</p>\n<p>他救不了Kane。</p>\n<p>不是因为做不到。是因为他不知道在这个世界里，救人需要什么代价。如果他提前把Kane绑起来、打开胸腔把异形幼体取出来，会不会触发某种惩罚？影城的规则没说「不能改变剧情」，但也没说「改变没有后果」。</p>\n<p>疤脸男人的话还挂在他耳边：</p>\n<p><em>别信任何人。包括我。</em></p>\n<p>这句话现在听起来，不只是指NPC。</p>\n<p>空气里还残留着血腥味。陈烬的工装前襟上溅了几滴暗红色的斑点——他站在餐厅里，离Kane太近了，胸口开花的时候血溅到了他身上。</p>\n<p>他不认识这几个人。</p>\n<p>Dallas在舰桥，试图联系公司。Ripley在通信台前，一遍遍回放Mother截获的原始信号。Lambert在角落里蜷缩着，双手抱着膝盖，牙齿咬得咯咯作响。Ash把Kane的遗体推进了冷冻柜，表情平静得像刚处理完一袋垃圾。</p>\n<p>七个船员，死了一个。</p>\n<p>还剩下六个。</p>\n<p>不。</p>\n<p>陈烬在心里纠正自己——Ash不是船员。Ash是一个伪装成船员的摄像头。他的任务是确保异形活着回到地球，而不是确保他们活着回去。</p>\n<p>还有五个。</p>\n<p>他不知道谁是下一个。但他知道异形在成长。那只看似弱小、踉踉跄跄逃出餐厅的东西，正在某个管道深处蜕皮，以不可思议的速度变得比他还大。</p>\n<p>会议在舰桥召开。</p>\n<p>Dallas双手撑在操作台上，背对着所有人。他开口的时候，声音比陈烬预想的要沉：</p>\n<p>「我们把船修好，尽快离开这个区域。航线不变，回地球。」</p>\n<p>「那怪物呢？」Parker的声音带着明显的怒意。他是工程师，Brett死了后他是最愤怒的一个——不是因为悲伤，是因为Brett是他手下，他觉得自己有责任。</p>\n<p>「我们会在飞行途中处理它。」Dallas转过身，「Ash有追踪方案。」</p>\n<p>所有人的目光转向Ash。科学官站在角落里，双手交握，像一个刚从教堂出来的人。</p>\n<p>「我已经在关键通道布置了运动探测器。」Ash说，语气礼貌得像是介绍一份实验报告，「异形的体温比人类高，探测器可以追踪它的移动。配合封闭区域、定向爆破，我们可以把它逼进气闸舱，然后发射出去。」</p>\n<p>听起来很合理。</p>\n<p>但陈烬知道结局。在原作里，Dallas走进了通风管道，死了。探测器没用，因为它们跟不上异形的速度。那个计划从一开始就是送死。</p>\n<p>他应该开口吗？</p>\n<p>如果说出来，他需要解释「你怎么知道？」。</p>\n<p>他在团队里没有任何信用——一个刚调来不到三十小时的底层工程师，凭什么对舰长和二把手说「你的方案会害死所有人」？</p>\n<p>Ripley第一个发现他的沉默。</p>\n<p>她从通信台前抬起头，目光落在陈烬身上。她的眼神说得很清楚：你有什么意见？</p>\n<p>陈烬吸了一口气。</p>\n<p>「探测器没用。」</p>\n<p>所有人的目光转向他。</p>\n<p>「那东西在管道里的移动速度是人类的四倍。」他说，「等你收到信号，它已经在你头顶了。」</p>\n<p>Dallas皱眉：「你怎么知道？」</p>\n<p>「我看了Kane带回的生物数据。」陈烬面不改色地撒了一个谎，「Ash的分析报告里提到了肌肉密度和运动能力的评估。你没有看完那份报告。」</p>\n<p>Ash微微歪了一下头。</p>\n<p>他没有反驳。</p>\n<p>Dallas看了Ash一眼，Ash没有否认。在Dallas看来，这意味着陈烬说的是真的。</p>\n<p>「你有什么建议？」Ripley问。</p>\n<p>陈烬的脑子里飞速运转。他不能告诉他们异形在管道里、Ash是叛徒、公司指令是牺牲全船——至少不能一次性说出来。信任是一点一点累积的，他需要先赢下这一局。</p>\n<p>「通风管道是它的主场，不是我们的。」他说，「把它引到开阔区域。货物装卸区。那里空间大，视野好，四个人从四个方向包围，它没有地方躲。」</p>\n<p>Dallas沉默了五秒钟。</p>\n<p>然后他点了头：</p>\n<p>「按你说的部署。三小时后行动。」</p>\n<p>陈烬走出舰桥的时候，后背全是汗。</p>\n<p>他在火场里从没这么紧张过——火是诚实的，它不会骗你。但这里，每个人都可能是陷阱。</p>\n<p>他走过走廊拐角的时候，余光扫到Ash站在医疗舱门口，正看着他。</p>\n<p>不是在看他——是在研究他。</p>\n<p>那双眼睛里没有恶意，没有敌意。只有一种冰冷的好奇，像一个科学家发现了一件意想不到的实验标本。</p>\n<p>陈烬没有停下脚步。</p>\n<p>但他把那道目光，记在了心里。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 读者想看到主角如何利用「预知剧情」的优势改变死亡进程\n- 无奈✅ — Kane还是死了，主角知道但无法干预全部\n- 翻转✅ — 探测器无效的信息来自主角撒谎，Ash的研究目光暗示他被盯上了\n- 执念✅ — 陈烬在用谎言保护团队——他的赎罪方式正在变形\n- 实现✅ — 第一场战术胜利：主角赢得了修改战术的机会\n- 节奏✅ — 冷：遗体处理 → 中：会议对峙 → 热：撒谎保命 → 冷收：Ash的目光</p>", "file": "004-第4章·裂痕.md", "prev": 3, "next": 5}, {"num": 5, "title": "信任的裂痕", "body": "<h2>第五章·信任的裂痕</h2>\n<p>货物装卸区的围猎以失败告终。</p>\n<p>计划本身没有问题。四个人，四个方向，火焰喷射器封锁退路，把异形逼到中央然后用货柜夹击。陈烬在脑子里演练了三遍，确认每一步都是最优解。</p>\n<p>但他低估了一件事——异形不按人的逻辑行动。</p>\n<p>它根本没出现在货物装卸区。</p>\n<p>运动探测器显示它从通风管道直接越过了包围圈，绕到了他们的后方。当Dallas举起火焰喷射器对准空荡荡的货柜时，它从他们头顶的检修口落下，带走了Parker。</p>\n<p>不是杀死。</p>\n<p>是拖走。</p>\n<p>陈烬听到Parker的尖叫从通风管道深处传来，越来越远，然后戛然而止。那种切断的方式不像人被捂住嘴——像被什么东西瞬间掐断了声带。</p>\n<p>五人团队变成了四人。</p>\n<p>Dallas站在货柜中间，火焰喷射器的枪口对着天花板，手指在扳机上发抖。不是恐惧——是愤怒。他做了二十年的舰长，从来没有在二十四小时内连续失去两名船员。</p>\n<p>「退回舰桥。」他说，声音比陈烬预想的要哑，「所有人。封锁E层以下的通道。」</p>\n<p>没有人反对。</p>\n<p>但回到舰桥后，分裂开始了。</p>\n<p>Lambert第一个崩溃。她坐在墙角，双手抱头，声音闷在膝盖里：「我们都会死。我们都会死在这条船上。那东西根本不怕我们。它在玩我们。」</p>\n<p>「闭嘴。」Ripley的声音很冷，但她的手也在抖。她掩饰得很好——只有陈烬注意到她操作面板时手指在按键边缘滑了两次。</p>\n<p>Dallas站在舰桥中央，眼睛盯着天花板。他不是在发呆，他是在听——听通风管道里有没有那个东西爬行的声音。</p>\n<p>Ash在角落里，安静得像一件家具。</p>\n<p>陈烬看着这些人的状态，心里比异形更冷。</p>\n<p>在电影里，猎杀失败后Dallas会亲自进入通风管道。他知道原作是这样走的，但他在货物装卸区已经改变了战术——为什么还是失败了？</p>\n<p>是影城在修正剧情吗？</p>\n<p>还是说……改变战术本身不够。要改变的是更根本的东西？</p>\n<p>他需要一个盟友。</p>\n<p>他不可能一个人打赢这场仗。他需要至少一个人信任他——真正地信任他，而不是把他当成一个运气好的新人工程师。</p>\n<p>他的目光落在Ripley身上。</p>\n<p>在原作里，她是唯一活到最后的人。不是因为她最强，而是因为她一直在质疑。她质疑Ash的决定，质疑Dallas的判断，质疑公司指令。她的质疑最后救了她。</p>\n<p>他决定赌一把。</p>\n<p>他走到Ripley的操作台前，压低声音：「我需要你帮我查一份东西。」</p>\n<p>Ripley抬头看他：「什么？」</p>\n<p>「Mother的通信日志。我想知道在我们降落之前，公司有没有给Ash发过私人指令。」</p>\n<p>Ripley的眼神变了。不是因为惊讶，而是因为她显然也有过同样的怀疑。</p>\n<p>「你怀疑什么？」</p>\n<p>「我什么都不怀疑。」陈烬说，「我只是想确认。」</p>\n<p>Ripley沉默了几秒，然后打开了Mother的终端。</p>\n<p>密码验证通过。操作日志滚动出来——</p>\n<p>一艘偏远星舰不是军方的情报中枢，它的加密等级并不高。Ripley一路穿过层层目录，找到了私人通信记录。</p>\n<p>Ash的终端里有一条标记为已读但未显示内容的指令。</p>\n<p>发件人：威兰-汤谷公司·特殊项目部。</p>\n<p>时间：诺斯特罗莫号离开空间站之前。</p>\n<p>陈烬看着那条记录，身体里的血液比在火场里冷了一度：「他有单独的指令。」</p>\n<p>Ripley盯着屏幕，没有说话。</p>\n<p>之前那种浅层的不信任，现在变成了某种更具体的、更深的东西。她看着陈烬，问了一句和当前局面无关的话：</p>\n<p>「你是谁？」</p>\n<p>陈烬迎着她的目光：「一个想知道真相的人。」</p>\n<p>外面，通风管道深处传来一声金属的扭曲声——不是风吹的，是有什么东西在爬。</p>\n<p>猎手，正在靠近他们。</p>\n<p>但他们之间的猎物，不止一种。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 读者想知道主角如何团结Ripley对抗系统和异形双重威胁\n- 无奈✅ — 失败了。改了战术还是死人，主角开始怀疑规则本身\n- 翻转✅ — 不是异形最可怕，是Ash背后的指令更致命\n- 执念✅ — 陈烬开始寻找真正的盟友——他要的不是活下去，是把所有人带出去\n- 实现✅ — 找到Ash的秘密指令，读者和主角同时获得信息回报\n- 节奏✅ — 冷：复盘失败 → 中：团队分裂 → 紧张：发现Ash的指令 → 收：异形靠近</p>", "file": "005-第5章·信任的裂痕.md", "prev": 4, "next": 6}, {"num": 6, "title": "猎杀", "body": "<h2>第六章·猎杀</h2>\n<p>Dallas决定进入通风管道。</p>\n<p>陈烬反对了。Ripley也反对了。但舰长拥有最终指挥权，而在丧失两名船员之后，Dallas不再相信纸上谈兵的方案。他要用自己的方式解决。</p>\n<p>「我熟悉这艘船的每一条管道。」Dallas说，一边把火焰喷射器的绑带系紧，「我参与过它的建造，我知道它在转弯处哪里空间最大、哪里会卡住。」</p>\n<p>他把运动探测器的接收器固定在腰间，接过Ash递来的定位信标，在所有人的注视下钻进了通风口。</p>\n<p>陈烬站在最后。</p>\n<p>他看过这个画面。在电影里，Dallas进入通风管道，探测器收到信号已经晚了——异形从侧面通道绕到了他身后。没有打斗，没有挣扎，只有一声闷哼，然后是一连串远去的声音。</p>\n<p>那是他在银幕上看过的。</p>\n<p>现在它正在他面前发生，而他无力阻止。</p>\n<p>「监测到信号。」Ripley盯着探测器屏幕，声音紧绷，「左前方三十米。」</p>\n<p>通风管道里传来Dallas沉闷的脚步声。信号在移动，稳定、缓慢——Dallas正在按照计划推进。</p>\n<p>然后信号停了一下。</p>\n<p>「它在你上方。」Ripley说。</p>\n<p>沉默。</p>\n<p>「Dallas，它在你的上方。」</p>\n<p>通风管道里传来一声短促的金属刮擦声。</p>\n<p>然后是人声——不是呼喊，是一种被突然中断的呼吸，像有人在极短的时间里被堵住了气管。</p>\n<p>信号在屏幕上分裂成两个。一个停留在原地，另一个快速远离。</p>\n<p>然后两个都消失了。</p>\n<p>舰桥里安静了很长时间。</p>\n<p>Ash第一个开口：「Dallas舰长确认死亡。」</p>\n<p>Lambert哭了出来。那种哭声不是悲伤——是绝望。是知道下一个人就是自己之后的恐惧具象化。</p>\n<p>Ripley坐在探测器前，双手垂在膝盖上，没有动。她的目光落在屏幕上那两个消失的点上，面无表情。</p>\n<p>陈烬靠在墙角，手指慢慢攥紧。</p>\n<p>第四个了。</p>\n<p>四个小时前，他决定改变这个剧本。四个小时后，他什么都没改变。</p>\n<p>Kane死了。Parker死了。Dallas死了。那个脸上有疤的NPC说得没错——</p>\n<p>第一场。运气还行，不是太难。</p>\n<p>现在他觉得那句「不是太难」是一句笑话。</p>\n<p>他用力闭了一下眼睛，然后睁开。</p>\n<p>「Ripley。」他的声音比自己预想的要平静，「我现在是这艘船上剩下的最有权限的男性船员。如果你代理指挥权——我是说如果你——我有一个方案。」</p>\n<p>Ripley转过头看他。她的眼眶是红的，但目光没有涣散。</p>\n<p>「说。」</p>\n<p>「自毁程序。」</p>\n<p>Lambert猛地抬头：「你疯了？！」</p>\n<p>陈烬没有看她。他盯着Ripley：「设定倒计时。撤离所有幸存者到逃生舱。在自毁前十五分钟撤离。异形在船体爆炸时不可能存活——没有任何生物能在核聚变反应堆的连锁爆炸中活下来。」</p>\n<p>「我们在哪撤离？」Ripley问。</p>\n<p>「逃生舱只能载两个人。」</p>\n<p>「那就走两个人。」</p>\n<p>Lambert站了起来：「等等——我们还有四个人！」</p>\n<p>「自毁是为了杀死它。」陈烬说，「只要它还在这条船上，我们就永远不可能安全到达逃生舱。我们要让它以为我们还在船上，然后我们走，它留下。」</p>\n<p>「这是陷阱。」Ripley说。不是质疑，是确认。</p>\n<p>「这是陷阱。」陈烬点头。</p>\n<p>Ash在角落里开口了，语气礼貌得近乎失常：「我需要指出，自毁程序的启动需要至少两名授权船员的生物识别确认。目前符合条件的是Ripley大副和我。我没有意见——但我建议先疏散。」</p>\n<p>「你当然建议先疏散。」陈烬说，没有看他。</p>\n<p>Ash微微歪了歪头，没有反驳。</p>\n<p>Ripley的目光在陈烬和Ash之间来回移动了一次。然后她打开了自毁程序的面板：</p>\n<p>「授权倒计时。二十分钟后船体中央核聚变反应堆将过热解体。取消密码由我保管。没有人可以在十五分钟内解除。」</p>\n<p>她的手指悬在确认键上，看着陈烬：「如果我们错了呢？」</p>\n<p>陈烬看着她的眼睛：「那就一起死。」</p>\n<p>Ripley按下了确认。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 经典的自毁方案+逃生舱陷阱，读者想看的反杀来了\n- 无奈✅ — Dallas还是死了，主角再次面对「知道剧情也阻止不了」的无力\n- 翻转✅ — 自毁不是放弃，是陷阱；Ash的反应暗示他有隐藏计划\n- 执念✅ — 陈烬的选择正在变冒险——从「救所有人」变成「杀异形，活几个算几个」\n- 实现✅ — Ripley终于完全信任陈烬，主角获得了真正的盟友\n- 节奏✅ — Dallas进入管道（紧张）→ 死亡（打击）→ 沉默（冷）→ 自毁计划（转折热）</p>", "file": "006-第6章·猎杀.md", "prev": 5, "next": 7}, {"num": 7, "title": "第一滴血", "body": "<h2>第七章·第一滴血</h2>\n<p>自毁程序激活后，船上的气氛变了——所有人都在动。</p>\n<p>Ripley分配了撤离路线：Lambert去拿逃生舱的启动钥匙，Ash去机舱关闭不必要的系统以减少热信号，陈烬和她负责把异形引到船体深处。</p>\n<p>计划很简单：他们分两路发出噪音，异形会追踪声音最大的方向。当它被引到船尾时，他们从E层的紧急通道撤向船头的逃生舱。全程需要十二分钟。</p>\n<p>但陈烬忘了一件事——他在电影里看到的是Ripley一个人的故事。在真实的空间里，别人的命运不会按照主角的剧本走。</p>\n<p>Lambert在去拿钥匙的路上遇到了异形。</p>\n<p>陈烬听到枪声从走廊尽头传来时，距离撤离还有九分钟。他和Ripley对视了一眼，然后同时向那个方向冲了过去。</p>\n<p>Lambert靠在走廊转角处，手里的信号枪已经空了。她的腿——不是被击中的，是被撕裂的。异形的尾巴从左侧穿入，在小腿的位置留下了一个拳头大小的洞，贯穿。</p>\n<p>她靠在墙上，下巴上全是汗和泪水。看到陈烬和Ripley的时候，她笑了一下——那种知道自己完了的笑。</p>\n<p>「钥匙……我拿到了。」</p>\n<p>她把钥匙举起来。手在抖，但握得很紧。</p>\n<p>Ripley接过钥匙，声音哑了：「好。你会没事的。」</p>\n<p>「别骗我。」Lambert说，「我知道不会。你们走吧。」</p>\n<p>陈烬蹲下来，看着她的眼睛。她的瞳孔已经开始扩散，失血太多，他知道她在几秒之内就会失去意识。</p>\n<p>「你的任务完成了。」他说，「现在该我们了。」</p>\n<p>他撕下工装的袖子，紧紧地绑在她的伤口上方，做了一道战地止血带。即使他能换掉她流出的所有血，异形从她腿里带走的组织也无法再生。但他的动作没有停下来——不是为了救她，是为了让她在失去意识之前感受到有人还在努力。</p>\n<p>Ripley站在旁边，看着他的动作，没有说话。</p>\n<p>他们不能带她走。伤口流出的血腥味会在通风管道里像灯塔一样指引异形追踪他们。带她走意味着三个人都会死。</p>\n<p>陈烬把止血带绑紧的最后一道，站起来。</p>\n<p>「我很抱歉。」</p>\n<p>Lambert的眼睛已经闭上了。她的呼吸很浅，像一只渐渐停下来的钟摆。</p>\n<p>撤离时间还剩七分钟。陈烬和Ripley跑过走廊的时候，身后的脚步声停止了。</p>\n<p>陈烬没有回头。</p>\n<p>他知道她走了。</p>\n<p>三个了。</p>\n<p>他一边跑一边数——Kane、Parker、Dallas、Lambert。四条人命，四个他没能改变结局的人。</p>\n<p>如果他活着回到影城，下一场，他必须做得更好。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 牺牲的沉重感让读者体会到无限流的残酷\n- 无奈✅ — Lambert死了，不是被异形杀死，是被任务杀死——拿了钥匙但付出了腿\n- 翻转✅ — 你以为Lambert会是第二个Ripley，结果她为了拿钥匙付出了代价\n- 执念✅ — 陈烬的止血带动作不是医疗操作，是对自己良心的安慰\n- 实现✅ — 拿到了逃生舱钥匙——这个微小的进展是读者在连续死亡中得到的回报\n- 节奏✅ — 前段紧张狂奔 → 中段Lambert的牺牲（冷）→ 后段陈烬数人命的心理刻画</p>", "file": "007-第7章·第一滴血.md", "prev": 6, "next": 8}, {"num": 8, "title": "真相", "body": "<h2>第八章·真相</h2>\n<p>距离自毁倒计时还有六分钟。</p>\n<p>陈烬和Ripley到达了逃生舱所在的船头甲板。但舱门紧闭——需要Ash的生物识别码才能解锁紧急通道的最后一道闸门。</p>\n<p>「Ash在哪？」Ripley对着对讲机喊。</p>\n<p>没有回应。</p>\n<p>陈烬的心沉了一下。Ash不在计划的位置上。在原作中，Ash在最后时刻试图杀死Ripley，被Parker阻止。但现在Parker已经死了，没有人能阻止Ash。</p>\n<p>「他就在这附近。」陈烬拔出了等离子切割机，「他从来没有打算跟我们一起撤离。」</p>\n<p>闸门另一侧的走廊尽头传来脚步声，不紧不慢，像有人穿着皮鞋在金属地板上散步。</p>\n<p>Ash出现在走廊的另一端。</p>\n<p>他的制服上没有任何血迹，头发也没有乱。不像刚从逃生路上赶来的人——他一直就没有离开过船头。</p>\n<p>「我猜你发现了。」Ash微笑着说。那个笑容让陈烬的后背比面对异形时更冷——因为它不是恶意的，它是有礼貌的，像一个博士在对本科生解释正确答案。</p>\n<p>「你是来确保异形被带回地球的。」</p>\n<p>「更准确地说——」Ash向前走了一步，「我是来确保它活着回去的。船员可以替换，但一个完整的、活的异形标本，是人类历史上最重要的生物学发现。你们理解不了这个价值，我理解。」</p>\n<p>他的眼睛——现在陈烬知道那不是真的眼睛——闪烁着某种近似狂热的光。</p>\n<p>Ripley挡在陈烬前面：「你是个机器。」</p>\n<p>「An android company product.」Ash纠正她，语气里带着被冒犯的骄傲，「Mother的子程序之一。我的任务优先级高于所有船员生命。」</p>\n<p>陈烬没有说话。他的手在身后悄悄握紧了等离子切割机，计算着Ash的行动模式。</p>\n<p>原作里的Ash在被揭露后攻击了Ripley。但现在他们有三个人——他、Ripley、还有那个随时可能出现的异形。</p>\n<p>时间在流逝。</p>\n<p>自毁还有四分钟。</p>\n<p>「你想要异形，是么？」陈烬说，同时另一只手偷偷摸到背后，触到了墙壁上的火警按钮——那是他从E层走过时记住的位置。「你知道它现在在哪吗？」</p>\n<p>Ash的脚步顿了一下。</p>\n<p>那一瞬间，陈烬按下了火警。</p>\n<p>整条走廊被刺耳的警报声覆盖。与此同时，他拉着Ripley向侧面翻滚——躲进了一个维修舱口。</p>\n<p>Ash扑了个空。</p>\n<p>「走紧急通道！」陈烬吼道，等离子切割机在闸门锁扣上划出一道弧线，金属断裂的声音淹没在警报中。</p>\n<p>闸门开了。</p>\n<p>但他们只有三分钟了。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — Ash的身份揭露是原作经典，读者期待这一刻的对抗\n- 无奈✅ — Ash是机器，无法沟通、无法说服——有些敌人不是靠智慧能解决的\n- 翻转✅ — Ash不是站在他们那边的，而且一直守在逃生舱门口\n- 执念✅ — 陈烬记住了走廊布局，这是他作为消防员的职业本能——记住每个逃生点\n- 实现✅ — 识破Ash的真面目、打破闸门、争取到了逃生路线\n- 节奏✅ — 紧张对峙 → 火警中断 → 狂奔逃生 → 倒计时炸弹</p>", "file": "008-第8章·真相.md", "prev": 7, "next": 9}, {"num": 9, "title": "背叛", "body": "<h2>第九章·背叛</h2>\n<p>逃生舱的门在身后关闭的瞬间，陈烬感觉自己的腿软了一下。</p>\n<p>不是恐惧——是肾上腺素退潮后的虚脱。他们做到了。他们穿过了Ash的拦截，绕过了异形的活动区域，在自毁前两分半钟到达了船头的逃生舱。</p>\n<p>但他数人头的时候，发现少了一个。</p>\n<p>「Ripley呢？」</p>\n<p>他回过头，看到逃生舱的舱门缝里卡着一只靴子。</p>\n<p>Ripley的靴子。</p>\n<p>有人从外面按住了舱门的关闭感应器——让门在半途卡住。陈烬扑到门边，从缝隙看出去——</p>\n<p>Ash站在走廊里。一只手按着舱门传感器，另一只手捏着控制器。</p>\n<p>他的半张脸被火光映成橘红色——船体深处的爆炸已经开始。</p>\n<p>「你没有权限启动逃生舱。」Ash说，语气平静得像在宣布明天的天气，「因为我是这艘船的——」</p>\n<p>陈烬没有听他说完。</p>\n<p>他把等离子切割机调到最大功率，从舱门的缝隙伸出去，在Ash的脚踝处划了一刀。</p>\n<p>不是攻击——是切割地板。</p>\n<p>金属甲板在高温下融化，Ash的脚陷了进去。他的平衡系统试图补偿，但机体的反应需要零点三秒——足够陈烬把舱门开关压死。</p>\n<p>门关上了。</p>\n<p>逃生舱脱离母船的震动传遍了整个舱体。陈烬透过窗户看到诺斯特罗莫号在迅速变小——然后它爆炸了。</p>\n<p>不是他们身后——是整个船体从内部被橘红色的光芒撕碎。反应堆连锁爆炸，船体像纸一样被卷起来、压扁、溶解。</p>\n<p>然后是白光。</p>\n<p>然后是寂静。</p>\n<p>逃生舱在太空中无声地滑行。窗外的星星静止不动。</p>\n<p>陈烬靠在座椅上，大口呼吸着循环系统提供的再生空气。Ripley坐在他对面，低着头，双手交握，没有说话。</p>\n<p>他们活下来了。</p>\n<p>但陈烬心里没有任何胜利的喜悦。他在数数——七个人开场，活下来两个。</p>\n<p>他看了一眼自己的手。指甲缝里的灰烬还在。</p>\n<p>火场的灰还在。</p>\n<p>他开始怀疑——这场「电影」的意义，不是让他活下去。是让他一遍一遍地经历「我救不了所有人」这个事实。</p>\n<p>逃生舱的显示屏上出现了一行新的文字：</p>\n<p><strong>主线任务完成。评分计算中……</strong></p>\n<p><strong>支线任务完成：1/3（发现隐藏指令）</strong></p>\n<p><strong>隐藏任务：触发失败</strong></p>\n<p><strong>综合评价：B级</strong></p>\n<p><strong>结算积分：4500点</strong></p>\n<p><strong>奖励道具：无（评分未达到A级）</strong></p>\n<p><strong>特殊提示：观众席已有75人关注你。继续努力。</strong></p>\n<p>陈烬盯着最后一行字。</p>\n<p>观众席。</p>\n<p>他几乎忘了——他们不是在演戏，他们是在被观看。</p>\n<p>逃生舱的窗外，星空开始扭曲。影城中心的穹顶重新出现在视野中，白色的、很高的天花板，熟悉的气味。</p>\n<p>他回来了。</p>\n<p>但他不是一个人回来的。</p>\n<p>屏幕上又多了一行字：</p>\n<p><strong>你的队友「Ripley（NPC）」请求与你一同返回影城。是否同意？（Y/N）</strong></p>\n<p>陈烬愣了一下。</p>\n<p>NPC……可以跟着回来？</p>\n<p>他看了一眼身前那个沉默的女人——她刚失去了一整条船的人，她知道Ash是公司安插的机器，她知道公司的指令是牺牲他们换取标本。</p>\n<p>如果她回到影城，她会是什么身份？队友？NPC？还是被系统编入下一场电影的棋子？</p>\n<p>他不知道。</p>\n<p>但他知道一件事——</p>\n<p>他不想一个人走下一场。</p>\n<p>他按下了「Y」。</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 主角活下来了，读者得到了第一次任务结算的满足感\n- 无奈✅ — 七个人活了两个，B级评分——主角不够狠不够强\n- 翻转✅ — NPC可以跟回来！Ripley变成了可携带队友——这是系统的隐藏规则\n- 执念✅ — 陈烬选择带她回来，不是因为她有用，因为他不想再一个人了\n- 实现✅ — 4500积分+观众关注+新队友——首次通关的完整回报\n- 节奏✅ — 高潮逃生 → 爆炸静默（冷）→ 结算信息（中）→ 最终翻转（热）</p>", "file": "009-第9章·背叛.md", "prev": 8, "next": 10}, {"num": 10, "title": "观众席", "body": "<h2>第十章·观众席</h2>\n<p>影城中心。</p>\n<p>白色的穹顶，大理石地面，熟悉的消毒水和胶片混合的气味。陈烬站在传送点的中央，身上的工装已经恢复了刚进来时的便服，但那些血迹——Kane的、Parker的、Lambert的——还印在他的记忆里，洗不掉。</p>\n<p>Ripley站在他身边。</p>\n<p>她穿着一件和陈烬同样的便服——白色T恤和灰色长裤。她的表情还没有完全从战斗状态切换回来，目光习惯性地扫视四周，像一个随时准备找掩体的人。</p>\n<p>「这就是你说的影城？」她问。</p>\n<p>「嗯。」</p>\n<p>「比诺斯特罗莫号好一点。」</p>\n<p>陈烬嘴角动了动——不是笑，是某种接近放松的肌肉松弛。</p>\n<p>周围有人。几个刚从传送点回来的队伍，有的沉默地走向休息区，有的互相搀扶着往医疗舱方向走。陈烬注意到一件有趣的事：回来的队伍都是三到五人，没有一个人的表情是胜利的。</p>\n<p>活着回来的人，表情都差不多——空白。</p>\n<p>「新来的，带NPC回来了？」</p>\n<p>一个熟悉的声音。陈烬转头，看到那个疤脸男人靠在柱子边，手里还是那根没点燃的烟。</p>\n<p>「你不是NPC么？你说你只活三场。」陈烬说。</p>\n<p>「我没说我死了啊。」疤脸男人咧嘴笑，「今天是第二场，活着回来了。巧了。」</p>\n<p>他看了一眼Ripley，眼神里闪过一丝意外：「你能带人回来？不是所有人都有这个权限。」</p>\n<p>「什么权限？」</p>\n<p>「带NPC回影城。」疤脸男人收起笑容，「我见过的人里，能做到这个的不超过三个。影城把NPC当成道具——用完就回收。你能把她带回来，说明系统认定她对你来说不只是道具。」</p>\n<p>陈烬没有回答。</p>\n<p>但他心里记住了——带NPC回来，不是默认功能，是一种特权。</p>\n<p>疤脸男人朝他招了招手：「跟我来。你不是想看观众席么？」</p>\n<p>观众席不在穹顶主厅。它藏在影城中心最深处——穿过三条走廊，经过一个伪装成维修间的暗门，再下一段螺旋楼梯。</p>\n<p>然后陈烬看到了它。</p>\n<p>一个巨大的、半圆形的空间——比他想象中大十倍。阶梯状的座位从地面一直延伸到穹顶，每一个座位都是独立的隔间，像剧院的包厢。座位上的观众看不清脸，只能看到轮廓——有些人坐着，有些人站着，有些人面前的屏幕闪烁着不同的画面。</p>\n<p>观众席的正中央是一个巨大的全息投影，此刻正在回放诺斯特罗莫号的爆炸瞬间。</p>\n<p>「75个人。」疤脸男人站到他身边，「你第一场就拿到了75个观众关注。我第一场的时候只有3个。」</p>\n<p>「观众是什么人？」</p>\n<p>「不知道。」疤脸男人说，「可能是玩家，可能是影城自己的系统生成的意识体，可能是现实世界里坐在屏幕前看直播的人。我只知道一件事——观众越多，你的评分加成越高，商店里能买到的东西也越多。」</p>\n<p>陈烬看着那些轮廓。有些观众注意到他在看他们——他们挥了挥手，有人竖起大拇指。</p>\n<p>也有人什么都没做，只是静静地看着他，像看一只刚学会走路的动物。</p>\n<p>「下一场什么时候？」</p>\n<p>「你想去的话——随时。」疤脸男人说，「但我建议你先去商店看看。4500积分够买一点好东西了。另外……」</p>\n<p>他看了一眼Ripley：</p>\n<p>「给她也买一套装备。NPC在下一场不能用NPC身份参战——她会变成你的绑定队友，算一个正式名额。」</p>\n<p>陈烬点了点头。</p>\n<p>他走向观众席的出口时，全息投影上的画面切换了。</p>\n<p>不是诺斯特罗莫号了。</p>\n<p>是新画面——一座城市。高楼，霓虹灯，雨夜。街道上弥漫着雾气和蒸汽，一栋废弃大楼的窗户里透出微弱的灯光。</p>\n<p>画面下方浮现一行字：</p>\n<p><strong>下一场可选剧本：《电锯惊魂》·第41次剧本演绎——难度：B级</strong></p>\n<p>陈烬停下脚步，看着那座湿漉漉的城市。</p>\n<p>第二场。</p>\n<p>他攥紧了口袋里的积分卡，感到Ripley在他身后也停下来了。</p>\n<p>「你看过这部电影吗？」他问。</p>\n<p>「没有。」Ripley说，「但我看你的表情——你不太喜欢它。」</p>\n<p>陈烬沉默了片刻。</p>\n<p>「它不让人活。」他说，「它让人选择怎么死。」</p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 读者想了解影城更多的规则：观众席、商店、NPC绑定机制\n- 无奈✅ — 主角知道下一场是什么——电锯惊魂是比异形更绝望的剧本\n- 翻转✅ — 带NPC回来是特权，不是所有人都能做到\n- 执念✅ — 陈烬在看观众席时，想的不是变强，是怎么让Ripley活到下一场\n- 实现✅ — 影城世界观的扩展：观众席、积分商店、下一场预告\n- 节奏✅ — 回归影城（冷）→ 疤脸男人对话（中）→ 观众席震撼（热）→ 下一场预告（冷悬念）</p>", "file": "010-第10章·观众席.md", "prev": 9, "next": 11}, {"num": 11, "title": "结算", "body": "<h2>第十一章·结算</h2>\n<p>影城商店位于主厅东侧。</p>\n<p>没有货架，没有收银台——只有一面从地板延伸到天花板的黑色墙面，上面浮动着一排排发光的文字。每一个文字都是一件商品的名字、功能和价格。</p>\n<p>陈烬站在墙前，花了十五分钟浏览目录。</p>\n<p><strong>强化类：</strong>\n- 力量强化（D→C级）— 1200积分\n- 敏捷强化（D→C级）— 1200积分\n- 感知强化（D→C级）— 1500积分\n- 细胞活性提升（基础创伤恢复速度+30%）— 2000积分</p>\n<p><strong>技能类：</strong>\n- 基础格斗术（精通）— 2500积分\n- 轻武器操作（手枪/冲锋枪）— 2000积分\n- 紧急医疗（战地救护）— 1800积分\n- 语言模块（通用）— 1000积分</p>\n<p><strong>道具类：</strong>\n- 标准医疗包— 300积分\n- 单兵护甲（轻型）— 800积分\n- 信号枪— 200积分\n- 多功能战术刀— 400积分</p>\n<p><strong>特殊类：</strong>\n- NPC绑定契约（绑定一个NPC作为永久队友）— 5000积分\n- 存档点激活券（死亡后可在该存档点复活一次）— 8000积分\n- 剧情线索卡（下一场电影的关键提示）— 3000积分\n- 导演票根（碎片1/7）— 20000积分</p>\n<p>陈烬的目光在「导演票根」上停了很久。</p>\n<p>20000积分。他只有4500分。就算活十场都未必买得起一张碎片——而集齐七张才能使用。</p>\n<p>但他记住了这个名字。</p>\n<p>他把4500积分全部花完：买了敏捷强化、多功能战术刀、和两个标准医疗包。又在角落里找到了一个100积分的打折道具——「旧世界的打火机」。没有特殊功能，只是能在任何环境下点火。</p>\n<p>他买它，是因为它便宜，而且他不想再像第一场一样摸黑逃命。</p>\n<p>Ripley没有积分，但她获得了系统的默认装备——一套和她在大副期间使用习惯匹配的战斗服，以及一把电击手枪。</p>\n<p>「这不是真实的武器。」Ripley掂了掂枪的重量，「但至少比空手好。」</p>\n<p>陈烬把其中一个医疗包递给她。</p>\n<p>「下一场，我们不会只活两个人。」</p>\n<p>Ripley接过医疗包，看了他一眼：「你每一场都这么乐观？」</p>\n<p>「不是乐观。」陈烬把那把战术刀插在腰带上，「是不认。」</p>\n<p>他把进度档案存入影城系统。</p>\n<p><strong>玩家档案：陈烬</strong>\n<strong>评分：B级</strong>\n<strong>积分余额：0</strong>\n<strong>观众关注：75人</strong>\n<strong>绑定队友：Ripley</strong>\n<strong>完成剧本：1/？</strong></p>\n<p>屏幕上又浮现了一行字——只有他看得到：</p>\n<p><strong>你在观众席的第一次注视已经结束。有人在等你回来。</strong></p>\n<p>陈烬关掉了界面。</p>\n<p>疤脸男人在商店门口等他，手里多了一杯冒着热气的咖啡——影城居然有咖啡。</p>\n<p>「决定了？下一场？」</p>\n<p>「电锯惊魂。」陈烬说。</p>\n<p>疤脸男人吹了吹咖啡上的热气：「B级。聪明。不贪高难度，先积累。里面有一个人你离他远点——约翰·克莱默。他不杀人，但他从来不给人白送的活路。」</p>\n<p>陈烬记住了这个名字。</p>\n<p>第二场的倒计时已经出现在他的视野右上角——十八小时后。</p>\n<p>他有——不，他们有一天的时间准备。</p>\n<hr />\n<p><strong>∞影城·第一幕·异形 完</strong></p>\n<hr />\n<p>审核记录：\n- 欲望✅ — 商店系统满足读者对「升级变强」的期待\n- 无奈✅ — 4500积分什么都买不起，主角认识到自己还很弱\n- 翻转✅ — 导演票根闪了一下——20000积分暗示终极目标\n- 执念✅ — 「不认」——主角的性格核心，也是书名底蕴\n- 实现✅ — 完整的第一幕闭环：从入场→战斗→逃生→结算→下一场预告\n- 节奏✅ — 商店浏览（慢节奏信息）→ 准备（冷）→ 下一场预告（悬念拉满）</p>", "file": "011-第11章·结算.md", "prev": 10, "next": 12}, {"num": 12, "title": "第十二章 入口", "body": "<p>第十二章 入口</p>\n<p>影城商店的霓虹灯管在头顶嗡嗡作响，几根已经烧坏，留下暗红色的残光。</p>\n<p>陈烬站在门口，看着那道镶满铆钉的金属门。十八小时——门上的倒计时数字跳动着，像一颗缓慢搏动的心脏。</p>\n<p>Ripley站在他身侧，她已经换上了影城提供的标准作战服——黑色紧身，耐磨耐撕，比起她在Nostromo号上穿的制服，这身衣服更像是为她量身定做的死囚服。</p>\n<p>「你看起来像是在参加自己的葬礼。」陈烬说。</p>\n<p>Ripley瞥了他一眼：「你看起来像是已经把墓碑刻好了。」</p>\n<p>他们之间的对话已经不需要多余的客套。经历过异形的生死，语言变得直接而锋利。这是一种奇怪的默契——两个来自不同世界的人，站在一个不属于任何世界的地方，准备走进另一场噩梦。</p>\n<p>商店的货架上零零散散地摆着几样东西。跟上次比起来，补给更加匮乏。上次他们进入《异形》之前，店里还有几个医疗包和一支电击枪。现在剩下的，只有一些最低级的装备。</p>\n<p>陈烬的手指滑过货架。</p>\n<p><em>轻型护甲</em>——200积分。一次性的，只能挡住刀刃的划伤和低口径子弹。对竖锯设下的陷阱来说，这点防护几乎等于没有。但给Ripley穿上，至少能让她在未知环境中多撑几分钟。</p>\n<p><em>多功能战术刀</em>——150积分。他已经有了一把。</p>\n<p><em>医疗包</em>——300积分。他买过两个，在异形世界里用掉了一个。还剩一个。</p>\n<p>陈烬看了看自己的积分余额。零。</p>\n<p>他所有的积分——4500——都已经变成了他身上的敏捷强化、那把战术刀、两个医疗包和那个旧世界的打火机。现在他连多一个医疗包都买不起。</p>\n<p>「把你的积分给我。」陈烬转头对Ripley说。</p>\n<p>Ripley没有犹豫。她把手放在商店柜台的光屏上，一道蓝光扫过她的手腕，积分余额显示出来：1200。</p>\n<p>那是她在《异形》世界中作为NPC被陈烬带回来后，影城自动分配给绑定队友的基础积分。</p>\n<p>「全给我？」</p>\n<p>「全给我。」</p>\n<p>Ripley点下确认键，陈烬的余额跳到了1200。</p>\n<p>他拿起那件轻型护甲，递给Ripley：「穿上。」</p>\n<p>「你自己呢？」</p>\n<p>「我需要灵活。」陈烬说，「而且我知道接下来会发生什么。你不知道。」</p>\n<p>Ripley接过护甲，沉默地套在身上。护甲贴合她的身体曲线，像第二层皮肤。她活动了一下肩膀，点了点头。</p>\n<p>陈烬把剩下的积分换了两个荧光棒和一捆细钢丝。荧光棒可以照明，不会像打火机那样消耗氧气。细钢丝——他暂时想不到明确的用途，但在竖锯的世界里，任何不起眼的东西都可能成为救命的关键。</p>\n<p>1200积分，花得一分不剩。</p>\n<p>「走吧。」陈烬说。</p>\n<p>他们回到通道里。Ripley靠在墙上，双臂交叉：「你不打算告诉我接下来是什么？」</p>\n<p>「竖锯。」陈烬说，「一个患脑癌的老头，坚信人不珍惜生命就该被考验。他会把人关进 traps——陷阱——让他们在极端痛苦中体会活下去的欲望。」</p>\n<p>「所以我们要被关起来？」</p>\n<p>「对。」</p>\n<p>「然后？」</p>\n<p>「然后我们得出来。」陈烬看着通道尽头那扇门，「六个小时。只要活过六个小时。」</p>\n<p>Ripley沉默了一会儿，然后说：「你在怕什么？」</p>\n<p>陈烬没有回答。</p>\n<p>他在怕的事情太多了。怕剧情改变——上次在《异形》中，系统就已经显示出强烈的修正倾向。怕Ripley会死在这个世界里——绑定队友死了能不能复活，影城手册上语焉不详。怕自己会在这个世界看到自己烧死那个孩子的梦境重现。</p>\n<p>怕自己不够狠。</p>\n<p>一道脚步声从通道深处传来。</p>\n<p>那个疤脸男人又出现了。他穿着那件旧风衣，脸上的疤痕在昏暗中像一条蠕动的蜈蚣。他每次都在传送前出现——陈烬已经习惯了。</p>\n<p>「竖锯不杀人。」疤脸男人说，声音沙哑，像砂纸磨过铁皮。</p>\n<p>陈烬盯着他：「我知道。」</p>\n<p>「你知道，但你还没理解。」疤脸男人的眼睛在昏暗中发亮，像两枚磨损的硬币，「让他杀自己——这才是竖锯的规则。理解了吗？」</p>\n<p>陈烬的喉咙发紧。</p>\n<p>疤脸男人转向Ripley：「你是他的绑定者。他死，你也死。你死，他活。」他顿了顿，「但影城不会告诉你哪条命更值钱。」</p>\n<p>说完，他转身消失在通道的拐角。</p>\n<p>Ripley转过头看向陈烬：「他每次都这么说话？」</p>\n<p>「每次都这么说话。」</p>\n<p>「我真讨厌这个地方。」</p>\n<p>「我也是。」</p>\n<p>倒计时停止跳动了。</p>\n<p>00:00:00。</p>\n<p>通道尽头的门框开始发光，白色的光从缝隙中渗出，像水一样漫过地板。陈烬感觉脚下变得柔软，周围的墙壁开始扭曲，空气变得浓稠，像被人掐住了喉咙。</p>\n<p>传送开始了。</p>\n<p>他没有挣扎。他知道挣扎没有用。</p>\n<p>白光吞没了一切。</p>\n<p>陈烬醒来的时候，嘴里有一股铁锈味。</p>\n<p>他的第一个感觉是冷。冰冷的水浸透了他的衣服，整条左臂浸泡在水里，皮肤冻得发白。他躺在一个浴缸里——铸铁浴缸，表面粗糙，里面的水混浊发黄，带着一股腥味。</p>\n<p>他的第二个感觉是锁。左脚踝上套着一个金属环，用铁链连接到浴缸边缘的排水管上。他用力拉了一下，铁链纹丝不动。焊接死的。</p>\n<p>他的第三个感觉——有人在看他。</p>\n<p>陈烬慢慢抬起头。</p>\n<p>房间不大。大概五六平米见方。墙壁斑驳，瓷砖剥落，墙角长着霉斑。天花板上的日光灯管有一根还亮着，发出惨白的光，另一根已经烧断，露出焦黑的钨丝。</p>\n<p>地上躺着一具尸体。</p>\n<p>尸体趴在地板中央，穿着一件暗红色的外套，头上套着一个塑料袋，袋口用铁丝扎紧。塑料袋表面凝结着一层水汽，看不清里面的脸。</p>\n<p>陈烬知道那是谁。</p>\n<p>他的目光越过尸体，落在对面墙上。</p>\n<p>墙角的铁管上锁着一个男人。</p>\n<p>那人四十多岁，穿着一件白衬衫，袖子卷到手肘，领带歪在一边。他的脸上有伤，额头破了，血沿着眉骨往下流。他正茫然地看着周围，眼睛像是在焦距和无焦距之间反复切换。</p>\n<p>Dr. Lawrence Gordon.</p>\n<p>陈烬深吸一口气。冷空气刺进肺里，带着霉味和铁锈味。</p>\n<p>他在脑海里快速过了一遍剧情——</p>\n<p>Lawrence和Adam。那个在浴缸里的人是Adam，而他躺在了本该属于Adam的位置上。不对。系统把他放在了Adam的位置上。也就是说，现在锁在浴缸里的不是Adam，是他。</p>\n<p>那Ripley呢？</p>\n<p>他被传送到了浴室，那Ripley被传送到了哪里？</p>\n<p>陈烬的手摸到了浴缸边沿上的一个东西。一台便携式磁带录音机，黑色塑料外壳，上面的按键已经被磨损得看不清标识。旁边放着一张纸条：</p>\n<p>「让我来玩个游戏。」</p>\n<p>陈烬把磁带录音机拿起来，按下播放键。</p>\n<p>磁带的转轮发出轻微的咔咔声，然后——</p>\n<p>一阵刺耳的风琴音乐响起，像是从一台老旧的八音盒里挤出来的。在充满水汽和霉味的浴室里，这段音乐听起来格外诡异。</p>\n<p>陈烬的皮肤起了一层鸡皮疙瘩。</p>\n<p>他太熟悉这段曲子了。<em>《Hello Zepp》</em>——竖锯的主题曲。在电影里听过无数次，但真正身临其境的时候，感觉完全不同。那是一种从脊椎底部往上爬的寒意，像有什么东西在黑暗中慢慢睁开了眼睛。</p>\n<p>音乐停了。</p>\n<p>一个声音从磁带里传出来——沙哑，缓慢，带着一种特殊的镇定。像一个临终的人在交代后事。</p>\n<p>「你好，陈烬。我要你跟我玩个游戏。」</p>\n<p>陈烬的手猛地一紧。</p>\n<p>磁带里叫了他的名字。</p>\n<p>不是\"Adam\"，不是\"浴缸里的人\"——是他的名字。<em>陈烬。</em></p>\n<p>这意味着什么？系统调整了剧情？还是说——竖锯知道他是谁？</p>\n<p>磁带继续播放：</p>\n<p>「你的整个职业生涯都在拯救他人。你在火场中冲进去，背出一个孩子，却在最后的爆炸中丧生。你本可以活下来，但你选择了回头。」</p>\n<p>「现在，你站在同样的位置。你的对面这个人——Lawrence Gordon——他也有一个家庭。他要做出选择。而你也要。」</p>\n<p>「规则很简单：六点之前，你必须活着离开这个房间。但出口的钥匙，在你的体内。」</p>\n<p>「时间不多了。你的朋友已经在另一场游戏中等待结果。」</p>\n<p>「让我再问你一次——你愿意为了活下去，做出你曾经要求别人做出的牺牲吗？」</p>\n<p>磁带结束了。</p>\n<p>陈烬握着录音机，指节发白。</p>\n<p>整个房间陷入沉默。只有日光灯的嗡嗡声，和水滴从水龙头滴落的声音——滴答。滴答。滴答。</p>\n<p>然后，对面的Lawrence开口了。</p>\n<p>他的声音嘶哑，带着恐惧和困惑：「你是谁？这是什么地方？」</p>\n<p>陈烬抬起头，看向对面的男人。Lawrence的眼镜歪了，他本能地伸手去推，但发现手被锁着，只能徒劳地扯了一下铁链。</p>\n<p>「我叫陈烬。」他说，声音出奇平静，「我们被关在一个 trap 里。」</p>\n<p>「trap？」Lawrence的瞳孔放大，「你是说——」</p>\n<p>「竖锯。」陈烬说，「John Kramer。你听说过他。」</p>\n<p>Lawrence的脸色变得惨白。</p>\n<p>陈烬看着地上的\"尸体\"。那个塑料袋罩着的男人，他知道那是谁。那是John Kramer——竖锯本人。他穿着一件伪装的外套，头上套着塑料袋，看起来像一具尸体，但实际上还活着。他会在这里躺上整整六个小时，然后在自己制造的血腥场面中站起来，从门里走出去。</p>\n<p>陈烬心想——<em>我该怎么做？</em></p>\n<p>他知道剧情。他知道钥匙在浴缸的排水管里。他知道那把锯子其实是用来锯脚的。他知道Zep正在赶往Lawrence的家。他知道地上那个\"尸体\"就是一切的主谋。</p>\n<p>他知道一切。</p>\n<p>但疤脸男人说得对——知道，和改变，是两回事。</p>\n<p>他低下头，看着自己脚上的铁链。冰冷，沉重，真实。</p>\n<p>在这个世界里，死就是死。</p>\n<p>他缩在浴缸里的身体开始微微发抖——不是因为冷，而是因为一种从未有过的恐惧。</p>\n<p><em>改变剧情的代价，是什么？</em></p>\n<p>日光灯管又闪了一下。</p>\n<p>地上的\"尸体\"一动不动。</p>\n<p>时间在滴答声中流逝。</p>\n<p>陈烬握紧了口袋里的打火机——那枚从旧世界带来、在异形世界里活过、现在又来到电锯惊魂中的火种。</p>\n<p>他还有六个小时。</p>", "file": "012-入口.md", "prev": 11, "next": 13}, {"num": 13, "title": "第十三章 规则", "body": "<p>第十三章 规则</p>\n<p>「你听到了吗？」</p>\n<p>Lawrence的声音在狭窄的浴室里回荡，带着一种压抑的颤抖。</p>\n<p>陈烬没有回答。他已经听到了——不仅是磁带，还有别的东西。一种细微的、几乎被水滴声掩盖的声音。从天花板的方向传来。</p>\n<p>但他没有抬头。他知道如果有任何人在通风管道里看着他们，现在暴露自己知道得太多是危险的。</p>\n<p>「我说——你听到了吗？」Lawrence的声音提高了半度，「那盘磁带……那个声音……他认识我。他——」</p>\n<p>「冷静。」陈烬从浴缸里坐直身体，冷水顺着他的脖颈往下淌，「害怕没有用。」</p>\n<p>「害怕没有用？」Lawrence几乎是笑着说这句话的，笑声里全是恐惧的碎渣，「你知道我是谁吗？我是医生。我拯救生命。我——」</p>\n<p>「你是Lawrence Gordon医生。」陈烬平静地说，「职业是肿瘤外科。你有妻子Alison和女儿Diana。两个月前，你被John Kramer——也就是竖锯——盯上，因为他认为你不够珍惜你的生命，因为你出轨了，因为你在工作中自负。」</p>\n<p>Lawrence张着嘴，说不出话。</p>\n<p>陈烬继续：「你的腰带扣上有一个线索。你身上这本磁带应该告诉了你：六点之前，你如果杀死我，就可以活下来。否则你全家都得死。对吗？」</p>\n<p>Lawrence的嘴唇哆嗦着，脸色从惨白变成了土灰色。他低头看向自己的手——准确地说是他的手铐——那根铁链连接着墙角的暖气管，已经被他拽得哗哗响。</p>\n<p>「你怎么——」</p>\n<p>「我知道的东西比你多得多。」陈烬说，「但现在说这些没用。我们需要合作。」</p>\n<p>「合作？」Lawrence看着陈烬的眼神变了，从恐惧变成了怀疑，「你怎么证明你不是和他一伙的？」</p>\n<p>陈烬没有回答这个问题。他直接从浴缸里站起来——左脚被铁链拴住，他只能站到一半，身体前倾。他把手伸进口袋，掏出那枚旧世界的打火机。</p>\n<p>「咔哒。」</p>\n<p>打火机蹦出一簇桔黄色的火苗。</p>\n<p>Lawrence盯着那簇火，像是在看一件不属于这个世界的东西——在这个充满铁锈、霉菌和血腥味的房间里，这簇火苗显得太干净了。</p>\n<p>「打火机？」Lawrence说。</p>\n<p>陈烬没有解释。他把打火机举高，照亮了天花板。</p>\n<p>天花板的通风口格栅上，有一丝细微的反光。</p>\n<p>陈烬看到了。那个通风口格栅的螺丝有些松了——不是松动，是被人拧松后重新拧回去的。只要有人透过格栅往里看，就能把浴室内的一切尽收眼底。</p>\n<p>有人在看着他们。</p>\n<p>陈烬面无表情地放下打火机，重新坐回浴缸里。</p>\n<p>「他在看我们。」他压低声音说。</p>\n<p>Lawrence脸上的血色又褪了一层：「谁？」</p>\n<p>「竖锯。或者他的人。」陈烬说，「你不用找他，他会来看你的——当他觉得你最有意思的时候。」</p>\n<p>Lawrence的呼吸变得急促起来。他的目光开始在地上和墙上乱窜，像一个困在笼子里的野兽在寻找出口。</p>\n<p>然后他的目光停在了地板中央。</p>\n<p>那具\"尸体\"。</p>\n<p>严格来说，不是尸体本身，而是尸体旁边的一样东西——一把生锈的手弓锯。锯条上沾着暗红色的——那是什么？血迹？还是铁锈？</p>\n<p>「那是……锯子。」Lawrence说。</p>\n<p>陈烬的眼睛眯了起来。</p>\n<p>他当然知道那是锯子。他知道那把锯子是干什么用的——不是锯锁，是锯脚。竖锯设计的陷阱就是：两个囚犯，一把锯子，六小时时间限制。你以为锯子是给你锯断铁链的，但铁链是钢制的，一把生锈的手弓锯根本锯不动。它能锯断的唯一东西——是你的骨头。</p>\n<p>Lawrence也想到了这一点——但想的方向不一样。</p>\n<p>他猛地扯动自己的手臂，把手铐拉得绷直，然后用尽全力去够那把锯子。他的手指在离锯子还有十几厘米的地方徒劳地抓握。</p>\n<p>「够不到……」Lawrence喘着粗气，「我需要——你帮我拿一下。你的链子比我长。」</p>\n<p>陈烬没有动。</p>\n<p>「你没听到我说的吗？」Lawrence的声音变得急促，「你帮我拿锯子，我们锯断锁链——」</p>\n<p>「那把锯子不是锯锁的。」</p>\n<p>Lawrence愣住了。</p>\n<p>「你说什么？」</p>\n<p>「那把锯子锯不动钢链。」陈烬的声音很平静，像在陈述一个不容置疑的事实，「它是竖锯设计的陷阱的一部分。他用这把锯子告诉你：你唯一的选择不是锯断锁链，而是锯断你自己的脚。」</p>\n<p>房间里安静了。</p>\n<p>安静得像坟墓。</p>\n<p>然后Lawrence笑了。不是开心的笑，而是一种濒临崩溃边缘的笑，像一个人听到了世界上最荒唐的笑话。</p>\n<p>「你疯了，」他说，「你绝对疯了。这把锯子——」</p>\n<p>「锯不动钢链。」陈烬重复了一遍，「你可以试试。」</p>\n<p>Lawrence犹豫了。他的目光在锯子和陈烬之间来回跳了好几次。然后他的眼神变得坚定——一种属于资深医生的、习惯掌控局面的坚定。</p>\n<p>他再次伸手去够锯子。</p>\n<p>陈烬看着他的动作，没有阻止。</p>\n<p>他需要让Lawrence自己亲身体会到——他的\"专业知识\"在这个房间里一钱不值。</p>\n<p>Lawrence的手指终于碰到了锯子的手柄。他一把抓起来，拖到自己面前，然后把手铐对准锯刃，用力拉动——</p>\n<p>「嘎——」</p>\n<p>一声刺耳的金属摩擦声在房间里炸开。</p>\n<p>锯刃在铁链上划出一道浅浅的白痕。</p>\n<p>Lawrence看着那道白痕，表情从希望变成了错愕。</p>\n<p>他又锯了一下。</p>\n<p>铁链上多了一道白痕。</p>\n<p>然后第三下，第四下，第五下——他开始机械地重复这个动作，每一下都比前一下更加用力，锯刃在铁链上发出尖锐的嘶鸣声，震得他的整条胳膊都在发抖。</p>\n<p>「不可能……不可能……」</p>\n<p>「够了。」陈烬说。</p>\n<p>Lawrence没有停下。他在铁链上疯狂地锯着，锯刃在金属表面打滑，好几次差点脱手割到自己的腿。</p>\n<p>「我说够了！」</p>\n<p>陈烬猛地拍了一下水面，水花溅到Lawrence的脸上。</p>\n<p>Lawrence停住了。</p>\n<p>他抬起头，眼眶通红，呼吸像破风箱一样呼哧呼哧地响。汗水和血混在一起，从他的额角流下来。</p>\n<p>「我们的命在他手里，」陈烬说，声音沉下来，「但如果你失控，他会很高兴的。」</p>\n<p>「那你说怎么办？」Lawrence把锯子摔在地上，金属碰撞声在房间里回响，「锯不动锁，锯不了脚——你告诉我要怎么办？等死？」</p>\n<p>陈烬没有回答。他重新坐回浴缸里，把手伸进冰冷的水中。</p>\n<p>浴缸排水口。</p>\n<p>他记得电影里的剧情——锁住Adam的铁链的钥匙，就在浴缸的排水管里。Adam醒来后在浴缸里挣扎，把钥匙连同水一起冲进了下水道。一根不到十厘米长的钥匙，就在排水管的U型弯里。</p>\n<p>但如果他被传送到了Adam的位置——</p>\n<p>陈烬的手指在冰冷的积水里摸索。</p>\n<p>浴缸底部是一层黏滑的污垢。他的指尖碰到了排水管的金属边缘——一个圆形的排水口，直径大约三厘米。</p>\n<p>他把手指伸了进去。</p>\n<p>空的。</p>\n<p>他的指尖在管壁内探了个遍——什么都没有。排水管直通下水道，没有U型弯。或者说，U型弯在更深处，远不是手指能够到的深度。</p>\n<p>钥匙已经被冲走了。</p>\n<p>陈烬的心沉了下去。</p>\n<p>他猛地从水中抽出手，盯着自己的手指看了三秒钟。</p>\n<p>剧情改变了？</p>\n<p>不——剧情没有改变。钥匙确实在排水管里。但是——</p>\n<p><em>他在浴缸里醒来的时间比电影中的Adam晚了。</em></p>\n<p>他记得他在浴缸里昏迷了一段时间——那是传送的后遗症。在那段时间里，他做了什么？他踢了水，挣扎了，动来动去。钥匙就是在那时候被冲走的。</p>\n<p><em>因为他在昏迷中挣扎，把钥匙冲走了。</em></p>\n<p>蝴蝶效应。他自己的动作改变了剧情，但不是变得更好——是变得更坏。</p>\n<p>他本来能拿到钥匙的。如果他一醒来就伸手去摸排水管，钥匙就在那里。</p>\n<p>但他晚了。</p>\n<p>因为他在晕眩中浪费了那几秒钟。</p>\n<p>陈烬闭上眼睛。他感觉自己的心脏在胸腔里跳得很沉，很慢，像一个濒临停摆的钟摆。</p>\n<p><em>知道剧情 ≠ 能改变结局。</em></p>\n<p>疤脸男人说的每一句话，现在都在他耳边回响。</p>\n<p>「竖锯不杀人，但他让你杀自己。」</p>\n<p>他让你杀自己。</p>\n<p>陈烬睁开眼睛，目光穿过房间，落在对面的墙上。</p>\n<p>墙上有一块瓷砖的颜色和周围的瓷砖不一样。不是太明显，但如果你在六小时内盯着墙壁看了整整四个小时，你就会注意到。电影里的Adam没有注意到这一点，但在现实中——陈烬注意到了。</p>\n<p>他把打火机重新打亮，用火光照着那面墙。</p>\n<p>那块瓷砖的边缘有一条细细的缝——不是瓷砖之间的正常缝隙，比那更宽，大约有两毫米。像是被人撬开过。</p>\n<p>陈烬的心里冒出一个想法——</p>\n<p>房间里可能有其他出口，只是电影里没有展示。</p>\n<p>竖锯在每个陷阱中都留了一条\"生路\"。浴室里的生路是钥匙——本来在排水管里，但已经被冲走了。如果这条生路被堵死了，是否还存在第二条？</p>\n<p>他记得电影里还有另一个线索：Lawrence的烟盒里写着一句话——\"If you're good at anticipating the human mind, you might leave here alive.\"</p>\n<p>如果你擅长预见人心，你就能活着离开。</p>\n<p>「你在看什么？」Lawrence问，他的声音已经平静了一些。</p>\n<p>「墙。」陈烬说。</p>\n<p>「墙上有什么？」</p>\n<p>陈烬没有回答。他把打火机举高，仔细查看天花板的通风口。</p>\n<p>通风口大约四十厘米宽，三十厘米高。格栅是用四颗螺丝固定的。如果是他一个人，他不可能爬上去——他的脚被锁在浴缸上，铁链只有两米长，够不到天花板。</p>\n<p>但如果Lawrence帮他呢？</p>\n<p>不——Lawrence的链子更短。他所在的位置离墙角的暖气管只有一米的活动范围。</p>\n<p>陈烬的思维快速运转着。</p>\n<p>然后他听到了那个声音。</p>\n<p>通风管道里传来了一声极其轻微的响动——像是鞋底踩在金属板上的声音。</p>\n<p>有人在里面。</p>\n<p>不，不是竖锯——竖锯现在应该\"死\"在地板上。是另一个人。</p>\n<p>Zep? 还是——</p>\n<p>陈烬的瞳孔微微收缩。</p>\n<p>那段录音里有Ripley的事。竖锯说\"你的朋友已经在另一场游戏中等待结果\"。</p>\n<p>Ripley在哪里？</p>\n<p>她也被传送到了这个世界的某个地方。她也在某个陷阱里。她的1200积分——那件轻型护甲——够不够让她活下来？</p>\n<p>通风管道里的脚步声越来越远了。</p>\n<p>有人从监控画面前离开。</p>\n<p>陈烬看了看墙上那块被撬过的瓷砖，又看了看天花板上的通风口。</p>\n<p>他的嘴唇动了一下，无声地说了一句话。</p>\n<p><em>还有不到六小时。</em></p>\n<p>但感觉像是一辈子。</p>", "file": "013-规则.md", "prev": 12, "next": 14}, {"num": 14, "title": "第十四章 双线", "body": "<p>第十四章 双线</p>\n<p>Ripley醒来的时候，第一个感觉是——疼。</p>\n<p>不是身体上的疼，是一种更深处的、来自颅骨内部的压迫感，像是有什么东西在从内向外撑开她的头骨。</p>\n<p>她伸手去摸自己的头。</p>\n<p>手指碰到一个冰冷的金属结构。</p>\n<p>环状的。箍在她的头上，从下颚两侧延伸到头顶。前额和两侧太阳穴的位置各有一个金属块——螺丝拧紧的，紧贴着头皮。</p>\n<p>Ripley的呼吸停了一秒。</p>\n<p>她对机械装置足够熟悉——在Nostromo号上，她比任何一个船员都更了解飞船的构造。这个箍住她头的东西，她一眼就认出了它的原理：一个弹簧加载的扩张装置。两侧的金属片在弹簧力作用下向外张开。锁扣在她的后脑——一个精密的机械锁。</p>\n<p>如果这个锁打开——</p>\n<p>她的大脑在不到一秒钟内完成了推演：金属片向外弹出，撕裂下颚，把她的头从两侧撑开。猎物的嘴被强制张开到极限，颅骨骨折，脑组织损伤——</p>\n<p>瞬间死亡。</p>\n<p>「别动。」</p>\n<p>一个声音从她旁边传来。</p>\n<p>Ripley转过头——她只能转很小幅度，因为头上的装置限制了颈椎的活动。</p>\n<p>她看到了一张脸。年轻的女人，大约二十多岁，棕色的短发湿漉漉地贴在脸上，眼睛很大，瞳孔因为恐惧而缩成针尖大小。她的身上穿着一件脏兮兮的T恤，双臂和脸上都有淤青和伤口。</p>\n<p>她头上也戴着同样的装置。</p>\n<p>反向熊夹。</p>\n<p>Ripley的瞳孔微微收缩。</p>\n<p>她不知道这个装置的名字，但她在陈烬的口中听说过这个描述——一个套在头上的金属装置，从两侧撑开下颚，一旦启动就必死无疑。</p>\n<p>「你是谁？」Ripley问。她的声音很平静——在Nostromo号上与异形对峙的经历，已经让她学会了在极度恐惧中保持冷静。</p>\n<p>「Amanda。」女孩说，声音发抖，「Amanda Young。我——我不知道这是哪里。我醒来就在这里了。」</p>\n<p>Amanda Young.</p>\n<p>陈烬提到过这个名字。她是竖锯的陷阱中唯一活下来的人——至少在原剧情中是。她在那个陷阱中学会了珍惜生命，然后成为了竖锯的追随者。</p>\n<p>但那是后来的事情。</p>\n<p>现在，她只是一个二十出头的小姑娘，戴着死神给她订做的头冠。</p>\n<p>Ripley环顾四周。</p>\n<p>这是一个废弃的工业空间。铁皮屋顶，混凝土地面，墙边堆着生锈的机器。她坐在一张破旧的金属椅子上，手被反绑在椅背后，脚也被绑着。她的脚边放着一台磁带录音机，和一把钥匙。</p>\n<p>一把钥匙。</p>\n<p>一把单独放置的钥匙。</p>\n<p>钥匙像是被精心摆放在那里的——在磁带的旁边。</p>\n<p>Ripley盯着那把钥匙看了三秒钟，然后明白了一切。</p>\n<p>这个陷阱的规则：在她们面前，有一台磁带录音机。磁带会播放竖锯的声音，告诉她们规则。其中一个人——或者两个人——必须在倒计时结束前拿到钥匙。</p>\n<p>但钥匙只有一把。</p>\n<p>而那个倒计时——</p>\n<p>Ripley慢慢抬起头，看到一个数字计数器被固定在墙上。红色的数字在昏暗的光线中显得刺目：42:18。四十二分钟十八秒。</p>\n<p>不到一个小时。</p>\n<p>「你看一下你那边，」Ripley对Amanda说，「有没有钥匙或者工具。」</p>\n<p>Amanda颤抖着动了动身体——她的活动范围很有限，手被绑在椅背后面，根本够不到任何东西。</p>\n<p>「没有……只有磁带……」</p>\n<p>Ripley深吸一口气。</p>\n<p>她的大脑在飞速运转。陈烬给她讲过这个世界的基本设定——竖锯从来不犯人命，他让你做出选择。如果你选择活下去，你有机会活。如果你放弃了——</p>\n<p>但这个陷阱的设计有漏洞。</p>\n<p>Ripley的目光落在自己的椅背上。</p>\n<p>她的手被绑在后面，用的是塑料扎带。不是手铐，不是铁链——普通的塑料扎带。超市里用来捆电线的那种。</p>\n<p>她动了动手腕。扎带勒得很紧，但还有一丝空隙。</p>\n<p>这个陷阱的设计意图很清楚：两个人只能活一个。倒计时结束，如果你还没解开锁，头就会炸开。钥匙在地上，但被反绑的你没法弯腰去拿。你需要另一个人帮你——但那个人也会死。</p>\n<p>唯一的选择是某种残酷的交换。</p>\n<p>但Ripley想的是另一条路。</p>\n<p>她开始用力活动手腕，让塑料扎带在她的皮肤上摩擦。</p>\n<p><em>如果我能挣脱这个——</em></p>\n<p>「你在干什么？」Amanda问。</p>\n<p>「活着。」Ripley说。</p>\n<hr />\n<p>与此同时，浴室里。</p>\n<p>陈烬把打火机举在墙面前，仔细打量那块颜色不一的瓷砖。</p>\n<p>他的手很稳。在火光的跳动中，他的眼神聚焦在砖缝上，像一个外科医生在寻找切入的位置。</p>\n<p>「你真的觉得那里有东西？」Lawrence问。他已经从最初的崩溃中恢复了一些，语气中带着一个职业医生对一切保持怀疑的本能。</p>\n<p>「不知道。」陈烬说，「但等着肯定没有。」</p>\n<p>他看了一下墙上的钟。</p>\n<p>墙上挂着一个白色的圆形挂钟，钟面上的数字是黑色罗马字母。秒针正在一格一格地跳动——咔，咔，咔。</p>\n<p>现在是3:17 PM。</p>\n<p>陈烬在脑海里飞速计算着。原剧情中，竖锯给的时间限制是6:00 PM。也就是说——</p>\n<p>「我们还剩不到三小时。」他说。</p>\n<p>Lawrence的脸色暗了一下：「你说什么？」</p>\n<p>「时钟指向三点十七。六点是最后期限。还有两小时四十三分钟。」</p>\n<p>「你怎么知道是六点？」</p>\n<p>「磁带说了。」</p>\n<p>「我的磁带没说。」</p>\n<p>陈烬转过头看着Lawrence：「你的磁带说了什么？」</p>\n<p>Lawrence沉默了几秒钟，然后说：「……说我出轨了。说我每天在手术室拯救别人的生命，却不在乎自己的生命。说我需要被「治愈」。说让你活着，我就能活下去。」</p>\n<p>「还有呢？」</p>\n<p>「还有一个地址。」Lawrence艰难地咽了口唾沫，「我家的地址。」</p>\n<p>陈烬闭上眼睛。</p>\n<p>剧情还是按原线路在走。Zep已经去了Lawrence的家。Alison和Diana Gordon现在应该已经被绑在她们自己家的地下室里，用枪指着。</p>\n<p>两条线——</p>\n<p>一条在这个浴室里，他和Lawrence被困。</p>\n<p>一条在Lawrence的家里，Alison和Diana面临死亡。</p>\n<p>还有第三条线——Ripley。</p>\n<p>陈烬不知道她在哪里，但他必须假设她还活着。他必须假设她正在用自己的方式走出困境。</p>\n<p>他必须相信她。</p>\n<p>「你家里有电话吗？」陈烬问。</p>\n<p>「有——不，不对——」Lawrence的眼神猛然一紧，「那个地址——如果竖锯真的找到了我家——」</p>\n<p>「他现在可能已经在了。」陈烬说，「但如果你继续锯你的脚，你就没法回去救人了。」</p>\n<p>Lawrence的目光再次落在那把锯子上。</p>\n<p>生锈的锯刃上还残留着他刚才疯狂锯链时留下的金属碎屑。</p>\n<p>「你一直在阻止我。」Lawrence说，声音里有了一种新的东西——不是愤怒，不是恐惧，而是困惑，「你到底为什么这么帮我？你甚至不认识我。」</p>\n<p>陈烬看着他。</p>\n<p>这位Dr. Lawrence Gordon——一个在家庭和婚外情中挣扎的中年男人，一个出色的外科医生，一个好父亲。在竖锯眼中，他有罪。但在陈烬眼中——他只是另一个人，一个在命运面前挣扎的普通人。</p>\n<p>就像他自己。</p>\n<p>「因为我也想活着。」陈烬说，这是他给出的最简单的答案，也是最真心的。</p>\n<p>Lawrence沉默了很久。</p>\n<p>然后他说：「你需要我做什么？」</p>\n<p>陈烬把打火机重新举到墙面前。</p>\n<p>「我需要你告诉我，你的专业判断——如果一个人要撬开一块瓷砖，从什么角度最不容易触发里面的陷阱？」</p>\n<p>Lawrence愣住了。</p>\n<p>「你疯了？」</p>\n<p>「可能。」陈烬说，「但这是唯一的办法了。」</p>\n<p>他用手指尖摸了摸那块瓷砖的边缘。</p>\n<p>瓷砖的边缘很锋利，但确实有一丝松动。他用指甲抠住那条缝，小心翼翼地往外拉——</p>\n<p>瓷砖纹丝不动。</p>\n<p>陈烬没有放弃。他把打火机咬在嘴里，腾出双手，用两只手的大拇指顶住瓷砖的下沿，用力往上推——</p>\n<p>「咔。」</p>\n<p>瓷砖向内陷进去半厘米。</p>\n<p>陈烬的心跳加速了。</p>\n<p>他把手指伸进那道缝隙，夹住瓷砖边缘，用力往外一拉——</p>\n<p>瓷砖被他扯了下来。</p>\n<p>瓷砖后面是一个黑洞洞的方孔。</p>\n<p>大约十厘米见方。像是墙壁里原本有一根管道，后来被拆除了，留下一个空腔。</p>\n<p>陈烬把打火机伸进去。</p>\n<p>火光照亮了空腔的底部。</p>\n<p>里面有一根铁丝。约莫三十厘米长，一端弯成钩状。</p>\n<p>陈烬伸手把它掏出来。</p>\n<p>铁丝很旧，表面有一层薄薄的红锈，但弯钩的部分磨得很亮——显然常被人使用。</p>\n<p>他盯着这截铁丝看了三秒钟。</p>\n<p>然后一个想法在他脑海中成型。</p>\n<p>通风口。铁丝弯钩是用来撬通风口格栅上的螺丝的。</p>\n<p>他抬起头，看向天花板上的通风口。</p>\n<p>通风口的格栅——如果他能把格栅拆下来——他就可以爬进通风管道。</p>\n<p>但他的脚还锁在浴缸上。</p>\n<p>铁链的长度——两米。他大致估算了一下。从浴缸到通风口的垂直距离——三米多。他够不到。</p>\n<p>除非——</p>\n<p>他看向Lawrence。</p>\n<p>「你活动范围多大？」</p>\n<p>Lawrence被问得一愣：「什么？」</p>\n<p>「你的链子，从暖气管到最远的地方——能走多远？」</p>\n<p>Lawrence用手比划了一下：「大概一米五。」</p>\n<p>陈烬在脑中勾勒出一个几何图形。</p>\n<p>Lawrence的位置在墙角，暖气管。他在房间的另一端，浴缸。通风口在他们中间的正上方。</p>\n<p>如果他们两个人合作——一个人托着另一个人——</p>\n<p>「我需要你帮我。」陈烬说，「我需要你站在我肩膀上。」</p>\n<p>Lawrence低头看了看自己的西装裤和皮鞋——他现在还是一副高级医生的打扮，衬衫已经被汗水浸透，领带歪到一边。</p>\n<p>「你认真的？」</p>\n<p>「我从来没这么认真过。」</p>\n<p>陈烬从浴缸里走出来。他的左脚上的铁链在金属浴缸边缘刮出一声刺耳的摩擦声。</p>\n<p>他站在浴缸外沿，冷水泥泞的地面贴着他的鞋底。</p>\n<p>「过来。」他说。</p>\n<p>Lawrence犹豫了一下，然后站起身，拖着自己脚上的链子走到了房间中央。他的活动范围确实只有一米五——他停在浴室中间，铁链绷直了，不能再往前走一步。</p>\n<p>陈烬目测了一下距离。</p>\n<p>不够。</p>\n<p>他们之间还差着一米多。</p>\n<p>他的铁链从浴缸延伸到最远点，Lawrence的铁链从暖气管延伸到最远点——他们的活动范围交汇成一个V字形，但交叉点——那个他们两人都能到达的中心点——不在通风口正下方。</p>\n<p>「该死。」陈烬低声骂了一句。</p>\n<p>他回头看了一下墙上的挂钟。</p>\n<p>3:29 PM。</p>\n<p>两个小时三十一分钟。</p>\n<p>而Ripley那边——</p>\n<hr />\n<p>废弃工厂里，Ripley的手腕已经磨破了一大块皮。</p>\n<p>塑料扎带的边缘嵌进她的皮肤里——但她感觉到的不是疼，是一种灼热的摩擦感。她一直在扭动、旋转、前后推拉，让扎带在她的手腕和椅背金属杆之间来回摩擦。</p>\n<p>在她旁边的Amanda已经彻底瘫软了，肩膀在无声地颤抖，眼泪一颗一颗掉在地上。</p>\n<p>天花板上的红色计数器跳到了31:14。</p>\n<p>「你相信我吗？」Ripley突然问。</p>\n<p>Amanda抬起头，眼睛红肿：「……什么？」</p>\n<p>「我说，你相信我能在倒计时结束之前救我们出去吗？」</p>\n<p>Amanda盯着她看了很久。Ripley的眼神没有闪躲——在Nostromo号上，她无数次用这种眼神说服了质疑她的人。</p>\n<p>「……我不知道。」Amanda最终说。</p>\n<p>「那就学着相信。」Ripley说，「毕竟也没有更好的选择了。」</p>\n<p>她猛地用力一拧手腕——</p>\n<p>「咔。」</p>\n<p>塑料扎带断了一根。</p>\n<p>她的左手挣脱了。</p>\n<p>Ripley没有停，迅速解开了剩下的一根，然后弯腰去解脚上的扎带。</p>\n<p>Amanda瞪大了眼睛：「你——你怎么——」</p>\n<p>Ripley活动了一下手腕，袖口下渗出一丝血迹。</p>\n<p>\"轻型护甲\"护住了她的躯干，但没有护住手腕。不过没关系——她的骨头没事，这点皮肉伤不算什么。</p>\n<p>「陈烬教过我一句话，」Ripley说，一边走向地上的钥匙和磁带，「在这个世界里，你只有两个选择——等待命运，或者创造命运。」</p>\n<p>她按下了磁带的播放键。</p>\n<p>刺耳的风琴声在废弃工厂中响起。</p>\n<p><em>《Hello Zepp》</em>。</p>\n<p>Ripley听过陈烬的描述——但这还是她第一次真正听到这段旋律。</p>\n<p>她感到一股寒意从脚底升起。</p>\n<p>磁带里传来声音——沙哑、缓慢、带着让人不寒而栗的平静。</p>\n<p>「你好，Ripley。我要你跟我玩个游戏。」</p>\n<p>Ripley的瞳孔微微收缩。</p>\n<p>竖锯叫了她的名字。</p>\n<p>——跟陈烬说的一样。</p>\n<p>「你曾经在一艘飞船上与一个致命的生物搏斗，活了下来。你的意志坚韧如钢。但在这个世界里，钢铁也会生锈。」</p>\n<p>「你面前的这个女孩——Amanda Young——她的人生是一张用绝望书写的处方。吸毒、自残、浪费生命的每一分钟。」</p>\n<p>「但你和她是一样的——你们都站在死亡的边缘。」</p>\n<p>「倒计时结束时，你的头将打开。」</p>\n<p>「但生路就在你眼前。」</p>\n<p>「钥匙在你手中。」</p>\n<p>「问题是——你愿意用它来打开你的锁，还是打开你的心？」</p>\n<p>磁带结束了。</p>\n<p>Ripley站在沉默的机器中间，手上握着那把钥匙。</p>\n<p>只有一把。</p>\n<p>她看了看Amanda头上的反向熊夹。</p>\n<p>又看了看自己头上的。</p>\n<p>然后她看了看墙上的计数器。</p>\n<p>31:07。</p>\n<p>她笑了——一种苦涩的、近乎嘲讽的笑。</p>\n<p>「这个混蛋。」她说，「他已经算好了每一种可能性。」</p>\n<p>她走到Amanda面前，蹲下来。</p>\n<p>「听着，」Ripley说，「我能打开你的锁。但我不确定能不能在倒计时结束之前打开我自己的。如果我帮你，你可能活下来，而我可能死。」</p>\n<p>Amanda张着嘴，说不出话。</p>\n<p>「所以我要问你一个问题，」Ripley的目光直视着Amanda的眼睛，「如果我救了你，你会不会浪费我换给你的命？」</p>\n<p>Amanda的眼泪终于落了下来。</p>\n<p>她点了点头。</p>\n<p>Ripley把钥匙插进了Amanda脑后的锁孔里。</p>\n<p>「咔哒。」</p>", "file": "014-双线.md", "prev": 13, "next": 15}, {"num": 15, "title": "第十五章 对面的人", "body": "<p>第十五章 对面的人</p>\n<p>陈烬把铁丝弯钩掰直了。</p>\n<p>他坐在浴缸边缘，手指捏住铁丝的两端，仔细感受着金属的韧度。这根铁丝材质不错——不是普通的铁丝，表面有一层暗色的涂层，防锈。捏在手里有一定的回弹性。</p>\n<p>他用打火机把铁丝的一端烧红，然后迅速在浴缸边缘上敲了几下，让它冷却定型。</p>\n<p>一个简易的撬锁工具。</p>\n<p>「你还会撬锁？」Lawrence的声音从房间另一端传来，带着一种复杂的语气——惊讶、怀疑，还有一丝被压下去的期待。</p>\n<p>「不会。」陈烬说，「但我可以试试。」</p>\n<p>他的敏捷强化让手指比普通人灵活不少。在影城商店里的介绍卡片上写着——「精确度提高20%，反应速度提高15%」。他不知道这个数据在撬锁这个具体动作上意味着什么，但现在只能赌一把。</p>\n<p>他走到门边。</p>\n<p>浴室的铁门是往外开的——焊接的铁板，表面刷了一层暗绿色的防锈漆。门锁是老式的旋转锁芯，结构不算复杂。至少从外部看是这样。</p>\n<p>陈烬蹲下来，把铁丝捅进锁孔。</p>\n<p>他闭上眼睛。</p>\n<p>手指的触感被放大了——铁丝的尖端在锁芯内部碰到了一个金属弹子。他轻轻转动铁丝的角度，那枚弹子往上弹了一下。</p>\n<p>有反应。</p>\n<p>陈烬的呼吸放慢了。他的手指几乎是凭着本能在那狭窄的金属通道里游走——偶尔碰到锁芯的内壁，偶尔滑过弹子的表面。每一次触碰都传回细微的震动，在他的指尖汇聚成一幅看不见的形状。</p>\n<p>三枚弹子。</p>\n<p>标准的保险柜锁芯。</p>\n<p>他需要把这三枚弹子全部顶到正确的位置——然后旋转锁芯。</p>\n<p>「你的心跳声我都能听到。」Lawrence突然说。</p>\n<p>陈烬没有睁眼：「你安静点我的心跳就能慢下来了。」</p>\n<p>「我不是在指责你。」Lawrence说，声音里有一种奇怪的笑意，「我只是在想——如果四十八小时前有人告诉我，我会被锁在一个地下室里，看一个陌生人用铁丝撬锁——我会建议他做脑部扫描。」</p>\n<p>「那你现在建议什么？」</p>\n<p>「我建议你快点。」Lawrence的声音沉下来，「时间不多了。」</p>\n<p>陈烬睁开眼睛，看了一眼墙上的挂钟。</p>\n<p>3:42 PM。</p>\n<p>还剩两个小时十八分钟。</p>\n<p>他重新闭上眼睛，手指再次深入锁孔。</p>\n<p>铁丝在锁芯内壁碰到了第二枚弹子。他小心翼翼地把铁丝往上翘——弹子卡住了。再转一下——弹子滑开了。</p>\n<p>「操。」陈烬低声骂了一句。</p>\n<p>他把铁丝抽出来，看了看尖端——上面沾着一些暗黄色的油污和金属粉末。锁芯内部的状态不算好。盐蚀、生锈、缺乏保养——在这种潮湿的地下室里，机械结构的老化速度比正常环境快三倍。</p>\n<p>他重新把铁丝伸进去，这一次更慢。</p>\n<p>第一枚弹子——顶上去。卡住了。</p>\n<p>第二枚弹子——找到了位置。往上顶——</p>\n<p>第三枚弹子——</p>\n<p>「咔。」</p>\n<p>锁芯内部传来一声极其轻微的机械声响。</p>\n<p>陈烬屏住呼吸，慢慢转动铁丝——</p>\n<p>锁芯转动了四分之一圈。</p>\n<p>「咔哒。」</p>\n<p>门开了。</p>\n<p>一条细缝。</p>\n<p>暗黄色的走廊灯光从缝隙中渗进来，在浴室的地板上投下一道窄窄的光斑。</p>\n<p>陈烬睁大眼睛，盯着那条缝隙看了三秒钟。</p>\n<p>他没想到真的能撬开。</p>\n<p>他以为剧情会强制他留在房间里——竖锯的世界是封闭的，浴室就是舞台，演员不能擅自离场。但门真的打开了。</p>\n<p>门外的世界是真实的。</p>\n<p>走廊。昏暗的灯光。墙上贴着剥落的墙纸。远处有楼梯——向上延伸，通往黑暗。</p>\n<p>「门——门开了？」Lawrence的声音都在发抖。</p>\n<p>陈烬没有立刻走出去。他推开门，探头看了一眼。</p>\n<p>走廊很窄，只能容两个人并肩通过。墙上的壁灯有一盏亮着，两盏烧坏了。尽头是一个T字路口。左转应该通往楼梯，右转通往更深的走廊。空气中有一股潮湿的霉味，混着淡淡的消毒水味道——像是一栋废弃多年的综合医院大楼。</p>\n<p>「外面有什么？」Lawrence问。</p>\n<p>「暗。」陈烬说，「还有路。」</p>\n<p>他把门完全推开，门轴发出一声刺耳的尖叫。</p>\n<p>就在门完全打开的瞬间——他口袋里的磁带录音机突然发出一声尖锐的电流噪音。</p>\n<p>陈烬猛地停下来。</p>\n<p>录音机自动启动了。</p>\n<p>转轮开始转动——但这一次，那段《Hello Zepp》的旋律没有响起。磁带里传来的是一种不同的声音——更深沉，更慢。</p>\n<p>竖锯的声音。</p>\n<p>「恭喜你，陈烬。你找到了第一条生路。」</p>\n<p>「但你应该问自己一个问题——」</p>\n<p>「当你走出这扇门的时候，你的同伴会怎么样？」</p>\n<p>陈烬的血液凝固了。</p>\n<p>他缓缓转过头。</p>\n<p>门框上——在门的背面——有一根极细的钢丝。</p>\n<p>钢丝的一端连接着门的内侧把手，另一端穿过门框里侧的一个小孔，连接到墙的内部。</p>\n<p>一个电路触发装置。</p>\n<p>如果他把门完全打开——如果门开到最大——钢丝会被拉紧，触发墙内的机关。</p>\n<p>他顺着钢丝的走向看过去——钢丝穿过墙壁，消失在天花板和墙角的接缝处。然后他看到了——</p>\n<p>几根红色的电线从天花板的瓦楞板缝隙中伸出来，连接到墙上的一个塑料盒子上。</p>\n<p>塑料盒子大约手掌大小，上面有一个小小的数字显示屏。</p>\n<p>00:10。</p>\n<p>九秒。</p>\n<p>八秒。</p>\n<p>七秒。</p>\n<p>陈烬的瞳孔猛缩。</p>\n<p><strong>陷阱。</strong></p>\n<p>竖锯在他撬开门的同时触发了第二个陷阱。</p>\n<p>如果他走出去——钢丝被拉断——或者他关上门——钢丝松弛——都会触发墙壁里的机关。</p>\n<p>而那个盒子里——</p>\n<p>他闻到了一股气味。</p>\n<p>汽油。</p>\n<p>塑料盒子里有汽油。几根电线连着打火装置。</p>\n<p><strong>一个简易的燃烧装置。</strong></p>\n<p>如果他离开房间——这个装置会点燃。</p>\n<p>Lawrence会被活活烧死。</p>\n<p>而他——如果他留下——他就会被困在这个房间里。</p>\n<p>因为门外是生路——但门外也是选择的代价。</p>\n<p>陈烬站在门口，一条腿已经跨出了浴室。</p>\n<p>门外是自由。</p>\n<p>门里是火。</p>\n<p>「怎么了？」Lawrence问，他的声音变得紧张，「你脸色很不好。」</p>\n<p>陈烬的目光在门框的钢丝和Lawrence的脚链之间飞快移动。</p>\n<p>他的大脑在飞速运转。</p>\n<p>这是一个二选一的陷阱。</p>\n<p>他走，Lawrence死。</p>\n<p>他留，两个人都活——但怎么活？</p>\n<p>他已经撬开了门，说明第一层\"物理限制\"已经被打破了。但竖锯用第二层\"道德限制\"把他锁住了。</p>\n<p>——正如疤脸男人所说：竖锯不杀人，但他让你杀自己。</p>\n<p>让你在自己的良知面前做出选择。</p>\n<p>陈烬慢慢把脚收回来，退回门槛内侧。</p>\n<p>他盯着门框上的那根细钢丝。钢丝被拉得笔直——门开到这个角度，钢丝刚刚好达到临界点。如果再开十度——</p>\n<p>他用指尖触碰了一下钢丝。</p>\n<p>钢丝微微震动，在空气中发出几乎听不到的低鸣。</p>\n<p>他明白了。</p>\n<p>这根钢丝是经过精密计算的。门的开启角度被设计成了\"只能开到不会触发机关的最大范围\"。他刚才正好停在这个临界点上，再往前一步，一切就完了。</p>\n<p>而他之所以正好停在这里——</p>\n<p>因为他回头看的那一眼。</p>\n<p>因为他听到了磁带录音机的声音。</p>\n<p>如果他只是兴奋地冲出去——如果他没注意到录音机——如果他没回头——</p>\n<p>他会走到走廊尽头，然后听到身后的房间里传来爆炸声。</p>\n<p>陈烬闭上眼睛，感觉自己的后背已经湿透了。</p>\n<p>「陈烬？」Lawrence在叫他。</p>\n<p>「别说话。」陈烬的声音沙哑得不像自己的，「让我想。」</p>\n<p>他蹲在门口，手指在钢丝上轻轻滑过。</p>\n<p>敏捷强化让他的指尖灵敏度大大提升。他能感觉到钢丝上的每一丝纹理——这不是普通的钢丝，表面有一层细密的花纹，像是被手工拧合而成的。竖锯亲手做的。</p>\n<p>他沿着钢丝的走向，把目光投向墙壁内部。</p>\n<p>钢丝穿过墙面的位置，被打磨得非常光滑。钢丝在里面没有任何阻碍。</p>\n<p>但如果他把钢丝剪断——</p>\n<p>他摸了摸口袋里的多功能战术刀。</p>\n<p>战术刀的刀刃可以切断钢丝——但问题是，当他切断钢丝的瞬间，钢丝的张力会改变方向。切断的那一端会向一侧收缩——如果收缩的方向正好拉动墙壁内部的触发装置——</p>\n<p>那就完了。</p>\n<p>需要精确控制。</p>\n<p>陈烬深吸一口气，把战术刀从口袋里抽出来。</p>\n<p>「你要干什么？」Lawrence的声音里带着明显的不安。</p>\n<p>「拆炸弹。」陈烬说。</p>\n<p>Lawrence沉默了几秒钟，然后说：「你不是认真的。」</p>\n<p>「我很认真。」</p>\n<p>陈烬打开刀刃。战术刀的刀刃在昏暗中反射出一道冷光。他在刀刃上用手指来回滑了两下，找到最适合切割的位置和角度。</p>\n<p>他必须让钢丝在被切断的瞬间不产生任何张力变化。</p>\n<p>怎么做？</p>\n<p>一只手捏住钢丝的两端——切断前先稳住它。</p>\n<p>他把左手的两根手指夹在钢丝上——一根在上，一根在下——把钢丝稳定在自己的指间。然后右手握刀——</p>\n<p>刀刃贴上钢丝。</p>\n<p>他能感觉到钢丝的细密纹理在刀刃上震颤。</p>\n<p>只要一刀。</p>\n<p>他的手指微微发抖。</p>\n<p>「你确定要这么做吗？」Lawrence问。</p>\n<p>「不确定。」陈烬说，「但你还有更好的主意吗？」</p>\n<p>Lawrence没有回答。</p>\n<p>陈烬咬了咬牙——</p>\n<p>刀锋划过钢丝的瞬间，他用尽全力把钢丝的两端捏死在指间——</p>\n<p>「铮——」</p>\n<p>钢丝发出一声清脆的金属断裂声。</p>\n<p>被切断的一端在陈烬的手指中猛地弹了一下——但没有脱手。另一端陷入了墙壁的夹缝中——没有拉动任何东西。</p>\n<p>没有爆炸。</p>\n<p>没有火焰。</p>\n<p>什么都没有。</p>\n<p>陈烬保持着那个蹲姿，维持了整整五秒钟。然后他慢慢松开手指。</p>\n<p>被切断的钢丝掉在地上，发出一声轻微的叮当声。</p>\n<p>他还活着。</p>\n<p>Lawrence的喉咙里发出一声像是被呛住的笑声：「你——你真的成功了？」</p>\n<p>「……运气好。」陈烬说，他的声音里有一丝几乎听不出来的颤抖。</p>\n<p>他站起来，重新把门推开了几厘米——这次推得更大了，没有钢丝的牵拉，门可以完全打开。</p>\n<p>「走吧。」他说，「我们能出去了。」</p>\n<p>「等一下。」Lawrence说。</p>\n<p>陈烬回头。</p>\n<p>Lawrence坐在角落里，用一种陈烬读不懂的眼神看着他。</p>\n<p>「你到底是什么人？」Lawrence问，声音很轻，但在安静的浴室里格外清晰，「你不是警察，不是侦探——你甚至不像这个世界的人。你知道竖锯的名字。你知道每个人的背景。你会撬锁，会拆炸弹——」</p>\n<p>「你说的对。」陈烬说，「我不是这个世界的人。」</p>\n<p>Lawrence盯着他：「什么意思？」</p>\n<p>陈烬沉默了片刻。</p>\n<p>然后他说：「我死过一次。」</p>\n<p>浴室里的空气像是凝固了。</p>\n<p>「那场火——我冲进去了。我背出了一个孩子。但那个孩子的母亲还在里面。我回头了。然后天花板塌了。」</p>\n<p>陈烬的声音很平静，像在讲别人的故事。</p>\n<p>「——我死了。」</p>\n<p>「然后我醒来，在一个叫影城的地方。那里的人告诉我——我可以进入不同的世界，完成不同的任务。如果活下来，就能得到积分。攒够积分，就能找到答案。」</p>\n<p>「但那不是重点。」</p>\n<p>他看向Lawrence，目光里有一种说不清的东西——不是同情，不是恳求，是一种深到脊背里的疲惫。</p>\n<p>「重点是——这里的每一样东西都是真的。疼痛是真的。死亡是真的。他不是在跟你玩游戏，他是在让你做出选择。」</p>\n<p>Lawrence的嘴动了动，但没有发出声音。</p>\n<p>过了好一会儿，他说：「你相信有地狱吗？」</p>\n<p>「我就在地狱里。」陈烬说，「每一场都是不同的。」</p>\n<p>话音刚落——</p>\n<p>房间里响起了电话铃声。</p>\n<p>急促的。刺耳的。</p>\n<p>两个人同时看向声音的来源——墙边，一台老式电话机，黑色的塑料外壳，已经被岁月磨得发亮。</p>\n<p>陈烬知道这个桥段。原电影中，Zep会打电话来——给Lawrence时间压力，催促他锯脚。</p>\n<p>但这一次不一样了。</p>\n<p>陈烬走到电话前，接起了话筒。</p>\n<p>他没有等对面先说话。</p>\n<p>「告诉John，」他说，声音低沉而平静，「我知道他在做什么。」</p>\n<p>电话那头沉默了。</p>\n<p>长时间的沉默。</p>\n<p>然后Zep的声音传来——沙哑，带着被戳穿的不安：「……你说什么？」</p>\n<p>「我说——你告诉John Kramer，我知道他在做什么。」陈烬重复了一遍，每一个字都咬得很清楚，「我知道他躺在浴室地板上，假装自己是尸体。我知道他从头到尾都在看着我们。我知道这一切都是他设计的——每一颗螺丝，每一根钢丝，每一秒倒计时。」</p>\n<p>电话那头传来一声细微的——吸气声。</p>\n<p>Zep没想到。</p>\n<p>在所有的游戏中，从来没有一个猎物能在刚开始不到两个小时就说出竖锯的全名。</p>\n<p>「你现在去Lawrence的家了，是吗？」陈烬继续说，「你拿枪指着他的老婆和女儿。你以为你在执行竖锯的命令。但你真的以为你是猎人吗？」</p>\n<p>「你也是猎物，Zep。」</p>\n<p>「你只是他的工具。用完就扔。」</p>\n<p>电话那头传来一阵喘息声——急促的，慌乱的。</p>\n<p>「我不——我不知道你在说什么——」Zep的声音已经破了。</p>\n<p>「你知道。」陈烬说，「你也知道一旦你完成任务，你会死。竖锯不会留活口。」</p>\n<p>电话那头沉默了。然后是一声被压抑的咒骂。</p>\n<p>「——你是谁？」</p>\n<p>「你没必要知道。」陈烬说，「但你可以转告John——他选错了对手。」</p>\n<p>电话那头传来一阵杂音，然后——挂断了。</p>\n<p>「嘟嘟嘟嘟——」</p>\n<p>陈烬放下话筒。</p>\n<p>Lawrence目瞪口呆地看着他：「你——你说了什么？你叫了竖锯的名字？你——」</p>\n<p>「他需要知道，我们这个猎物不比别人。」陈烬说，声音里有一种Lawrence从未见过的冷静。</p>\n<p>那不是来自勇敢。</p>\n<p>那是一种——来自死亡之后的无所畏惧。</p>\n<hr />\n<p>同一时刻。</p>\n<p>一间阴暗的房间。</p>\n<p>墙壁上挂着数十个显示器——每一个显示器都在播放不同的画面。</p>\n<p>浴室。废弃工厂。Lawrence家的地下室。医院走廊。</p>\n<p>John Kramer坐在轮椅上，头微微歪向一侧，枯瘦的手指搭在扶手上。</p>\n<p>他的脸色苍白得像一张纸，皮肤紧贴着颧骨，眼窝深陷。但那双眼睛里——有一个光点。</p>\n<p>正盯着其中的一个显示器。</p>\n<p>上面是陈烬的脸。</p>\n<p>他把Zep的电话挂断后，正在和Lawrence说话。他的表情很平静——不是强装冷静的那种平静，而是一种真正的、从内而外的稳定。</p>\n<p>John Kramer慢慢坐直了身体。</p>\n<p>他能感受到——这一次的猎物，和以前不一样。</p>\n<p>他的嘴角微微动了一下——不是笑，是一种近乎审视的、重新评估的表情。</p>\n<p>「有意思。」他低声说。</p>\n<p>然后他把轮椅转过去，面向另一个显示器。</p>\n<p>屏幕上显示着Ripley——她刚刚打开了Amanda头上的反向熊夹。</p>\n<p>John看着Ripley的动作，眼睛里浮现出一丝几乎看不见的光——像是猎人看到了意料之外的猎物时，那种混合着惊讶和期待的眼神。</p>\n<p>他慢慢地、一字一顿地说：</p>\n<p>「——这次的游戏，比我想象中有趣一些。」</p>\n<p>屏幕的蓝光映在他的脸上，像一面冷酷的镜子。</p>\n<p>他按下轮椅扶手上的一个按钮——</p>\n<p>一个机械转轮开始嗡嗡转动。</p>\n<p>下一个陷阱，开始启动了。</p>", "file": "015-对面的人.md", "prev": 14, "next": 16}, {"num": 16, "title": "第十六章 监控", "body": "<p>第十六章 监控</p>\n<p>监控室里弥漫着一股消毒水的气味。不是医院那种干净的消毒水味——是一种腐败的、过期的气味，像瓶盖没拧紧的化学试剂在空气里慢慢挥发。</p>\n<p>John Kramer坐在轮椅上，面前是一整面墙的显示器。</p>\n<p>三十二个屏幕，每一个都播放着不同的画面。</p>\n<p>废弃工厂——Ripley已经把钥匙插进了Amanda脑后的锁孔里。她正在解自己头上的装置，动作精准而冷静。John看着她的手指在锁扣上操作，没有说话。</p>\n<p>洗手间——一个年轻男人跪在地上，双手被绑在水管上。他的面前是一个电路板，上面标着数字和颜色的电线。计时器显示着04:32。John看了他四秒钟，然后移开了目光。</p>\n<p>那个男人不会成功的。</p>\n<p>他从不浪费时间在已经注定失败的人身上。</p>\n<p>第三个画面——地下室走廊。一个人影在黑暗中摸索前进，背上绑着一个金属装置，上面插满了注射器。</p>\n<p>第四个——车库。一个女人被锁在车里，汽车的排气管连接着一根通往驾驶室的管道。</p>\n<p>第五个——</p>\n<p>浴室。</p>\n<p>John的目光在浴室画面上停留了。</p>\n<p>屏幕上，陈烬刚刚把铁丝从锁孔里抽出来。他的动作干净利落——不像是第一次撬锁的人。但John注意到他的手指在抽离铁丝时有一个极其细微的停顿。那不是熟练的停顿，那是一种——思考的停顿。</p>\n<p>他在计算。</p>\n<p>John的身体微微前倾，手肘撑在轮椅扶手上。</p>\n<p>这个动作让他身边的一个男人紧张了一下。那个男人站在John的左侧，穿着一件黑色夹克，身材高大，脸上带着一种小心翼翼的、随时准备服从的表情。</p>\n<p>他叫Mark，是John为数不多的帮手之一——一个被\\\"治愈\\\"过的、从角斗场般的陷阱中活下来的男人。</p>\n<p>「他成功了。」Mark说，声音里有一丝不易察觉的惊讶，「那个铁丝——他真的在撬锁。」</p>\n<p>John没有回答。</p>\n<p>他看着陈烬的手指在锁孔里转动。铁丝尖端在锁芯的弹子上试探，每一次触碰都精准而轻微。这不是一个门外汉的运气——这像是一个经受过训练的人在执行熟悉的操作。</p>\n<p>但Mark的档案上说——不，死者的档案上说。</p>\n<p>陈烬，男，三十二岁，原职业：消防员。死于一次火灾救援中的二次坍塌。</p>\n<p>没有撬锁训练的记录。没有特殊技能训练的记录。没有任何与犯罪或逃脱相关的履历。</p>\n<p>John的嘴角微微动了一下。</p>\n<p>档案不会说谎。但人会。</p>\n<p>他感兴趣的不是陈烬的技术——技术是可以解释的。他感兴趣的是陈烬的反应时间。</p>\n<p>从醒来——到开始行动——只用了三十七秒。</p>\n<p>三十七秒。John看过自己的陷阱测试录像，他做过无数次演练。测试者平均需要四到六分钟才能从最初的混乱中恢复理性判断。最快的记录是一分十二秒——一个曾在军队服役的退伍军人。</p>\n<p>三十七秒。</p>\n<p>而且这个人在睁开眼睛的第一瞬间——没有尖叫，没有咒骂，没有尝试拉扯铁链——他直接看向了对面的Lawrence Gordon。</p>\n<p>他认出了他。</p>\n<p>他在醒来之前就已经知道自己在什么地方。</p>\n<p>John靠在轮椅靠背上。他的手指在扶手上轻轻敲了两下——这是他思考时的习惯动作。</p>\n<p>屏幕上的陈烬已经打开了门。他站在门缝前，一条腿跨过门槛——然后停住了。</p>\n<p>John看到了那个停顿。他看到了陈烬的目光落在门框的钢丝上——那根细得几乎不存在的钢丝。</p>\n<p><em>他看到了。</em></p>\n<p>John的眼睛眯了起来。</p>\n<p>那根钢丝的直径是0.3毫米。在昏暗的浴室灯光下，它几乎与门框的阴影融为一体。John在设计这个陷阱的时候，专门测试过——在正常光线下，十个人中有九个需要至少三十秒才能发现钢丝的存在。有一个人根本没发现，直到他触发机关。</p>\n<p>陈烬发现它只用了不到两秒。</p>\n<p>不——不止是发现。</p>\n<p>John盯着屏幕上的细节。陈烬蹲下身体，手指在钢丝表面轻轻触碰了一下。他不是在确认钢丝的存在——他是在感受它的张力。</p>\n<p>他是在评估这个陷阱的工作机制。</p>\n<p>John见过很多聪明人。他在自己的游戏中见过律师、医生、工程师、科学家——那些自认为聪明的人，在压力面前都会暴露出本质的愚蠢。聪明和智慧是不同的。聪明是知道答案，智慧是知道怎么找答案。</p>\n<p>陈烬在找答案。</p>\n<p>他用了四分钟找到了钢丝的来源，判断了它的连接方式，识破了它的触发原理。</p>\n<p>然后他做了一件John没有想到的事——</p>\n<p>他没有选择剪断钢丝。</p>\n<p>他选择了稳定钢丝的两端，在消除张力变化的瞬间剪断它。</p>\n<p>John的嘴角动了一下。</p>\n<p>「有意思。」他说。</p>\n<p>Mark愣了一下：「先生？」</p>\n<p>John没有解释。他只是盯着屏幕，看着陈烬回到浴室里，接过Lawrence递来的磁带录音机，接起那通电话——</p>\n<p>然后他说出了那句话。</p>\n<p>「告诉John，我知道他在做什么。」</p>\n<p>John的手指停住了。</p>\n<p>屏幕里，Zep的声音明显变了调。那个在医院做杂工的年轻人，正在被一个他本该操控的人反过来操控。</p>\n<p>John听到陈烬在电话里继续说——「你也是猎物，Zep。你只是他的工具。用完就扔。」</p>\n<p>John闭上眼睛。</p>\n<p>当他再次睁开眼睛的时候，他按下了轮椅扶手内侧的一个按钮。</p>\n<p>一个隐藏的抽屉打开了，里面放着一盘空白磁带和一台录音机。</p>\n<p>他把录音机拿起来，按下录制键。</p>\n<p>「陈烬。」他对着录音机说，声音平缓而低沉，像是医生在给病人做诊断，「你已经走进了第一层。现在——让我看看你能走多远。」</p>\n<p>他从抽屉里取出另一盘磁带。磁带的标签上写着一行手写的小字：</p>\n<p><em>「第二场游戏——走廊的代价」</em></p>\n<p>他把磁带放进一个塑料盒子里，递给Mark。</p>\n<p>「把这个放在二楼走廊尽头的广播室里。」John说，「等他从浴室里走出来——按下播放键。」</p>\n<p>Mark接过盒子：「如果他走不出来呢？」</p>\n<p>John的目光回到显示器上。</p>\n<p>陈烬正在用铁丝重新加固门框上的机关碎片。他的动作很专注，像是一个工匠在修复一件损坏的工具。Lawrence在一旁看着，眼睛里的恐惧正在缓慢地消退——取而代之的是一种更危险的情绪：希望。</p>\n<p>「他会走出来的。」John说。</p>\n<p>Mark没有再问。他点了点头，转身离开了监控室。</p>\n<p>John独自坐在显示器墙前。</p>\n<p>三十二个画面在跳动。有人在尖叫，有人在哭泣，有人在安静地等待死亡。每一个画面都是他精心设计的艺术品——用痛苦、选择和重生铸成的十字架。</p>\n<p>但他的目光始终没有离开中间的那个屏幕。</p>\n<p>陈烬。</p>\n<p>John靠在椅背上，枯瘦的手指交叉放在膝盖上。</p>\n<p><em>这次的猎物不一样。</em></p>\n<p>他从陈烬的眼睛里看到了一样东西——不是恐惧，不是愤怒，不是绝望。那是一种更复杂的东西。一种——他已经不再害怕死亡的表情。</p>\n<p>只有经历过真正死亡的人，才会有那种表情。</p>\n<p>John在之前的调查中已经了解过陈烬的档案：一个在三年前死于救火现场的消防员。那场火灾的新闻报道他看过——一栋老旧居民楼，三楼起火，烧死了四个人。其中一个是消防员。</p>\n<p>那个名字叫陈烬。</p>\n<p>John当时没有在意。世界上每天都有消防员死去，他不可能关注每一个死者。</p>\n<p>但陈烬出现在他的游戏里——被锁在浴缸里，像一个被回收的灵魂。</p>\n<p>John不知道这是怎么发生的。他不关心这是怎么发生的。他只关心——<em>他要怎么做。</em></p>\n<p>一个死而复生的人，在这个世界上还有什么可失去的？</p>\n<p>没有什么比这更危险的了。</p>\n<p>因为在竖锯的游戏中，恐惧是最重要的武器。恐惧死亡的降临，恐惧失去所爱之人，恐惧自己。但一个不恐惧死亡的人——你用什么东西来控制他？</p>\n<p>John的嘴角浮现出一个月牙形的弧度。</p>\n<p>不是笑。是一种——重新评估的表情。</p>\n<p>「那我们就换一种玩法。」他低声说。</p>\n<p>他按下了一个红色的按钮。</p>\n<p>整个监控室的灯闪了一下。</p>\n<p>墙壁深处传来一阵机械转动的声音——齿轮咬合，金属摩擦，像是某种大型装置被激活。</p>\n<p>John看着屏幕上的陈烬。</p>\n<p>他的手指在扶手上又敲了两下。</p>\n<p>「第二回合，陈烬。」他说，「让我看看——你不怕死，那你怕不怕——别人死？」</p>\n<p>屏幕上，浴室的灯光突然闪了一下。</p>\n<p>陈烬抬起头，看向天花板上的通风口。</p>\n<p>John和他隔着屏幕对视了一秒——虽然陈烬并不知道他的目光正穿过那台隐藏摄像头的镜头，落在监控室的显示器上。</p>\n<p>但John知道，这个人感觉到了。</p>\n<p>他在被注视的时候，感觉到了。</p>\n<p>John的手指停住了。</p>\n<p>他缓缓地说了一句——</p>\n<p>「来找到我。」</p>", "file": "016-监控.md", "prev": 15, "next": 17}, {"num": 17, "title": "第十七章 父与女", "body": "<p>第十七章 父与女</p>\n<p>一辆深灰色的轿车停在Gordon家门前。</p>\n<p>Zep Hindle坐在驾驶座上，双手握着方向盘，指节发白。他的手在抖。</p>\n<p>车前灯照亮了Gordon家二楼的窗户。那是一栋两层的小楼，砖砌外墙，前院种着一棵橡树，树下摆着一辆儿童自行车——粉色的，车把上系着一根彩色的流苏。</p>\n<p>Zep盯着那辆自行车看了十秒钟。</p>\n<p>他有一个女儿。六岁。她也有一个自行车——蓝色的，她喜欢骑到附近的公园里去玩。</p>\n<p>Zep闭上眼睛，深吸一口气。</p>\n<p>当他再次睁开眼睛时，他推开车门，走了出去。</p>\n<p>他的手里提着一个黑色塑料袋。袋子里装着一套猪脸面具、一柄左轮手枪和一卷胶带。</p>\n<p>他走到Gordon家的前门，按下门铃。</p>\n<p>铃声响了两声。</p>\n<p>门开了，Alison Gordon站在门口。她穿着一件米白色的家居毛衣，手里端着一杯咖啡，脸上带着见到陌生人时的礼貌性微笑。</p>\n<p>「你好？请问你找——」</p>\n<p>她的目光落在Zep手里的黑布袋上。然后她看到了他夹克下露出的枪管。</p>\n<p>笑容僵住了。</p>\n<p>Zep推开门，把Alison撞进屋里。咖啡杯脱手摔碎在地上，发出一声清脆的碎裂声。</p>\n<p>「别动。」Zep说，声音比他预想中更沙哑，「别叫。」</p>\n<p>Alison的瞳孔放大，她本能地向后退缩，后背撞到了楼梯扶手。</p>\n<p>「我丈夫——他不在——」</p>\n<p>「我知道。」Zep说，「他不在。但你和你女儿在。」</p>\n<p>Alison的脸色变得惨白。</p>\n<p>Zep拿出胶带，撕下一段。</p>\n<p>「别出声。按我说的做——然后一切都会好起来。」</p>\n<p>他说完这句话的时候，自己都不相信。</p>\n<hr />\n<p>浴室里。</p>\n<p>陈烬正蹲在墙角，用铁丝重新固定门框上被剪断的机关碎片。</p>\n<p>他的动作很仔细。他把铁丝的一端弯成一个钩子，挂住门框内侧的小孔，然后把另一端穿过墙壁的缝隙，绕了两圈，拧紧。这个操作不能完全消除陷阱的威胁——但他至少让触发装置处于一个安全的状态。</p>\n<p>只要没有人用力把门往外推，这个装置就不会触发。</p>\n<p>「你在做什么？」Lawrence问，他在房间里坐了下来，双腿盘在地上，像一个被抽空了所有力气的病人。</p>\n<p>「收尾。」陈烬说，「竖锯的设计逻辑很清晰——每一个机关都是互相关联的。你拆掉一个，另一个可能就会触发。你得确保所有东西都在控制之内。」</p>\n<p>Lawrence沉默了一会儿，然后说：「你说话的方式像个工程师。」</p>\n<p>「消防员也得懂结构。」陈烬头也没回，「我们得知道一栋楼什么时候会塌。」</p>\n<p>「但你刚才撬锁的样子——那不像一个消防员。」</p>\n<p>陈烬的手指停了一下。</p>\n<p>「我认识一个人。」他说，「一个在影城里教了我很多东西的人。他教过我——在进入任何一个空间之前，先学会怎么出去。」</p>\n<p>他没有说的是——那个人在《异形》世界里死了。一个叫Dallas的船员，在通风管道里被异形拖走了。他死之前把全船的通风管道结构图都塞进了陈烬的脑子里。</p>\n<p>「影城。」Lawrence重复了一遍这个词，「你说你来自另一个世界——」</p>\n<p>「不是另一个世界。」陈烬说，「是很多个世界。」</p>\n<p>他站起来，拍了拍手上的灰，转身看向Lawrence。</p>\n<p>「你不用完全理解。你只需要知道——我不想你死，我也不想让你的家人死。」</p>\n<p>Lawrence抬起头看着他。在浴室惨白的灯光下，Lawrence的眼睛里有一种陈烬之前没看到过的东西——一种属于父亲的焦虑。</p>\n<p>「我女儿。」Lawrence说，声音很轻，「Diana。她今年八岁。她喜欢画画。她有一次画了一张画给我——画上是三个人，她和她妈妈，还有一个火柴人。她说那是爸爸。因为爸爸总是在工作，所以她不记得爸爸长什么样。」</p>\n<p>他的声音越来越沙哑了。</p>\n<p>陈烬没有说话。</p>\n<p>「我一直觉得我是一个好父亲。」Lawrence继续说，「我努力工作，我养家，我不喝酒，我不打人——我做到了所有一个好父亲应该做的事。但我从来没参加过她的家长会。我错过了她的钢琴演出。我甚至连她最喜欢的颜色是什么都不知道。」</p>\n<p>他停了一下，低头看着自己被链子拴住的脚踝。</p>\n<p>「我以为我有很多时间。」</p>\n<p>陈烬的喉咙里涌起一股酸涩的感觉。</p>\n<p>他想起自己在大火中背出来的那个孩子。那个孩子在他怀里哭着喊妈妈。他答应过那个孩子——「叔叔带你出去，然后叔叔回来找你妈妈。」</p>\n<p>他做到了前半句。</p>\n<p>后半句——他死在了燃烧的天花板下面。</p>\n<p>「你的时间还有很多。」陈烬说，声音很沉，「只要活着出去。」</p>\n<p>Lawrence抬起头，正要说话——</p>\n<p>电话响了。</p>\n<p>急促的铃声在狭窄的浴室里炸开，像一把刀捅穿了沉默。</p>\n<p>两个人同时看向墙上的电话机。</p>\n<p>陈烬站起来，走到电话前，拿起话筒。</p>\n<p>「喂。」</p>\n<p>电话那头传来的是一个声音——不是Zep的，不是竖锯的。</p>\n<p>是一个女孩的声音。</p>\n<p>「爸——爸爸——」</p>\n<p>Diana Gordon的声音从听筒里传来，颤抖着，带着哭腔。像一只被吓坏了的小动物在黑暗中瑟瑟发抖。</p>\n<p>「爸爸——你在哪——我怕——」</p>\n<p>Lawrence整个人从地上弹了起来，铁链被猛地绷直，发出刺耳的金属响声。</p>\n<p>「Diana！Diana——你在哪？你妈妈呢？」</p>\n<p>「妈妈——妈妈在这里——有一个坏人——他——」</p>\n<p>电话那头传来一阵杂音。然后是Alison的声音——被压抑的、喉咙里挤出来的声音：「Lawrence——Lawrence别管我们——保护好你自己——」</p>\n<p>然后是一声沉闷的撞击声，Alison的声音断了。</p>\n<p>「妈妈——」Diana尖叫起来。</p>\n<p>再然后——Zep的声音出现在电话里。</p>\n<p>「Dr. Gordon。」Zep说，声音比之前稳定了一些，像是已经进入了自己扮演的角色，「你听到了。她们还活着。但如果你在六点之前没有完成你的任务——她们就活不了了。」</p>\n<p>「什么任务——」Lawrence的声音已经变了调，「你要我做什么都可以——别伤害她们——」</p>\n<p>「你知道任务。」Zep说。</p>\n<p>电话那头沉默了。</p>\n<p>Lawrence握着话筒的手在发抖。他的目光慢慢转向地上那把生锈的锯子。</p>\n<p>他知道任务是什么了。</p>\n<p>锯断你的脚。爬过去。开枪打死你对面的人。</p>\n<p>然后你就能活着走出去。</p>\n<p>「不——」Lawrence的声音几乎是挤出来的，「不，我不能——」</p>\n<p>「你有选择。」Zep说，声音里带着一种机械的、背诵台词的刻板感，「你可以选择不锯。然后你的女儿会死。你的妻子会死。你也会死。或者——你可以锯掉一只脚，然后你的女儿和妻子都能活下去。一个脚换三条命。」他顿了顿，「很公平。」</p>\n<p>电话挂断了。</p>\n<p>「嘟嘟嘟嘟——」</p>\n<p>话筒从Lawrence的手中滑落，砸在地上。</p>\n<p>他整个人像一尊石像一样站在原地，一动不动。</p>\n<p>过了一会儿，他跪了下来。</p>\n<p>不是向任何神跪下的，是向着地面——向着那把锯子——跪了下去。</p>\n<p>他的手指碰到锯子的手柄。</p>\n<p>锯刃上还残留着他之前疯狂锯铁链时留下的金属碎屑。铁锈和汗水混在一起，在锯条上凝结成暗红色的污渍。</p>\n<p>「我做不到。」他说，声音像是从喉咙最深处挤出来的，「我不能——我不能没有脚——」</p>\n<p>陈烬站在他面前，居高临下地看着他。</p>\n<p>「那就不要锯。」</p>\n<p>Lawrence抬起头，眼眶通红：「你说的轻松——你的家人不在这里——你没听到那个声音——她是我女儿——她今年八岁——」</p>\n<p>「我知道。」陈烬说，「我也知道你如果真的锯了脚，你还是会死。」</p>\n<p>Lawrence愣住了。</p>\n<p>陈烬蹲下来，和Lawrence平视。</p>\n<p>「你锯掉脚——你用那把手枪打死我——然后你爬出去。Zep在走廊尽头等你。他知道你不会老老实实走出去——他会在你爬到自己家之前补一枪。」陈烬的声音很平静，像是在陈述一个已经写好的剧本，「竖锯不会让你活着的。你不明白吗？这个游戏从一开始就没有『赢家』。唯一的生路就是不玩他的游戏。」</p>\n<p>「那你说怎么办？」Lawrence的声音近乎嘶吼，「我老婆——我女儿——她们在一个疯子手里——我还有两个小时——」</p>\n<p>陈烬看着他，沉默了五秒钟。</p>\n<p>然后他说：「我去救她们。」</p>\n<p>Lawrence的瞳孔放大了一下——不是相信，是震惊。</p>\n<p>「你说什么？」</p>\n<p>「我说——」陈烬站起来，走到门边，「我去救你的家人。」</p>\n<p>他把手放在门把手上，回头看了Lawrence一眼。</p>\n<p>「你留在这里。」陈烬说，「看着那个『尸体』。如果他动了——如果你听到任何动静——你就大声喊。用你能发出的最大声音喊。」</p>\n<p>Lawrence张着嘴，脸上的表情从震惊变成了困惑。</p>\n<p>「你疯了——你怎么出去？你出去了又能怎么样？你连武器都没有——」</p>\n<p>「我有这个。」陈烬从口袋里掏出那把多功能战术刀，「还有一些别的东西。」</p>\n<p>「那是什么？」</p>\n<p>「不知道。」陈烬说，「但竖锯留的东西，多少有点用。」</p>\n<p>Lawrence盯着他看了很久。</p>\n<p>然后他说：「你为什么要这么做？」</p>\n<p>陈烬在门口站住了。</p>\n<p>这个问题——</p>\n<p>他自己也问过自己很多次。在《异形》里，他为什么要救Ripley？在浴缸里醒来的时候，他为什么不直接锯断Lawrence的脚——像原剧情里Adam想做的那样——然后一个人逃走？</p>\n<p>答案很简单，也很复杂。</p>\n<p>「因为我死过一回了。」陈烬说，「我知道死是什么感觉。那不是最好的东西，但也不是最坏的东西。」</p>\n<p>他推开门。</p>\n<p>「最坏的东西——是看着别人因为你而死，而你什么都没做。」</p>\n<p>走廊里的昏暗灯光照在他的脸上。</p>\n<p>Lawrence靠在墙边，看着那个男人的背影。</p>\n<p>他看着陈烬走出浴室——脚步很稳，没有犹豫。</p>\n<p>然后门在他身后关上了。</p>\n<p>锁芯发出咔哒一声。</p>\n<p>Lawrence一个人坐在房间里，听着自己的心跳声。</p>\n<p>地上的\\\"尸体\\\"依然一动不动。</p>\n<p>墙上的挂钟指向4:05。</p>\n<p>还剩一个小时五十五分钟。</p>\n<p>他低下头，手指碰到冰凉的金属地板。</p>\n<p>他喃喃地说了一句话，声音小到连他自己都听不清。</p>\n<p>「……一定要活着回来。」</p>", "file": "017-父与女.md", "prev": 16, "next": 18}, {"num": 18, "title": "第十八章 三分钟", "body": "<p>第十八章 三分钟</p>\n<p>陈烬站在浴室门外的走廊里。</p>\n<p>门在他身后关上了。锁芯内部的机械声音在空荡荡的走廊里回荡了整整两秒才消失。</p>\n<p>走廊比他记忆中更长。</p>\n<p>不是那种物理意义上的长——是那种一个人在空旷的空间里，所有感官都被放大了的感觉。他的耳朵能听到天花板上水管的滴水声——一滴，间隔两秒，规律得像心跳。他能闻到空气中的气味——铁锈、潮湿、还有一丝极淡的化学药剂味。</p>\n<p>他的目光扫过走廊两侧。</p>\n<p>墙上每隔两米挂着一盏壁灯，但大部分已经烧坏了，只有远处一盏还在发出昏黄的、断续的光。走廊尽头是一个T字路口。左侧通往楼梯间——他之前从门缝里看到过。右侧是一条更长的通道，尽头是一扇半开的门。</p>\n<p>陈烬的选择时间只有三秒钟。</p>\n<p>他选择了楼梯间。</p>\n<p>他的脚步声在水泥地上很轻。敏捷强化让他的落脚更加安静——每一步都像是猫科动物在移动前的试探，脚掌先着地，然后缓慢放下重心。</p>\n<p>他走楼梯。</p>\n<p>走楼梯比走走廊更安全——因为楼梯间是开放的，没有门后的陷阱，没有狭窄转角中的伏击。</p>\n<p>但竖锯不会让任何一条路是简单的。</p>\n<p>陈烬走到楼梯间入口的时候，停住了。</p>\n<p>楼梯间入口上方的天花板上，挂着一个东西。</p>\n<p>一个用尼龙绳吊着的塑料盒子。盒子大约手掌大小，上面贴着一行字——「到这里来」。</p>\n<p>陈烬盯着那行字看了两秒。</p>\n<p>他没有碰那个盒子。他先用战术刀的刀背轻轻敲了一下盒子的外壳。</p>\n<p>塑料。轻的。里面似乎有什么东西在晃动——像是一个小物件。</p>\n<p>他仔细检查了盒子和尼龙绳的连接方式——绳结是简单的平结，没有连接到任何电线或机关。</p>\n<p>他伸手把盒子取下来，打开。</p>\n<p>里面是一张纸条。</p>\n<p>纸条上写着一句话，手写的，字迹工整而清秀：</p>\n<p>「我知道你会走到这里。你知道规则——我不会让你轻松抵达终点。」</p>\n<p>「在你的面前有三条路。一条通往出口，一条通往更深的陷阱，一条通往我以为你已经认识的人。」</p>\n<p>「选择权在你手中。」</p>\n<p>「记住——时间不等人。」</p>\n<p>陈烬把纸条翻过来。背面还有一个字：</p>\n<p>「往左。」</p>\n<p>往左。</p>\n<p>楼梯间。</p>\n<p>陈烬抬起头，看向楼梯间的方向。</p>\n<p>左侧的楼梯——往下走。通往地下室。</p>\n<p>那正是Ripley所在的楼层。</p>\n<p>他向右看了一眼——通往一楼大厅。那里有出口，但竖锯不会让任何出口没有机关。</p>\n<p>他把纸条折好放进口袋，然后大步走向左侧楼梯。</p>\n<hr />\n<p>楼梯间的灯光比走廊更暗。</p>\n<p>每一级台阶都像是用旧水泥浇筑的，表面粗糙不平，边缘被磨损成了圆弧形。墙上的墙纸已经完全剥落，露出底下斑驳的墙面，上面有暗色的污渍——水渍，也可能是别的东西。</p>\n<p>陈烬走得很快，但每一步都很小心。</p>\n<p>他的手扶在楼梯扶手上——扶手的铁管表面覆盖着一层细密的铁锈，轻轻一碰就往下掉红色的粉末。</p>\n<p>他下了一层。</p>\n<p>又下了一层。</p>\n<p>三层之后，他看到了一个防火门。暗绿色的铁门，上面有一个圆形的观察窗——但玻璃已经被打碎了，只剩下一个黑洞洞的窗口。</p>\n<p>陈烬走到门前，透过那个窗口往里看。</p>\n<p>门的另一边是一个大厅——废弃的、空荡荡的大厅。墙边堆着一些医疗器材，生锈的手术床，翻倒的轮椅。天花板很高，有几根日光灯管在闪烁着。</p>\n<p>大厅的中央——趴着一个人。</p>\n<p>陈烬的瞳孔微微收缩。</p>\n<p>那个人穿着白色的衣服——像是一件护士服。她面朝下倒在地上，身下有一摊暗色的液体。</p>\n<p>他的大脑飞速运转。</p>\n<p>陷阱？尸体？诱饵？</p>\n<p>他的第一个冲动——是冲进去救人。</p>\n<p>但他压住了这个冲动。</p>\n<p><em>在竖锯的世界里，你看到的第一样东西，往往是最危险的东西。</em></p>\n<p>陈烬慢慢地推开门。防火门的铰链发出刺耳的摩擦声——尖锐的，像是被人故意没有上油，用来提醒屋里的人有人进来了。</p>\n<p>他走进大厅。</p>\n<p>地面的瓷砖已经碎裂了。他的鞋底踩在碎片上，发出细微的咔咔声。</p>\n<p>距离那个\\\"护士\\\"还有五米。</p>\n<p>四米。</p>\n<p>三米。</p>\n<p>两米。</p>\n<p>一米。</p>\n<p>他蹲下来。</p>\n<p>那个\\\"护士\\\"的脸埋在手臂里，看不到长相。身下的暗色液体——是血。但气味不太对——没有血的铁腥味，更多的是一种糖浆般的甜味。</p>\n<p>陈烬伸出两根手指，蘸了一点那液体，放到鼻子前闻了一下。</p>\n<p>色素。糖浆。不是血。</p>\n<p>假人。</p>\n<p>他猛地站起来——</p>\n<p>同时，身后的防火门发出了「咔哒」一声，自动锁上了。</p>\n<p>陈烬转过身。</p>\n<p>门已经锁死了。</p>\n<p>他走到门前，试了一下门把手——纹丝不动。这是一个电子锁，需要密码或者钥匙卡才能打开。</p>\n<p>陈烬站在锁死的门前，深吸一口气。</p>\n<p>他上当了。</p>\n<p>那个假人——那个纸条——都是用来把他引入这个房间的。竖锯在引导他的路线。</p>\n<p>「聪明。」陈烬低声说，声音里带着一丝自嘲的意味。</p>\n<p>他环顾四周。</p>\n<p>大厅大约有五十平方米。三面墙，一面是入口——已经被锁死的入口。另一面墙上有两扇窗户，但窗户外面已经被砖头砌死了。第三面墙上有一扇铁门——通往更深处的走廊。</p>\n<p>没得选。</p>\n<p>他走到那扇铁门前。</p>\n<p>铁门上贴着一张纸：</p>\n<p>「第二场游戏——开始」</p>\n<p>陈烬盯着这几行字看了三秒。</p>\n<p>然后他听到了一声——滴。</p>\n<p>非常轻。非常短。</p>\n<p>他低下头。</p>\n<p>铁门的把手上，连着两根极细的电线。那两根电线连接到门框内侧的一个小型装置里——一个接收器。</p>\n<p>他触发了一个开关。</p>\n<p>陈烬的后背涌上一股凉意。</p>\n<p>他后退了半步。</p>\n<p>天花板上传来一声机械转动的声响。</p>\n<p>他抬起头——</p>\n<p>在天花板中央的通风口格栅上，一个喷头正在缓缓旋转过来。</p>\n<p>喷头里喷出的不是水。</p>\n<p>是气体。</p>\n<p>一种无色的、带着甜味的雾气。</p>\n<p>陈烬的反应只用了零点三秒。</p>\n<p>他捂住口鼻，冲向铁门。门是锁着的——他在零点五秒内检查了门锁——老式的机械锁，需要钥匙。</p>\n<p>没有钥匙。</p>\n<p>他又花了零点三秒扫视了整个大厅——窗户被封死了，防火门是电子锁，没有电路面板，无法破解——</p>\n<p>他的目光落在地上。</p>\n<p>那个假人。</p>\n<p>他冲向假人，把它的身体翻过来。</p>\n<p>假人的手心里握着一把钥匙。</p>\n<p>陈烬抓起钥匙，冲回铁门前。</p>\n<p>钥匙插进锁孔——</p>\n<p>转动——</p>\n<p>「咔哒。」</p>\n<p>门开了。</p>\n<p>他推开门，冲进走廊，然后用力把身后的门关上，堵住从天而降的气体。</p>\n<p>他靠在走廊的墙上，大口喘气。</p>\n<p>那气体的成分他不知道。可能是麻醉剂，可能是神经毒素，也可能是烟雾弹。但不管是什么——竖锯不会给他足够的时间去分析。</p>\n<p>他的呼吸在走廊里回荡。</p>\n<p>过了好一会儿，他缓过来。</p>\n<p>他看了看自己手里的钥匙。</p>\n<p>假人握着的钥匙。他找到了。</p>\n<p>但竖锯给他的时间是——</p>\n<p>他低头看了看自己的手表。</p>\n<p>4:08 PM。</p>\n<p>距离他从浴室走出来——三分钟。</p>\n<p>三分钟，他走过了三层楼梯，触发了一个陷阱，闯进了一个密封的房间，找到了钥匙，逃了出来。</p>\n<p><em>三分钟。</em></p>\n<p>陈烬靠在墙上，感觉自己的心跳正在慢慢回归正常。</p>\n<p>「有意思。」他说，模仿着John Kramer的语气，声音里带着一丝苦笑。</p>\n<p>他继续往前走。</p>\n<p>走廊尽头，他听到了一个声音。</p>\n<p>不是陷阱的声音。</p>\n<p>是人的声音。</p>\n<p>女人的声音。</p>\n<p>熟悉的。</p>", "file": "018-三分钟.md", "prev": 17, "next": 19}, {"num": 19, "title": "第十九章 走廊", "body": "<p>第十九章 走廊</p>\n<p>走廊很暗。</p>\n<p>不是那种完全的黑——是那种旧医院里特有的昏暗，来自墙角和天花板之间微弱的环境光，像垂死的人睁不开的眼睛。壁灯大部分已经烧毁，剩下几根日光灯管在发出断续的嗡嗡声，间隔两秒闪一下。</p>\n<p>陈烬沿着走廊往前走。</p>\n<p>他走得很慢。不是害怕——是在读环境。</p>\n<p>走廊两侧每隔五米就有一扇门。大部分门都关着，有的门上贴着标牌——「手术室B」、「储藏间」、「值班室」。有些门开着，里面黑洞洞的，像一张张等待猎物自己走进去的嘴。</p>\n<p>他经过第一扇开着的门时，停了一下。</p>\n<p>门里是一间小办公室。桌子翻倒了，椅子歪在墙角。墙上挂着一块白板，上面写着一些潦草的字迹——不是诊断记录，不是病历，是一段话：</p>\n<p><em>「我花了四十年学会珍惜生命。你只花了四小时。公平吗？」</em></p>\n<p>陈烬看着那行字，没有进去。</p>\n<p>他没有时间研究竖锯的哲学。</p>\n<p>他继续走。</p>\n<p>走廊拐了一个弯。拐角处的墙上有一些暗色的喷溅状痕迹——陈烬蹲下来看了一眼，用手指碰了一下。干的。至少二十四小时以上。</p>\n<p>他站起来，转过拐角。</p>\n<p>面前是一条更长的走廊。大约四十米。走廊尽头的门通向地下室的楼梯间。</p>\n<p>但在走廊的中段——停着一样东西。</p>\n<p>一辆医用推车。不锈钢的，上面放着几样东西——一个托盘，一把手术刀，一卷纱布，还有一个磁带录音机。</p>\n<p>陈烬的目光在推车和周围的环境之间快速切换。</p>\n<p>推车停在走廊正中央。两侧的门都关着。天花板的通风口格栅完好无损。</p>\n<p>没有明显的陷阱。</p>\n<p>但他不信。</p>\n<p>他走到离推车还有三米的位置，停下来。</p>\n<p>他蹲下身体，视线与推车的底部齐平。从低角度观察推车下方的地面——看看有没有钢丝，有没有压力板，有没有任何不该存在的东西。</p>\n<p>地面是干净的。</p>\n<p>他又站起来，从不同的角度观察推车的四个轮子——每一个轮子都正常接触地面，没有卡进地板缝隙，没有可能被卡住的痕迹。</p>\n<p>看起来确实只是一个推车。</p>\n<p>陈烬走到推车前。</p>\n<p>托盘上的手术刀——一把标准的外科手术刀，不锈钢刀片，还包在灭菌包装里。</p>\n<p>纱布——干净的，没有血迹。</p>\n<p>磁带录音机——黑色塑料外壳，和他的那台一模一样。</p>\n<p>他按下播放键。</p>\n<p>磁带开始转动。</p>\n<p>风琴声——</p>\n<p><em>《Hello Zepp》</em>。</p>\n<p>在空旷的走廊里，这段音乐听起来比在浴室里更加渗人。声音在墙壁之间反复反射，像是来自四面八方的低语。</p>\n<p>音乐停了。</p>\n<p>竖锯的声音响起来：</p>\n<p>「你好，陈烬。你又选择了正确的方向。」</p>\n<p>「你发现了我留在你路上的礼物——一把手术刀。你可以用它来切割，也可以用它来抵挡。」</p>\n<p>「但你的时间正在流逝。你听到的那个声音——那是你朋友的声音。她已经走出了她的游戏。但你的游戏才刚刚开始。」</p>\n<p>「在你前方五十米处，有一扇通往地下室的楼梯间的门。你会在那里找到你的朋友。」</p>\n<p>「但你也会在路上遇到一些——」</p>\n<p>「我过去的作品。」</p>\n<p>磁带停了。</p>\n<p>陈烬站在原地，握着录音机的手指微微收紧。</p>\n<p><em>我过去的作品。</em></p>\n<p>竖锯的意思是——他在这条走廊里设置了其他陷阱。也许不是专门为他设计的陷阱——可能是一些被废弃的、被留下的「考试场」。竖锯在过去几年里测试过许多受害者——有些人死了，有些人活了下来。而那些陷阱的原址，可能就在这栋废弃的医院大楼里。</p>\n<p>陈烬把手术刀拆开，把刀片装在手柄上。</p>\n<p>然后他把磁带录音机放进口袋，继续往前走。</p>\n<p>他走了大约十米。</p>\n<p>右侧的一扇门突然发出了声音。</p>\n<p>不是人声——是一种金属摩擦的声音。像是有人在门的另一边用指甲刮擦铁皮。</p>\n<p>陈烬停住了。</p>\n<p>他侧过头，把耳朵贴近那扇门。</p>\n<p>门里传来呼吸声——沉重的，带着痰音的。</p>\n<p>有人——或者有东西——在门后。</p>\n<p>陈烬慢慢地伸手，握住门把手。</p>\n<p>门没有锁。</p>\n<p>他轻轻转动把手——</p>\n<p>门开了十厘米。</p>\n<p>门缝里透出一只眼睛。</p>\n<p>一只充血的眼球，瞳孔放大到几乎占满了整个虹膜。眼球的主人用一种野兽般的眼神盯着陈烬。</p>\n<p>那张脸——是一个男人。大约四十岁，满脸是血，头发被汗水和血浆粘成一缕一缕的。他的身上穿着一件撕破的衬衫，左臂上扎着一根——不，不是扎着，是<strong>贯穿</strong>着一根金属管。生锈的钢管从他的前臂穿入，从肘部穿出，露出的两端沾满了暗黑色的血迹。</p>\n<p>男人张开嘴，喉咙里发出一声嘶哑的、含混不清的声音。像是在说什么，但舌头已经干得说不出话了。</p>\n<p>陈烬盯着那个男人看了三秒。</p>\n<p>然后他认出了他。</p>\n<p>这是竖锯游戏里的另一个受害者——在原电影中，他只是背景故事里被提到的一个名字：Paul，一个在办公室工作、有自残倾向的男人。竖锯把他关在一个房间里，房间里布满了刀片和铁刺。他必须在没有光的情况下找到出口。</p>\n<p>Paul活了下来。但活下来的代价是他的左臂被一根钢管贯穿了。</p>\n<p>他已经不知道在这里待了多久了。一天？两天？</p>\n<p>也许竖锯把他留在这里，作为「展示品」。</p>\n<p>陈烬推开门。</p>\n<p>Paul的身体猛地往后缩，像一只受伤的动物警惕地后退。他被锁在房间中间的暖气片上，铁链的长度只允许他在直径一米的范围内活动。</p>\n<p>「别靠近我。」Paul发出沙哑的声音，「别——靠近——」</p>\n<p>「我不会伤害你。」陈烬说，声音放得很低很慢，「我是来找出口的。」</p>\n<p>「出口……」Paul的目光飘忽了一瞬，然后他笑了——一种歇斯底里的、濒临精神崩溃的笑，「出口就是入口。你从哪个口进来，就从哪个口出去。但你已经出不去了——他已经改变规则了——」</p>\n<p>「谁改变规则了？」</p>\n<p>「他。」Paul的目光凝聚了一瞬，像是回光返照一样变得清晰，「竖锯。他在你进来之前就激活了新的机关。每个房间——每条走廊——都是新的。他在为你调整游戏。」</p>\n<p>陈烬的喉咙紧了。</p>\n<p>正如他担心的——竖锯在针对他。</p>\n<p>「你能走吗？」陈烬问。</p>\n<p>Paul摇了摇头：「走不了。他们把我的脚——另一根钢管——」他抬了抬右腿，脚踝上套着一个铁环，铁链连接到地板上的地栓上，「你走吧。我活不了了。」</p>\n<p>陈烬看着他。</p>\n<p>那个男人已经没有求生意志了。他在这个房间里待得太久，已经放弃了自己。</p>\n<p>竖锯说对了：人只有在失去一切的时候，才能真正理解生命的意义。</p>\n<p>但陈烬不是来当哲学家的。</p>\n<p>他看了一眼Paul手上的钢管——那个贯穿伤。如果不处理，感染会在四十八小时内要了他的命。</p>\n<p>但陈烬没有时间给他处理伤口了。</p>\n<p>「我回来的时候——如果我回来的话——我会来找你。」陈烬说。</p>\n<p>Paul的眼睛里闪过一道微光：「你……会回来？」</p>\n<p>「我答应的事，就会做。」</p>\n<p>陈烬退出了房间，关上门。</p>\n<p>他继续往前走。</p>\n<p>经过第二扇门的时候，他没有停。</p>\n<p>但门里的声音让他停住了。</p>\n<p>那是一种——哭声。</p>\n<p>不是人的哭声。</p>\n<p>是一种机械装置发出的、模仿人声的哭声。像是一个玩具被扭曲成了哀嚎的频率。</p>\n<p>陈烬的脚顿了一下。</p>\n<p>他转过头。</p>\n<p>那扇门上没有标牌，只有一行用黑笔写的字——</p>\n<p><em>「Mark 的礼物」</em></p>\n<p>陈烬没有打开那扇门。</p>\n<p>他听到门内传来的机械哭声越来越响，然后——</p>\n<p>「轰——」</p>\n<p>一声沉闷的爆炸声从门里传来。</p>\n<p>墙在震动。</p>\n<p>门缝里涌出一股烧焦的气味。</p>\n<p>陈烬后退了两步，盯着那扇门。</p>\n<p>门里没有动静了。</p>\n<p>枪声。</p>\n<p>陷阱爆炸的声音。</p>\n<p>竖锯说的「过去的作品」——每个房间里都有一个人，正在经历他们自己的最后一场考试。</p>\n<p>而他没有时间去救他们中的任何一个。</p>\n<p>陈烬咬了咬牙，转身继续走。</p>\n<p>他走到走廊尽头。地下室的铁门前。</p>\n<p>他听到了一个声音——从门后传来。</p>\n<p>不是陷阱的声音。</p>\n<p>是脚步声。</p>\n<p>有人在楼梯间里。</p>\n<p>陈烬的手握紧了手术刀。</p>\n<p>门打开了。</p>\n<p>门后的灯光照在他的脸上。</p>\n<p>他看到了一个人影。</p>\n<p>那个人也看到了他。</p>\n<p>「——陈烬？」</p>\n<p>是Ripley的声音。</p>\n<p>陈烬紧绷的肩膀放下了两厘米。</p>\n<p>但Ripley的下一句话让他整个人都绷紧了。</p>\n<p>「我们得走了。」Ripley说，她的身后站着一个陌生的年轻女人——Amanda Young，「这栋楼里不止有陷阱。」</p>\n<p>「还有什么？」</p>\n<p>Ripley的目光沉了一下。</p>\n<p>「他派了人过来。不是Zep——是另外的人。拿着一把猎枪。我在二楼遇到了。」</p>\n<p>陈烬的心脏跳了一下。</p>\n<p>竖锯在调整游戏。</p>\n<p>他在派人追杀他们。</p>\n<p>「走。」陈烬说，「地下室有路出去吗？」</p>\n<p>「有。」Amanda开口了，声音沙哑但异常坚定，「我知道这栋楼的结构。我是被关在这里的第三个人——我被关了四天。我知道所有出口。」</p>\n<p>陈烬看着Amanda。</p>\n<p>那个在原剧情中会成为竖锯继承人的女孩。现在——她还只是一个刚刚获救的幸存者。</p>\n<p>「带路。」陈烬说。</p>\n<p>Amanda点了点头，转身走向地下室的深处。</p>\n<p>陈烬回头看了一眼身后的走廊。</p>\n<p>远处，一盏壁灯突然熄灭了。</p>\n<p>黑暗在向他涌来。</p>\n<p>他转回头，跟着Ripley和Amanda的脚步，消失在地下室的黑暗中。</p>\n<p>墙上的挂钟指向4:23。</p>\n<p>还剩一个小时三十七分钟。</p>", "file": "019-走廊.md", "prev": 18, "next": 20}, {"num": 20, "title": "第二十章 汇合", "body": "<p>第二十章 汇合</p>\n<p>地下室的空气比楼上更冷。</p>\n<p>那种冷不是气温的冷——是一种阴湿的、从地底渗上来的冷。墙面的水泥上凝结着细密的水珠，在微弱的灯光下反射出细碎的闪光。</p>\n<p>陈烬、Ripley和Amanda在地下室的走廊里快步前进。</p>\n<p>Amanda走在最前面，她的步伐很快，像是一个已经熟悉了这栋楼每一处角落的人。她头上那个反向熊夹已经被拆除了，但两侧太阳穴处的皮肤上还残留着红色的压痕——被金属箍了太久留下的印记。</p>\n<p>「你怎么知道这条路安全？」陈烬问。</p>\n<p>「我试过。」Amanda头也不回，「我被关了四天。第一天我尖叫了一整天，没人来。第二天我开始找出口。第三天我发现了一条通往建筑外墙的通道——不过被铁栅栏锁住了。」</p>\n<p>「第四天呢？」</p>\n<p>Amanda的脚步顿了一下。</p>\n<p>「第四天——」她说，「第四天竖锯来了。他告诉我——『你会活下去。但我需要你帮我一个忙。』」</p>\n<p>陈烬的后颈发凉。</p>\n<p>「他让你做什么？」</p>\n<p>「他让我选择。」Amanda说，「我可以跟他走，成为他的助手——或者他可以把我留在这里，等下一个游戏开始的时候，让我做『示范』。」</p>\n<p>「你选择了跟他走。」Ripley说。</p>\n<p>「对。」Amanda的声音很平静，「然后我就醒了——被绑在椅子上，头上戴着那个鬼东西。」</p>\n<p>三个人都沉默了。</p>\n<p>竖锯放了Amanda三次。</p>\n<p>第一次——从反向熊夹中活下来。</p>\n<p>第二次——被他招募，然后拒绝。</p>\n<p>第三次——又被放进游戏里，和一个来自外太空的女人一起。</p>\n<p>竖锯在用这些人——用他们的生命——编织一张更大的网。</p>\n<p>陈烬不知道这张网的尽头是什么。</p>\n<p>但他们没时间想这个了。</p>\n<p>「还有多远？」陈烬问。</p>\n<p>「前面左转，有一道楼梯通往锅炉房。锅炉房后面有一条旧通道——是以前医院用来运送医疗废物的。通道的出口在三个街区外的一个小巷子里。」Amanda说。</p>\n<p>「你怎么知道那条通道的？」</p>\n<p>「因为第三天的时候，我爬到了锅炉房。」Amanda说，「我想从烟囱爬出去。不过烟囱太窄了——但我在那里发现了通道入口。」</p>\n<p>陈烬看了Amanda一眼。</p>\n<p>这个女孩——在原作中是一个吸毒者、自残者、社会边缘人——但她在面对死亡的时候展现出了惊人的行动力。竖锯看人很准。这个女孩骨子里有生存的意志，只是她之前没有找到正确的方式来激发它。</p>\n<p>他们左转。</p>\n<p>锅炉房出现在眼前——一个巨大的空间，天花板很高，中央矗立着两个生锈的工业锅炉。锅炉的表面覆盖着厚厚的灰尘和蜘蛛网，但管道系统的走向依然清晰可见。</p>\n<p>Amanda走向锅炉房的右侧。那里有一面墙，表面覆盖着铁皮——铁皮上有一扇门，用铁链和挂锁锁着。</p>\n<p>「就是这里。」Amanda说，「但锁需要钥匙。」</p>\n<p>陈烬走到门前，蹲下来研究那把挂锁。普通的商用挂锁，四位数密码锁，不是钥匙式的。</p>\n<p>「密码。」他说，「你试过了？」</p>\n<p>「试过。」Amanda说，「0000、1234、1111——都不行。」</p>\n<p>陈烬盯着密码锁看了一会儿。</p>\n<p>然后他伸手，输入了四个数字：</p>\n<p><strong>0-6-0-0。</strong></p>\n<p>「咔哒。」</p>\n<p>锁开了。</p>\n<p>Ripley挑了挑眉：「你怎么知道的？」</p>\n<p>「他设置的所有陷阱都和时间有关。」陈烬说，「六点是最后期限。六点，00分。」他把锁取下来，推开铁门，「他不喜欢浪费有意义数字的组合。」</p>\n<p>铁门发出一声沉闷的摩擦声，门轴已经生锈了。</p>\n<p>门后是一条狭窄的通道。大约一米宽，两米高，墙壁是粗糙的水泥面。空气中有一股陈腐的气味——但比医院里的消毒水味好闻多了。这意味着这条通道确实连通外部，有新鲜的空气在流通。</p>\n<p>「走。」陈烬说。</p>\n<p>三个人鱼贯进入通道。陈烬最后一个进去，把铁门重新关上，但没有锁——他不想被断掉后路。</p>\n<p>通道里很暗。陈烬从口袋里掏出之前在商店买的荧光棒，掰了一下。</p>\n<p>化学光液在透明的塑料管里混合，发出冷绿色的光。</p>\n<p>绿光照亮了通道的轮廓。通道大约五十米长，尽头有一道光——暗淡的，微弱的，但确实是光。</p>\n<p>出口。</p>\n<p>「快。」Ripley说。</p>\n<p>三个人加快了脚步。</p>\n<p>通道尽头是一扇铁栅栏门。老旧的门锁已经锈死了，但铁栅栏本身的焊接点已经生锈脆弱。陈烬用肩膀撞了一下，铁门的铰链发出剧烈的颤动。</p>\n<p>又撞了一下。</p>\n<p>「嘎——」</p>\n<p>铁门从铰链上脱落了半边，歪斜着倒在地上。</p>\n<p>外面的光照进来。</p>\n<p>下午的阳光。带着灰尘颗粒的、斜斜的光束。</p>\n<p>自由。</p>\n<p>陈烬跨过铁门，走出通道。</p>\n<p>他站在一条窄巷子里。两侧是砖墙，地上积着雨水和垃圾。空气里有一股煎饼摊的气味——有人在不远处炒菜。</p>\n<p>他回头看了一眼。</p>\n<p>通道的出口被掩藏在一个废弃的集装箱后面。从外面看，根本不会注意到这里有一条通往废弃医院的通道。</p>\n<p>Ripley和Amanda跟着走了出来。</p>\n<p>Ripley站在阳光下，仰起头，闭上眼睛。她的脸上有一种劫后余生的表情——不是放松，是一种短暂的、暴风雨中的喘息。</p>\n<p>「现在去哪？」她问。</p>\n<p>陈烬从口袋里摸出Lawrence给他的那张纸条——上面写着Gordon家的地址。他在地图坐标和地址之间快速对应了一下。</p>\n<p>「格兰特大道的尽头，一栋二层小楼。离这里——」他估算了一下方向和距离，「三个街区。」</p>\n<p>「多远？」</p>\n<p>「走路大概十五分钟。」</p>\n<p>Ripley看了一眼自己的手表。</p>\n<p>4:15 PM。</p>\n<p>「还剩一小时四十五分钟。」她说。</p>\n<p>「我们是跑过去，还是走过去？」Amanda问。</p>\n<p>陈烬看了一眼两个女人——Ripley身上的护甲有一些破损，露出里面擦伤的皮肤；Amanda的T恤上沾满了血迹和灰尘，赤着脚——她的鞋在工厂里就不知道掉到哪里去了。</p>\n<p>「跑过去。」陈烬说，「你——」他看向Amanda，「你能跑吗？」</p>\n<p>Amanda低头看了看自己赤裸的脚，踩在粗糙的柏油路面上。她的脚底已经磨破了，但她咬了一下嘴唇。</p>\n<p>「能。」</p>\n<p>「走。」</p>\n<p>三个人跑出巷子。</p>\n<p>街道上偶尔有车辆经过，有几个行人，但没有人注意到他们——三个穿着破破烂烂、浑身是污渍和血迹的人，在这个城市里并不罕见。街道上有无家可归者，有瘾君子，有精神病人——他们只是看起来比那些人更狼狈一点。</p>\n<p>陈烬在前面带路。</p>\n<p>他的身体里还残存着敏捷强化的效果——他的呼吸更快，步伐更稳，肌肉的反应速度明显快于正常人。但他的极限也在逼近——长时间的肾上腺素分泌、缺乏睡眠、没吃过任何东西——他的身体在发出警告信号。</p>\n<p>但他不能停。</p>\n<p>Lawrence还在浴室里等他。</p>\n<p>Diana和Alison还在Zep的枪口下。</p>\n<p>还有那些他在走廊里看到的「过去的作品」——Paul, Mark, 还有那些他听到枪声和爆炸声却没能救下的人。</p>\n<p>他不能停。</p>\n<p>他们穿过一条主路，从一个加油站旁边绕过去。</p>\n<p>穿过一片住宅区。</p>\n<p>经过一个公园——里面有几个孩子在荡秋千，他们的笑声在午后的阳光里飘荡。</p>\n<p>最后——</p>\n<p>Gordon家的房子出现在街道尽头。</p>\n<p>一栋二层小楼，红砖外墙。门前的橡树依然站在那里，儿童自行车还停在树下。</p>\n<p>但窗帘是拉上的。</p>\n<p>前门——虚掩着。</p>\n<p>陈烬在街对面停下来，弯着腰喘了几口气。</p>\n<p>Ripley站在他身边，目光锁定在那栋房子上：「战术？」</p>\n<p>「我们不知道屋子里有几个人。」陈烬说，「Zep应该在里面。可能还有其他人——竖锯可能派了更多的人。」</p>\n<p>「那我绕到后面。」Ripley说，「你和Amanda从前门进去。」</p>\n<p>「你一个人？」</p>\n<p>「我一个人够了。」Ripley的语气不容置疑，「我在飞船上对付过异形，比Zep那种人难缠一万倍。」</p>\n<p>陈烬看了她一眼，点了点头。</p>\n<p>「三分钟。」他说，「等我信号。」</p>\n<p>「什么信号？」</p>\n<p>陈烬想了一下。</p>\n<p>「你听到屋里有动静——或者看到灯闪了两下——就冲进来。」</p>\n<p>Ripley点了点头，然后她转身消失在了房屋之间的小巷里。</p>\n<p>陈烬和Amanda留在原地。</p>\n<p>Amanda的呼吸还没平复，但她没有说话，只是静静地站在陈烬身边，像一尊绷紧的雕像。</p>\n<p>陈烬看着那栋房子。</p>\n<p>窗帘拉得紧紧的。</p>\n<p>前门的门缝里透出一线光。</p>\n<p>他的手指握紧了那把手术刀。</p>\n<p>他深吸了一口气。</p>\n<p>「走。」</p>\n<p>他跨过街道，走向那扇虚掩的门。</p>\n<p>他走得很稳。</p>\n<p>像他走进火场时那样。</p>\n<p>像他走进异形巢穴时那样。</p>\n<p>像他走进每一个可能带走他生命的房间时那样。</p>\n<p>门在他面前。</p>\n<p>他伸出手——</p>\n<p>推开了。</p>\n<p>屋子里很安静。</p>\n<p>但陈烬知道，安静之中，藏着最后一个陷阱。</p>\n<p>他跨过门槛。</p>\n<p>身后的阳光被门合上时挡住，再一次把他吞进了黑暗里。</p>\n<p>墙上的挂钟。</p>\n<p>4:27 PM。</p>\n<p>还剩一小时三十三分钟。</p>", "file": "020-汇合.md", "prev": 19, "next": 21}, {"num": 21, "title": "第二十一章 屋中", "body": "<p>第二十一章 屋中</p>\n<p>门在陈烬身后合上。</p>\n<p>Gordon家的客厅比他想象中更温暖——不是温度意义上的温暖，是那种「一个家庭日常生活的痕迹」带来的温暖。沙发上有凹痕，是有人经常坐的地方。茶几上放着一本打开的书，书页朝下扣着，旁边是一杯已经凉透的咖啡。电视柜上摆着几张照片——Lawrence和Alison的婚礼照，Diana在学校的演出照，一家三口的圣诞合影。</p>\n<p>这些照片在这栋被入侵的房子里，看起来像是某种残忍的讽刺。</p>\n<p>陈烬在门廊里站了三秒钟，让眼睛适应室内的光线。</p>\n<p>窗帘全都拉上了。屋子里很暗，只有厨房里一盏小灯亮着，投下淡黄色的光晕。空气中有一股淡淡的火药味——也许是Zep在摆弄那把左轮手枪时留下的。</p>\n<p>他听到了声音。</p>\n<p>从客厅深处传来——一个男人的呼吸声。急促的，带着紧张的。</p>\n<p>然后是另一个声音——一个女孩的哭声。被压抑的，喉咙里的呜咽。</p>\n<p>陈烬沿着走廊往里走。他的脚步很轻，踩在木地板上几乎没有声音。他的手指握着那把手术刀，刀刃朝上，紧贴着小臂内侧——这样在任何角度都可以快速出刀。</p>\n<p>他走到客厅的入口。</p>\n<p>Zep站在客厅中央。</p>\n<p>他比陈烬想象中更年轻——大概三十岁出头，穿着医院的白色制服外套，脸上带着一种紧张到近乎抽搐的表情。他的左手握着一把左轮手枪，枪口指向沙发。</p>\n<p>沙发上坐着Alison Gordon。她的双手被胶带绑在身后，嘴上贴着一层胶带。她的左眼眶有一片淤青——是电话里那声撞击留下的。她盯着陈烬，眼睛里有恐惧，也有一种——警告。</p>\n<p>Zep的身侧，一个八岁左右的小女孩蜷缩在沙发扶手上。</p>\n<p>Diana Gordon。</p>\n<p>她的嘴也被贴住了，但眼泪不停地从眼眶里涌出来，顺着脸颊流到胶带上。她看着陈烬的目光——像一个溺水的人看到一根浮木。</p>\n<p>「别动。」Zep说，枪口在Alison和Diana之间晃动了一下，「再走一步——我开枪。」</p>\n<p>陈烬停住了。</p>\n<p>但他没有举手投降。他只是站在那里，站在客厅入口的阴影里，让Zep能够看清楚他——看清楚他没有枪，没有威胁性的武器，只有一个人站在那里。</p>\n<p>「你是Zep。」陈烬说。</p>\n<p>Zep的眼睛抽搐了一下。</p>\n<p>「你知道我？」</p>\n<p>「John告诉过我。」陈烬说，声音很平静，「他说——你会在这里等我。」</p>\n<p>Zep的手指在扳机护圈上收紧了一点。</p>\n<p>「John告诉你的？他告诉你什么了？」</p>\n<p>「他告诉我你是一个病人。」陈烬向前走了半步——不是进攻性的，是一种更自然的、拉近距离的步子，像是在和人正常交谈时会做出的移动，「他说你得了一种病——神经系统的病。他告诉你去了一座诊所，见到了一个穿白大褂的男人。」</p>\n<p>Zep的呼吸变快了。</p>\n<p>「你——你怎么知道——」</p>\n<p>「因为他对每个人都这么说。」陈烬说，「你得的不是神经系统的病，Zep。你得的是一种常见的焦虑症。任何一家正规医院的神经科都能治好你。但你没有去正规医院，你去了他给你安排的地方——对不对？」</p>\n<p>Zep的嘴唇在抖。</p>\n<p>陈烬又向前走了半步。现在他和Zep之间只有四米的距离了。</p>\n<p>「他让你做什么？让你在这里等一个男人从浴室里爬出来？」陈烬说，「让你用这把手枪打死那个男人？然后——他会给你解药？」</p>\n<p>「不是解药——」Zep的声音变得尖锐，「是治疗——他说他还需要一天才能配好药——只要我做完这件事——」</p>\n<p>「他骗你的。」</p>\n<p>陈烬说出这三个字的时候，声音没有任何波澜。不是控诉，不是愤怒——只是陈述一个事实。</p>\n<p>「他不会给你治疗的。」陈烬说，「因为你的身体里根本没有毒。John Kramer——竖锯——他从来不给人下毒。他只给人下达选择。你的选择就是这个——」他看了一眼Zep手里的枪，「替他杀人，然后被他灭口。」</p>\n<p>「你胡说——」Zep的声音几乎破了音，「我能感觉到——我的身体——我的手在抖——我的视线越来越模糊——」</p>\n<p>「你的手在抖是因为你害怕。」陈烬说，「你的视线模糊是因为你三天没睡觉了——对吗？你多久没合眼了？」</p>\n<p>Zep张着嘴，说不出话。</p>\n<p>陈烬又说：「他让你做什么——让你在这里等我？」</p>\n<p>「如果六点之前有人从浴室里出来——」Zep说，「——我就开枪打死他。」</p>\n<p>「如果你开枪打了我，然后呢？」</p>\n<p>「然后——」Zep的喉咙滚动了一下，「然后……我就自由了。」</p>\n<p>「自由。」陈烬重复了一遍这个词，语气里没有嘲讽，只有一种让人不安的平静，「Zep，你有女儿吗？」</p>\n<p>Zep的瞳孔猛地收缩了一下。</p>\n<p>「你——你怎么知道——」</p>\n<p>「因为你看着Diana的眼神。」陈烬说，「那不是绑匪看人质的眼神。那是一个父亲看着别人的孩子、想到自己孩子的眼神。」</p>\n<p>Zep的手开始剧烈地颤抖。</p>\n<p>「你有一个女儿——大概五岁，还是六岁？」陈烬继续往前走，步子很慢，像在靠近一只受惊的动物，「她在等爸爸回家。但如果你今天开了这一枪——你就永远回不了家了。」</p>\n<p>「闭嘴——闭嘴！」Zep猛地举起枪，枪口直指陈烬的眉心，「你什么都不知道——你根本不知道我经历了什么——」</p>\n<p>「我知道。」陈烬说。</p>\n<p>他站在Zep面前，离枪口不到两米。</p>\n<p>「你失去了你女儿。对吗？」</p>\n<p>Zep的身体僵住了。</p>\n<p>「不是失去了——」Zep的声音突然变得很轻，轻到像是在自言自语，「得病的时候——他们把她带走了——法庭说我不能做她监护人——因为我『精神状态不稳定』——」</p>\n<p>他的眼眶红了。</p>\n<p>「我女儿——她现在和她妈妈住在另一个州——我连她长什么样都快不记得了——」</p>\n<p>陈烬看着Zep的眼睛。</p>\n<p>在那个瞬间，他看到了Zep的本质——不是恶人，是一个被痛苦吞噬的普通人。John Kramer选中了他，不是因为Zep强大，而是因为他脆弱。脆弱到可以被操纵。</p>\n<p>「John Kramer利用了你。」陈烬说，「他找到了你生命中最痛的地方——你失去女儿的痛苦——然后他在那个伤口上撒了一把盐。他说『我能帮你』。但你仔细想想——他帮了你什么？」</p>\n<p>Zep的眼眶里涌出泪水。</p>\n<p>「他说——如果我帮他做完这件事——他会帮我联系——让我见我女儿一面——」</p>\n<p>「他用一个你永远得不到的东西，换你的命。」陈烬说，「连那个病——你去找个正规医院验个血就知道了。你的血液里干干净净。John Kramer只在你的脑子里下了毒。」</p>\n<p>「不——」Zep的声音已经变成了哽咽，「不——我感觉到了——我真的感觉到了——」</p>\n<p>「你感觉到了什么？」陈烬问。</p>\n<p>「我——」Zep张着嘴，却说不出话。</p>\n<p>他只是站在那里，手里握着枪，却在发抖——不是冷，不是恐惧，是一种信念崩塌时的生理反应。</p>\n<p>他在过去几个月里，一直坚信自己的生命正在流逝。他相信了John Kramer给他讲的一切——他得了病，只有John能救他，他必须完成这个任务才能活下来。</p>\n<p>但如果这一切都是假的——</p>\n<p>那他做的所有事情——闯入别人家里，绑架一个女人和一个孩子，准备杀人——都是为了什么？</p>\n<p>Zep的枪口慢慢垂了下来。</p>\n<p>就在这个瞬间——</p>\n<p>Alison动了。</p>\n<p>她用尽全身力气，从沙发上猛地撞向Zep。她的肩膀撞在Zep的腰侧，Zep的身体失去平衡，向后踉跄了两步。</p>\n<p>枪响了。</p>\n<p>「砰——」</p>\n<p>子弹打偏了，射进天花板，留下一个冒着青烟的弹孔。</p>\n<p>Diana尖叫起来——声音透过胶带变得扭曲而尖锐。</p>\n<p>陈烬在枪声响起的同时动了。他冲上前，左手抓住Zep握枪的手腕，右手的手术刀向上挥出——</p>\n<p>他没有刺向Zep。</p>\n<p>他用刀背——在Zep的手腕上用力一敲。</p>\n<p>「啪——」</p>\n<p>Zep的手不受控制地松开了。左轮手枪脱手，在空中翻转了两圈，落在木地板上。枪身撞击地面时又走火了一发，子弹击中墙壁，打碎了一盏壁灯。</p>\n<p>玻璃碎片四散飞溅。</p>\n<p>Zep跪在地上，双手抱着头，发出一种压抑的、喉咙深处的呜咽声。</p>\n<p>「别杀我——别杀我——」</p>\n<p>陈烬没有杀他。</p>\n<p>他把那把左轮手枪踢到墙角，然后蹲下来，用手术刀割断了Alison手腕上的胶带。</p>\n<p>Alison一获得自由，立刻扑向Diana，把女儿紧紧地搂在怀里。Diana的哭声终于冲破了胶带的束缚——大声地、毫无保留地哭了起来。</p>\n<p>「没事了——没事了——妈妈在这里——」Alison的声音也在颤，但她的手非常稳，稳稳地护住女儿的后脑勺。</p>\n<p>陈烬站起来，看了一眼地上的Zep。</p>\n<p>Zep还在哭。一个成年男人，跪在别人家的客厅地板上，像一个小孩子一样哭。</p>\n<p>他身上的白色外套已经沾满了灰尘和泪渍。他的身体缩成了一团，像一只被遗弃的动物。</p>\n<p>陈烬没有再看他。</p>\n<p>他转身走到窗边，拉开窗帘的一角，往外看了一眼。</p>\n<p>Ripley正蹲在街对面的一辆车后。看到他出现在窗口，她站了起来，把电击手枪收回了枪套。</p>\n<p>陈烬对她点了点头。</p>\n<p>然后他低头看了一眼自己的手腕——表盘上的数字在下午的光线中清晰可见。</p>\n<p>5:15 PM。</p>\n<p>还剩下四十五分钟。</p>\n<p>但他知道——这个游戏还没有结束。</p>\n<p>因为John Kramer从来不会因为一个环节的失败就放弃整个游戏。</p>\n<p>而这栋房子里，还有他没有注意到的东西。</p>", "file": "021-屋中.md", "prev": 20, "next": 22}, {"num": 22, "title": "第二十二章 倒数", "body": "<p>第二十二章 倒数</p>\n<p>五分钟后，Gordon家的客厅恢复了秩序——一种表面的、脆弱的秩序。</p>\n<p>Alison给Diana倒了一杯温水。小女孩蜷缩在沙发上，双手捧着杯子，眼泪还在无声地流，但从她颤抖的幅度来看，已经平稳了许多。Alison自己更冷静——或者说，她把全部的恐慌都用在了照顾女儿上，没有多余的精力留给自己。</p>\n<p>Ripley从后门进了屋子。她检查了整栋房子的每一个房间，确认没有其他埋伏。然后她站在客厅门口，倚着门框，双臂交叉，用沉默的注视给这个空间提供了一种安全感——她知道怎么控制局面。</p>\n<p>Zep被绑在厨房的椅子上。陈烬用他自己的胶带绑的——一个\"反向致敬\"，他在心里想。Zep不再哭了，但他低着头，拒绝看任何人。他的左轮手枪被收走了，放在茶几上一个陈烬看得到的地方。</p>\n<p>陈烬站在窗边。</p>\n<p>窗帘拉开了一条缝。天边的颜色开始变了——下午的淡金色正在变成黄昏前更深的琥珀色。街道上偶尔有车经过，没有人注意到这栋房子里发生了什么。</p>\n<p>他盯着那些车，心里想的是另一件事。</p>\n<p><em>这个游戏——还没有结束。</em></p>\n<p>「你在想什么？」Ripley从他身后走近，声音很轻，不想惊动屋里的人。</p>\n<p>「我在想——为什么这么顺利。」陈烬说。</p>\n<p>「顺利？」Ripley的语气里有一丝不解，「你从一栋废弃医院里逃出来，和另一个幸存者一起，穿过城市，进到别人家里，制服了一个持枪的绑匪——你觉得这叫顺利？」</p>\n<p>「对。」陈烬说，「太顺利了。」</p>\n<p>他转过身，目光落在客厅墙上的挂钟上。</p>\n<p>5:22 PM。还剩三十八分钟。</p>\n<p>「John Kramer是我见过的最有条理的疯子。」陈烬说，「他设计每一个陷阱，事先几个月就开始准备。他选择每一个受害者，都做了深入的背景调查。他不会把所有的赌注都压在Zep一个人身上。」</p>\n<p>「你的意思是——还有后手？」</p>\n<p>陈烬没有回答。他正在思考。</p>\n<p>他从一开始就在想一个问题——一个他一直没有找到答案的问题。</p>\n<p><em>原版游戏的核心逻辑是什么？</em></p>\n<p>John把Lawrence和Adam锁在同一间浴室里。Lawrence必须杀死Adam才能救自己的家人。Adam必须阻止Lawrence或者杀死他才能活下来。这是一个\"囚徒困境\"的道德实验。</p>\n<p>但在这个版本里——Adam被替换成了陈烬。</p>\n<p>而陈烬没有按照剧情走。他没有和Lawrence对抗。他没有锯自己的脚。他甚至走出了浴室。</p>\n<p>这意味着——整个游戏的逻辑链条断了。</p>\n<p>John Kramer不可能没有预料到这一点。</p>\n<p>「如果他早就知道我会走出来呢？」陈烬低声说。</p>\n<p>「什么？」Ripley没听清。</p>\n<p>陈烬抬起头：「如果我走出浴室这个行为——也是他计划的一部分呢？」</p>\n<p>他走到茶几前，拿起那盘磁带录音机——Zep带来的那台。</p>\n<p>他按下播放键。</p>\n<p>录音机里传来竖锯的声音——不是新的录音
